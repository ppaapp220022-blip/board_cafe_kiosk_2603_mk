name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: 7070
          MARIADB_DATABASE: board_cafe_kiosk_2603
          MARIADB_USER: boardwave
          MARIADB_PASSWORD: 0331
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping -h 127.0.0.1 -uroot -p7070"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
      pgvector:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: board_cafe_kiosk_2603
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d board_cafe_kiosk_2603"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      MARIADB_URL: jdbc:mariadb://127.0.0.1:3306/board_cafe_kiosk_2603
      MARIADB_USERNAME: root
      MARIADB_PASSWORD: 7070
      PGVECTOR_URL: jdbc:postgresql://127.0.0.1:5432/board_cafe_kiosk_2603
      PGVECTOR_USERNAME: postgres
      PGVECTOR_PASSWORD: postgres

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Install DB clients
        run: |
          sudo apt-get update
          sudo apt-get install -y mariadb-client postgresql-client

      - name: Initialize test databases
        run: |
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -uroot -p7070 < src/main/resources/sql/MariaDB/01_init.sql
          mysql --protocol=TCP -h 127.0.0.1 -P 3306 -uroot -p7070 board_cafe_kiosk_2603 < src/main/resources/sql/MariaDB/02_dummy.sql
          psql "postgresql://postgres:postgres@127.0.0.1:5432/board_cafe_kiosk_2603" -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Run tests
        run: ./gradlew clean test bootJar

      - name: Prepare deployment bundle
        run: |
          cp build/libs/*.jar app.jar
          zip -r deploy.zip app.jar Procfile .platform

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.0
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          application-name: ${{ secrets.EB_APPLICATION_NAME }}
          environment-name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          version-label: github-${{ github.run_number }}-${{ github.sha }}
          deployment-package-path: deploy.zip
