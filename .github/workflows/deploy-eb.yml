name: Deploy to Elastic Beanstalk

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew clean test bootJar

      - name: Prepare deployment bundle
        run: |
          cp build/libs/*.jar app.jar
          zip -r deploy.zip app.jar Procfile .platform

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to Elastic Beanstalk
        uses: aws-actions/aws-elasticbeanstalk-deploy@v1.0.0
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          application-name: ${{ secrets.EB_APPLICATION_NAME }}
          environment-name: ${{ secrets.EB_ENVIRONMENT_NAME }}
          version-label: github-${{ github.run_number }}-${{ github.sha }}
          deployment-package: deploy.zip
