spring.config.import=optional:file:.env[.properties]

app.ai.enabled=false

spring.datasource.mariadb.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.mariadb.url=${MARIADB_URL:jdbc:mariadb://localhost:3306/board_cafe_kiosk_2603}
spring.datasource.mariadb.username=${MARIADB_USERNAME:}
spring.datasource.mariadb.password=${MARIADB_PASSWORD:}

mybatis.mapper-locations=classpath:mapper/**/*.xml
mybatis.configuration.map-underscore-to-camel-case=true

spring.batch.jdbc.initialize-schema=${SPRING_BATCH_JDBC_INITIALIZE_SCHEMA:always}
spring.batch.job.enabled=false

spring.mail.host=smtp.naver.com
spring.mail.port=465
spring.mail.username=${SPRING_MAIL_USERNAME:test@example.com}
spring.mail.password=${SPRING_MAIL_PASSWORD:test-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false

myapp.custom.mail.sender.mailFrom=${MYAPP_MAIL_FROM:test@example.com}
myapp.custom.mail.sender.mailFromName=${MYAPP_MAIL_FROM_NAME:BOARD_WAVE_SYSTEM}

my.upload.path=${MY_UPLOAD_PATH:C:/temp/boardwave-upload}

toss.payments.secret-key=${TOSS_PAYMENTS_SECRET_KEY:test-secret-key}
toss.payments.client-key=${TOSS_PAYMENTS_CLIENT_KEY:test-client-key}
toss.payments.confirm-url=https://api.tosspayments.com/v1/payments/confirm

spring.ai.openai.api-key=${OPENAI_API_KEY:}
