<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Login - Board Game Cafe</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/login/admin_login.css}">
</head>
<body>

<div class="login-card">
    <div class="icon-box"><i data-lucide="users"></i></div>
    <h2>Admin Login</h2>
    <p class="subtitle">매장 관리 시스템 접속</p>

    <div th:if="${param.error}" class="error-msg">
        <svg viewBox="0 0 24 24" width="16" height="16"
             fill="none" stroke="#A32D2D" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round"
             style="flex-shrink:0; margin-top:1px;">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span>아이디 혹은 비밀번호가 일치하지 않습니다.</span>
<!--        아이디 또는 비밀번호가 잘못되었습니다.-->
    </div>

    <form th:action="@{/admin/login-process}" method="POST">
        <div class="input-group">
            <span class="label">Admin ID</span>
            <div class="input-wrapper">
                <input type="text" name="username" placeholder="아이디를 입력하세요" required>
            </div>
        </div>

        <div class="input-group">
            <span class="label">Password</span>
            <div class="input-wrapper">
                <input type="password" name="password" placeholder="비밀번호를 입력하세요" required>
            </div>
        </div>

        <button type="submit" class="btn-primary">로그인</button>
    </form>

    <div class="admin-options">
        <a th:href="@{/admin/find_pw}" class="find-pw">비밀번호를 잊으셨나요?</a>
    </div>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
