<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2차 인증 - OTP 확인</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" th:href="@{/css/login/verify_otp.css}">
</head>
<body>
<div class="auth-card">
    <div class="icon-box">
        <i data-lucide="shield-check" style="width:28px;height:28px;"></i>
    </div>
    <h2>2차 인증</h2>
    <div class="role-badge">최고 관리자 (ADMIN)</div>
    <p class="subtitle">이메일 확인 후 OTP 번호를 입력해 주세요</p>

    <div class="info-box">
        등록된 이메일 주소로 인증번호를 발송합니다.<br>
        인증번호는 <strong>3분간</strong> 유효합니다.
    </div>

    <!-- JS로 제어하는 상태 메시지 (성공/오류 공용) -->
    <div id="statusMsg"></div>

    <!--
        action/method 는 JS fetch 가 담당하므로 폼 제출 방지용으로만 유지.
        th:action 을 쓰면 Thymeleaf 가 쓸데없는 hidden _csrf 를 추가할 수 있으므로
        CSRF disabled 환경에서는 일반 action 으로 명시.
    -->
    <form id="otpForm" action="#" onsubmit="return false;">

        <!-- 이메일 입력 + 인증 요청 -->
        <div class="input-group">
            <label class="label" for="email">이메일 주소</label>
            <div class="email-row">
                <input type="email" id="email" name="email"
                       placeholder="example@email.com"
                       required autofocus>
                <button type="button" id="sendOtpBtn" class="btn-send">인증 요청</button>
            </div>
            <div class="field-hint">데이터베이스에 등록된 이메일 주소를 입력하세요</div>
            <div class="field-error" id="emailError">올바른 이메일 형식을 입력해 주세요.</div>
        </div>

        <!-- OTP 입력 — 인증 요청 성공 후 노출 -->
        <div id="otpSection">
            <div class="input-group">
                <label class="label" for="otp">인증번호</label>
                <input type="text" id="otp" name="otp"
                       maxlength="6"
                       placeholder="6자리 인증번호"
                       autocomplete="off"
                       inputmode="numeric">
                <div class="field-hint">이메일로 전송된 6자리 인증번호를 입력하세요</div>
                <div class="timer" id="timer">남은 시간: <span id="timeLeft">03:00</span></div>
                <div class="field-error" id="otpError">인증번호 6자리를 입력해 주세요.</div>
            </div>
            <button type="button" class="btn-primary" id="submitBtn">로그인</button>
        </div>

        <button type="button" class="btn-secondary" id="cancelBtn" style="margin-top:10px;">
            취소
        </button>
    </form>
</div>

<script>
    lucide.createIcons();  // Lucide 아이콘 라이브러리를 실행하여 <i> 태그를 SVG(벡터 그래픽) 아이콘 코드으로 변환

</script>
<script th:src="@{/js/login/verify_otp.js}"></script>
</body>
</html>
