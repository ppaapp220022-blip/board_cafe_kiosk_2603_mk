<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Table Setup - Kiosk</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', sans-serif;
      background-color: #f0f2f5;
      display: flex; align-items: center; justify-content: center;
      height: 100vh;
    }
    .login-card {
      background: white;
      width: 400px;
      padding: 40px;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
    }
    .icon-box {
      width: 60px; height: 60px;
      background-color: #eef6ff;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      color: #007bff;
    }
    h2 { margin: 0; font-size: 1.8rem; color: #111; }
    .subtitle { color: #888; margin: 10px 0 30px; font-size: 0.95rem; }

    .input-group { text-align: left; margin-bottom: 20px; }
    .label { display: block; font-size: 0.85rem; color: #666; margin-bottom: 8px; font-weight: 600; }

    .input-wrapper {
      position: relative;
      display: flex; align-items: center;
    }
    .input-wrapper i {
      position: absolute; left: 15px; color: #aaa;
    }
    input {
      width: 100%;
      padding: 15px 15px 15px 45px;
      border: 1px solid #e1e4e8;
      border-radius: 12px;
      background-color: #f8f9fa;
      font-size: 1rem;
      box-sizing: border-box;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #007bff; background-color: #fff; }

    /* 테이블 번호는 아이콘 없으므로 패딩 조정 */
    .no-icon { padding-left: 15px; }

    .btn-primary {
      width: 100%;
      padding: 16px;
      background-color: #8dbfff; /* 피그마의 연한 파랑색 반영 */
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background-color: #007bff; }
    .footer-text { font-size: 0.8rem; color: #aaa; margin-top: 20px; }
  </style>
</head>
<body>

<div class="login-card">
  <div class="icon-box"><i data-lucide="monitor"></i></div>
  <h2>Table Setup</h2>
  <p class="subtitle">Staff Only - Initialize Kiosk</p>

  <div th:if="${param.error}" style="color:red; margin-bottom:15px;">
    테이블 번호 또는 비밀번호가 올바르지 않습니다.
  </div>

<!--  <form action="/kiosk/login" method="POST">-->
  <form th:action="@{/kiosk/login-process}" method="post">
    <div class="input-group">
      <span class="label">Table Number</span>
      <input type="number" name="tableNumber" class="no-icon" placeholder="Enter table number (1-10)" min="1" max="10" required>
    </div>

    <div class="input-group">
      <span class="label">Admin Password</span>
      <div class="input-wrapper">
<!--        <i data-lucide="lock" style="width:18px;"></i>-->
        <input type="password" name="password" placeholder="Enter admin password" required>
      </div>
    </div>

    <input type="hidden" name="remember-me" value="true"/>

    <button type="submit" class="btn-primary">Initialize Table</button>
  </form>

  <p class="footer-text">This screen is only visible to staff members</p>
</div>

<script>lucide.createIcons();</script>
</body>
</html>
