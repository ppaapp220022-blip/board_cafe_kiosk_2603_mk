<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>주문 상세 - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      width: 100%;
      max-width: 600px;
      padding: 40px;
      background: white;
      border-radius: 40px;
      box-shadow: 0 20px 80px rgba(0, 0, 0, 0.3);
      text-align: center;
      max-height: 95vh;
      overflow-y: auto;
    }

    .container::-webkit-scrollbar {
      width: 8px;
    }

    .container::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .container::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 10px;
    }

    .container::-webkit-scrollbar-thumb:hover {
      background: #888;
    }

    /* 헤더 */
    .header {
      margin-bottom: 30px;
    }

    .order-number {
      font-size: 0.95rem;
      color: #888;
      margin-bottom: 8px;
    }

    .order-number strong {
      color: #007bff;
      font-size: 1.1rem;
      font-weight: bold;
    }

    .page-title {
      font-size: 2rem;
      color: #333;
      margin-bottom: 10px;
      font-weight: 700;
    }

    /* 상태 표시 영역 */
    .status-section {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px;
      border-radius: 30px;
      margin-bottom: 30px;
      text-align: center;
    }

    .status-icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    .status-icon i {
      width: 50px;
      height: 50px;
      stroke-width: 1.5;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 1;
      }
      50% {
        transform: scale(1.05);
        opacity: 0.8;
      }
    }

    .status-text {
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .status-subtext {
      font-size: 0.95rem;
      opacity: 0.9;
    }

    /* 진행 상황 표시 */
    .progress-bar {
      margin-top: 30px;
      height: 6px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      font-size: 0.75rem;
      opacity: 0.8;
    }

    /* 주문 내역 */
    .card {
      background: white;
      border: 1px solid #f0f0f0;
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 20px;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      margin-bottom: 18px;
      color: #333;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 12px;
    }

    .card-header i {
      width: 24px;
      height: 24px;
      color: #007bff;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 1rem;
      color: #333;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .item-info {
      flex: 1;
      text-align: left;
    }

    .item-name {
      font-weight: bold;
      margin-bottom: 4px;
    }

    .item-qty {
      color: #888;
      font-size: 0.85rem;
    }

    .item-price {
      color: #007bff;
      font-weight: bold;
      min-width: 100px;
      text-align: right;
    }

    /* 주문 정보 */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.95rem;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-label i {
      width: 18px;
      height: 18px;
    }

    .info-value {
      color: #333;
      font-weight: bold;
    }

    /* 가격 정보 */
    .price-section {
      background: #f8f9fa;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 25px;
    }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      font-size: 1.1rem;
      color: #333;
    }

    .price-row.total {
      border-top: 2px solid #e0e0e0;
      padding-top: 15px;
      font-size: 1.4rem;
      font-weight: bold;
    }

    .price-row.total .price-label {
      color: #333;
    }

    .price-row.total .price-value {
      color: #007bff;
      font-size: 1.6rem;
    }

    .price-value {
      color: #007bff;
      font-weight: bold;
      text-align: right;
    }

    /* 버튼 영역 */
    .button-group {
      display: flex;
      gap: 15px;
      margin-top: 30px;
    }

    .btn {
      flex: 1;
      padding: 18px;
      border: none;
      border-radius: 15px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn i {
      width: 20px;
      height: 20px;
    }

    .btn-menu {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      flex: 2;
    }

    .btn-menu:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
    }

    .btn-back {
      background: #f0f2f5;
      color: #888;
      flex: 1;
    }

    .btn-back:hover {
      background: #e0e2e7;
      color: #555;
    }

    /* 상태별 아이콘 */
    .status-pending {
      color: #ff9800;
    }

    .status-paid {
      color: #2196f3;
    }

    .status-confirmed {
      color: #4caf50;
    }

    .status-cooking {
      color: #ff5722;
    }

    .status-delivering {
      color: #9c27b0;
    }

    .status-completed {
      color: #4caf50;
    }

    /* 로딩 스피너 */
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top: 3px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* 토스트 알림 */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #333;
      color: white;
      padding: 15px 25px;
      border-radius: 12px;
      z-index: 2000;
      animation: slideInUp 0.3s ease;
    }

    @keyframes slideInUp {
      from { transform: translateY(100px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* 모바일 반응형 */
    @media (max-width: 480px) {
      .container {
        padding: 20px;
        border-radius: 20px;
      }

      .page-title {
        font-size: 1.5rem;
      }

      .status-section {
        padding: 25px;
      }

      .button-group {
        flex-direction: column;
        gap: 10px;
      }

      .btn {
        padding: 15px;
      }
    }

    /* 상태 관리 섹션 */
    .status-control-item {
      background: #f9f9f9;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #eee;
    }

    .status-control-item:last-child {
      margin-bottom: 0;
    }

    .status-control-label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .status-control-name {
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    .status-control-current {
      font-size: 0.8rem;
      color: #888;
    }

    .status-control-buttons {
      display: flex;
      gap: 8px;
    }

    .status-btn {
      padding: 8px 14px;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .status-btn-ordered {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }

    .status-btn-ordered:hover {
      background: #ffc107;
    }

    .status-btn-confirmed {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #17a2b8;
    }

    .status-btn-confirmed:hover {
      background: #17a2b8;
      color: white;
    }

    .status-btn-cooking {
      background: #fde8e8;
      color: #721c24;
      border: 1px solid #dc3545;
    }

    .status-btn-cooking:hover {
      background: #dc3545;
      color: white;
    }

    .status-btn-delivering {
      background: #d4edda;
      color: #155724;
      border: 1px solid #28a745;
    }

    .status-btn-delivering:hover {
      background: #28a745;
      color: white;
    }

    .status-btn-completed {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #17a2b8;
    }

    .status-btn-completed:hover {
      background: #17a2b8;
      color: white;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- 헤더 -->
  <div class="header">
    <div class="order-number">
      주문번호 <strong th:text="${orderId}">123</strong>
    </div>
    <h1 class="page-title">주문이 접수되었습니다!</h1>
  </div>

  <!-- 상태 표시 -->
  <div class="status-section" th:classappend="'status-' + ${order.status.toLowerCase()}">
    <div class="status-icon" id="status-icon">
      <i data-lucide="clock"></i>
    </div>
    <div class="status-text" id="status-text" th:text="${statusDisplay}">
      주문 확인중...
    </div>
    <div class="status-subtext">
      실시간으로 상태가 업데이트됩니다
    </div>

    <!-- 진행 상황 바 -->
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 20%;"></div>
    </div>
    <div class="progress-labels">
      <span>결제</span>
      <span>확인</span>
      <span>조리</span>
      <span>서빙</span>
      <span>완료</span>
    </div>
  </div>

  <!-- 주문 내역 -->
  <div class="card">
    <div class="card-header">
      <i data-lucide="shopping-bag"></i>
      주문 내역
    </div>
    <div id="order-items">
      <!-- JavaScript로 동적 생성 -->
    </div>
  </div>

  <!-- 주문 상태 관리 (admin용) -->
  <div class="card" id="admin-controls" style="display: none;">
    <div class="card-header">
      <i data-lucide="sliders"></i>
      주문 상태 관리
    </div>
    <div id="order-status-controls">
      <!-- JavaScript로 동적 생성 -->
    </div>
  </div>

  <!-- 주문 정보 -->
  <div class="card">
    <div class="card-header">
      <i data-lucide="info"></i>
      주문 정보
    </div>
    <div class="info-row">
      <div class="info-label">
        <i data-lucide="table-2"></i>
        테이블
      </div>
      <div class="info-value" th:text="'#' + ${tableNumber}">
        #5
      </div>
    </div>
    <div class="info-row">
      <div class="info-label">
        <i data-lucide="clock"></i>
        주문 시간
      </div>
      <div class="info-value" id="order-time">
        <!-- JavaScript로 동적 생성 -->
      </div>
    </div>
    <div class="info-row" th:if="${order.customerPhone != null}">
      <div class="info-label">
        <i data-lucide="phone"></i>
        연락처
      </div>
      <div class="info-value" th:text="${order.customerPhone}">
        <!-- 있을 경우만 표시 -->
      </div>
    </div>
  </div>

  <!-- 가격 정보 -->
  <div class="price-section">
    <div class="price-row">
      <span class="price-label">상품 소계</span>
      <span class="price-value" id="subtotal" th:text="'₩' + ${#numbers.formatInteger(order.totalAmount, 0)}">
                ₩15,000
            </span>
    </div>
    <div class="price-row total">
      <span class="price-label">결제액</span>
      <span class="price-value" id="total" th:text="'₩' + ${#numbers.formatInteger(order.totalAmount, 0)}">
                ₩15,000
            </span>
    </div>
  </div>

  <!-- 버튼 -->
  <div class="button-group">
    <button class="btn btn-menu" onclick="goToMenu()">
      <i data-lucide="utensils"></i>
      메뉴로 돌아가기
    </button>
    <button class="btn btn-back" onclick="goToCart()">
      <i data-lucide="shopping-cart"></i>
      장바구니
    </button>
  </div>
</div>

<script th:inline="javascript">
  lucide.createIcons({
    attrs: { 'stroke-width': 2.5 }
  });

  // 서버에서 전달받은 데이터
  const orderId = /*[[${orderId}]]*/ 1;
  const tableNumber = /*[[${tableNumber}]]*/ 1;
  const orderData = /*[[${order}]]*/ {};

  // 현재 상태
  let currentStatus = orderData.status || 'PENDING';

  // ===== 페이지 로드 =====
  document.addEventListener('DOMContentLoaded', function() {
    renderOrderItems();
    renderOrderTime();
    updateStatusDisplay();
    initAdminControls();  // 관리자 컨트롤 초기화
    pollOrderStatus();  // 주문 상태 실시간 폴링
  });

  // ===== 주문 아이템 렌더링 =====
  function renderOrderItems() {
    const itemsContainer = document.getElementById('order-items');
    const items = orderData.items || [];

    itemsContainer.innerHTML = items.map((item, index) => `
            <div class="order-item">
                <div class="item-info">
                    <div class="item-name">${item.menuName}</div>
                    <div class="item-qty">수량: ${item.quantity}개 · <span class="item-status" data-index="${index}">주문 완료</span></div>
                </div>
                <div class="item-price">
                    ₩${(item.price * item.quantity).toLocaleString()}
                </div>
            </div>
        `).join('');
  }

  // ===== 주문 시간 표시 =====
  function renderOrderTime() {
    const orderedAt = orderData.orderedAt;
    if (!orderedAt) {
      document.getElementById('order-time').innerText = '방금 전';
      return;
    }

    const date = new Date(orderedAt);
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    document.getElementById('order-time').innerText = `${hours}:${minutes}`;
  }

  // ===== 상태 표시 업데이트 =====
  function updateStatusDisplay() {
    const status = currentStatus;
    const statusIcon = document.getElementById('status-icon');
    const statusText = document.getElementById('status-text');
    const progressFill = document.getElementById('progress-fill');

    // 상태별 아이콘 및 진행률
    const statusConfig = {
      'ORDERED': {
        icon: 'clock',
        text: '주문 완료! 관리자 확인 중...',
        progress: 20,
        color: 'ff9800'
      },
      'CONFIRMED': {
        icon: 'check-circle',
        text: '주문 확인! 조리 시작...',
        progress: 40,
        color: '2196f3'
      },
      'COOKING': {
        icon: 'flame',
        text: '조리 중입니다...',
        progress: 65,
        color: 'ff5722'
      },
      'DELIVERING': {
        icon: 'package-check',
        text: '배달 준비 중...',
        progress: 85,
        color: '9c27b0'
      },
      'COMPLETED': {
        icon: 'check-circle-2',
        text: '완료!',
        progress: 100,
        color: '4caf50'
      },
      'CANCELLED': {
        icon: 'x-circle',
        text: '주문 취소됨',
        progress: 0,
        color: 'f44336'
      }
    };

    const config = statusConfig[status] || statusConfig['ORDERED'];

    // 아이콘 업데이트
    statusIcon.innerHTML = `<i data-lucide="${config.icon}"></i>`;

    // 텍스트 업데이트
    statusText.innerText = config.text;

    // 진행률 업데이트
    progressFill.style.width = config.progress + '%';

    // 아이콘 재생성
    lucide.createIcons();
  }

  // ===== 주문 상태 실시간 폴링 =====
  function pollOrderStatus() {
    // 2초마다 상태 확인
    const pollInterval = setInterval(() => {
      fetch(`/kiosk/order/api/${orderId}`)
              .then(response => response.json())
              .then(data => {
                if (data.success) {
                  const newStatus = data.status;
                  if (newStatus !== currentStatus) {
                    console.log(`주문 상태 변경: ${currentStatus} → ${newStatus}`);
                    currentStatus = newStatus;
                    updateStatusDisplay();
                    showToast(`✓ 상태 변경: ${getStatusText(newStatus)}`);

                    // 완료 또는 취소 상태면 폴링 중지
                    if (newStatus === 'COMPLETED' || newStatus === 'CANCELLED') {
                      clearInterval(pollInterval);
                    }
                  }
                }
              })
              .catch(error => {
                console.error('상태 조회 실패:', error);
              });
    }, 2000);  // 2초마다 확인

    // 페이지 떠날 때 폴링 중지
    window.addEventListener('beforeunload', () => {
      clearInterval(pollInterval);
    });
  }

  // ===== 상태별 텍스트 =====
  function getStatusText(status) {
    const texts = {
      'ORDERED':   '주문 완료',
      'CONFIRMED': '주문 확인',
      'COOKING':   '조리 중',
      'DELIVERING': '배달 준비',
      'COMPLETED': '완료',
      'CANCELLED': '취소'
    };
    return texts[status] || '상태 확인';
  }

  // ===== 메뉴로 돌아가기 =====
  function goToMenu() {
    window.location.href = `/kiosk/menu?tableNumber=${tableNumber}`;
  }

  // ===== 장바구니로 이동 =====
  function goToCart() {
    window.location.href = '/kiosk/cart';
  }

  // ===== 토스트 알림 =====
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2500);
  }

  // ===== 상태 관리 함수 =====
  function initAdminControls() {
    // 관리자 모드 확인 (URL 파라미터 또는 세션)
    const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
    const adminControlsDiv = document.getElementById('admin-controls');

    if (!isAdmin) {
      return;  // 일반 사용자는 상태 관리 UI 미표시
    }

    adminControlsDiv.style.display = 'block';

    // 상태 목록
    const statuses = [
      { key: 'ORDERED', label: '주문 완료' },
      { key: 'CONFIRMED', label: '주문 확인' },
      { key: 'COOKING', label: '조리 중' },
      { key: 'DELIVERING', label: '배달 준비' },
      { key: 'COMPLETED', label: '완료' }
    ];

    const controlsContainer = document.getElementById('order-status-controls');
    controlsContainer.innerHTML = statuses.map(status => {
      const isActive = status.key === currentStatus;
      const buttons = statuses
        .filter(s => s.key !== status.key)
        .map(s => `
          <button class="status-btn status-btn-${s.key.toLowerCase()}"
                  onclick="changeOrderStatus('${s.key}')">
            → ${s.label}
          </button>
        `).join('');

      return `
        <div class="status-control-item">
          <div class="status-control-label">
            <div class="status-control-name">${status.label}</div>
            <div class="status-control-current">${isActive ? '● 현재 상태' : ''}</div>
          </div>
          <div class="status-control-buttons">
            ${buttons}
          </div>
        </div>
      `;
    }).join('');
  }

  // 주문 상태 변경
  async function changeOrderStatus(newStatus) {
    try {
      const response = await fetch(`/kiosk/order/${orderId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });

      const data = await response.json();

      if (data.success) {
        currentStatus = newStatus;
        updateStatusDisplay();
        initAdminControls();  // UI 새로고침
        showToast(`✓ 상태 변경: ${getStatusText(newStatus)}`);
      } else {
        showToast(`✗ 상태 변경 실패: ${data.message}`);
      }
    } catch (error) {
      console.error('상태 변경 오류:', error);
      showToast('상태 변경 중 오류가 발생했습니다.');
    }
  }
</script>

</body>
</html>
