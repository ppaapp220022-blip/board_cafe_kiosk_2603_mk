<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>주문 상세 - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #f4f6f8;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      color: #333;
    }

    .status-banner {
      background: #f0f7ff;
      border-bottom: 2px solid #0066cc;
      color: #0066cc;
      text-align: center;
      padding: 14px 20px;
      font-size: 1rem;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .status-banner i {
      width: 20px;
      height: 20px;
    }

    .header {
      background: white;
      padding: 20px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #eaeaea;
      gap: 16px;
    }

    .back-btn {
      color: #007bff;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: bold;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.2s;
    }

    .back-btn:hover {
      color: #0056b3;
    }

    .back-btn i {
      width: 22px;
      height: 22px;
    }

    .header-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .order-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: 1.5px solid #0066cc;
      border-radius: 20px;
      padding: 7px 12px;
      font-size: 0.85rem;
      font-weight: bold;
      color: #0066cc;
    }

    .order-badge i {
      width: 14px;
      height: 14px;
    }

    .content {
      flex: 1;
      padding: 28px 40px;
      overflow-y: auto;
    }

    .content::-webkit-scrollbar {
      width: 8px;
    }

    .content::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }

    .content::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 10px;
    }

    .content::-webkit-scrollbar-thumb:hover {
      background: #888;
    }

    .status-section {
      background: #f0f7ff;
      border: 1.5px solid #cfe6ff;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
    }

    .status-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .status-main {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .status-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #0066cc;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    .status-icon i {
      width: 26px;
      height: 26px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.9; }
    }

    .status-text {
      font-size: 1.2rem;
      font-weight: bold;
      color: #0b4a85;
      margin-bottom: 4px;
    }

    .status-subtext {
      font-size: 0.9rem;
      color: #5f7a95;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: bold;
      background: #d1ecf1;
      color: #0c5460;
      white-space: nowrap;
    }

    .progress-bar {
      height: 8px;
      border-radius: 999px;
      background: #d7e9fb;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .progress-fill {
      height: 100%;
      width: 20%;
      background: #007bff;
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      color: #6b8196;
      font-size: 0.72rem;
      font-weight: 600;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 14px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.05rem;
      font-weight: bold;
      color: #333;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
    }

    .card-header i {
      width: 20px;
      height: 20px;
      color: #007bff;
    }

    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .item-info {
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
    }

    .item-qty {
      color: #888;
      font-size: 0.88rem;
    }

    .item-price {
      color: #007bff;
      font-weight: bold;
      text-align: right;
      min-width: 95px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      gap: 10px;
    }

    .info-row:last-child {
      border-bottom: none;
    }

    .info-label {
      color: #888;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
    }

    .info-label i {
      width: 17px;
      height: 17px;
    }

    .info-value {
      color: #333;
      font-weight: bold;
      text-align: right;
    }

    .footer {
      background: white;
      border-top: 1px solid #eaeaea;
      padding: 24px 40px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .total-label {
      font-size: 1.2rem;
      font-weight: bold;
      color: #333;
    }

    .total-amount {
      font-size: 2rem;
      font-weight: bold;
      color: #007bff;
    }

    .subtotal-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: #666;
      font-size: 0.95rem;
    }

    .button-group {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 15px;
      font-size: 1.06rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn i {
      width: 20px;
      height: 20px;
    }

    .btn-menu {
      background: #007bff;
      color: white;
    }

    .btn-menu:hover {
      background: #0056b3;
      box-shadow: 0 4px 12px rgba(0, 123, 255, 0.3);
    }

    .btn-back {
      background: #f0f2f5;
      color: #888;
    }

    .btn-back:hover {
      background: #e0e2e7;
      color: #555;
    }

    .status-control-item {
      background: #f9f9f9;
      border-radius: 12px;
      padding: 14px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      border: 1px solid #eee;
    }

    .status-control-item:last-child {
      margin-bottom: 0;
    }

    .status-control-label {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .status-control-name {
      font-weight: 600;
      color: #333;
      font-size: 0.95rem;
    }

    .status-control-current {
      font-size: 0.8rem;
      color: #888;
    }

    .status-control-buttons {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .status-btn {
      padding: 7px 11px;
      border: none;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .status-btn-ordered {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffc107;
    }

    .status-btn-ordered:hover {
      background: #ffc107;
    }

    .status-btn-confirmed {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #17a2b8;
    }

    .status-btn-confirmed:hover {
      background: #17a2b8;
      color: white;
    }

    .status-btn-cooking {
      background: #fde8e8;
      color: #721c24;
      border: 1px solid #dc3545;
    }

    .status-btn-cooking:hover {
      background: #dc3545;
      color: white;
    }

    .status-btn-delivering {
      background: #d4edda;
      color: #155724;
      border: 1px solid #28a745;
    }

    .status-btn-delivering:hover {
      background: #28a745;
      color: white;
    }

    .status-btn-completed {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #17a2b8;
    }

    .status-btn-completed:hover {
      background: #17a2b8;
      color: white;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #333;
      color: white;
      padding: 15px 25px;
      border-radius: 12px;
      z-index: 2000;
      animation: slideInUp 0.3s ease;
    }

    @keyframes slideInUp {
      from {
        transform: translateY(100px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    @media (max-width: 768px) {
      .header {
        padding: 16px 20px;
      }

      .content {
        padding: 18px 16px;
      }

      .footer {
        padding: 18px 16px;
      }

      .status-top {
        flex-direction: column;
        align-items: flex-start;
      }

      .button-group {
        flex-direction: column;
      }

      .total-amount {
        font-size: 1.7rem;
      }

      .status-control-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .status-control-buttons {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>

<div class="status-banner">
  <i data-lucide="package-check"></i>
  주문 상태가 실시간으로 업데이트됩니다
</div>

<div class="header">
  <button class="back-btn" onclick="goToMenu()">
    <i data-lucide="arrow-left"></i>
    메뉴로 돌아가기
  </button>
  <div class="header-info">
    <span class="order-badge">
      <i data-lucide="hash"></i>
      주문번호 <strong th:text="${orderId}">123</strong>
    </span>
    <span class="order-badge">
      <i data-lucide="table-2"></i>
      테이블 <strong th:text="${tableNumber}">5</strong>
    </span>
  </div>
</div>

<div class="content">
  <div class="status-section" th:classappend="'status-' + ${order.status.toLowerCase()}">
    <div class="status-top">
      <div class="status-main">
        <div class="status-icon" id="status-icon">
          <i data-lucide="clock"></i>
        </div>
        <div>
          <div class="status-text" id="status-text" th:text="${statusDisplay}">주문 확인중...</div>
          <div class="status-subtext">매장 준비 상황에 따라 변경될 수 있어요</div>
        </div>
      </div>
      <div class="status-chip" id="status-chip">주문 완료</div>
    </div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width: 20%;"></div>
    </div>
    <div class="progress-labels">
      <span>주문</span>
      <span>확인</span>
      <span>조리</span>
      <span>서빙</span>
      <span>완료</span>
    </div>
  </div>

  <div class="card">
    <div class="card-header">
      <i data-lucide="shopping-bag"></i>
      주문 내역
    </div>
    <div id="order-items"></div>
  </div>

  <div class="card" id="admin-controls" style="display: none;">
    <div class="card-header">
      <i data-lucide="sliders"></i>
      주문 상태 관리
    </div>
    <div id="order-status-controls"></div>
  </div>

  <div class="card">
    <div class="card-header">
      <i data-lucide="info"></i>
      주문 정보
    </div>
    <div class="info-row">
      <div class="info-label">
        <i data-lucide="table-2"></i>
        테이블
      </div>
      <div class="info-value" th:text="'#' + ${tableNumber}">#5</div>
    </div>
    <div class="info-row">
      <div class="info-label">
        <i data-lucide="clock"></i>
        주문 시간
      </div>
      <div class="info-value" id="order-time"></div>
    </div>
    <div class="info-row" th:if="${order.customerPhone != null}">
      <div class="info-label">
        <i data-lucide="phone"></i>
        연락처
      </div>
      <div class="info-value" th:text="${order.customerPhone}"></div>
    </div>
  </div>
</div>

<div class="footer">
  <div class="subtotal-row">
    <span>상품 소계</span>
    <span id="subtotal" th:text="'₩' + ${#numbers.formatInteger(order.totalAmount, 0)}">₩15,000</span>
  </div>
  <div class="total-row">
    <span class="total-label">결제액</span>
    <span class="total-amount" id="total" th:text="'₩' + ${#numbers.formatInteger(order.totalAmount, 0)}">₩15,000</span>
  </div>
  <div class="button-group">
    <button class="btn btn-menu" onclick="goToMenu()">
      <i data-lucide="utensils"></i>
      메뉴로 돌아가기
    </button>
    <button class="btn btn-back" onclick="goToCart()">
      <i data-lucide="shopping-cart"></i>
      장바구니
    </button>
  </div>
</div>

<script th:inline="javascript">
  lucide.createIcons({
    attrs: { 'stroke-width': 2.5 }
  });

  const orderId = /*[[${orderId}]]*/ 1;
  const tableNumber = /*[[${tableNumber}]]*/ 1;
  const orderData = /*[[${order}]]*/ {};

  let currentStatus = orderData.status || 'PENDING';

  document.addEventListener('DOMContentLoaded', function() {
    renderOrderItems();
    renderOrderTime();
    updateStatusDisplay();
    initAdminControls();
    pollOrderStatus();
  });

  function renderOrderItems() {
    const itemsContainer = document.getElementById('order-items');
    const items = orderData.items || [];

    itemsContainer.innerHTML = items.map((item, index) => `
      <div class="order-item">
        <div class="item-info">
          <div class="item-name">${item.menuName}</div>
          <div class="item-qty">수량: ${item.quantity}개 · <span class="item-status" data-index="${index}">주문 완료</span></div>
        </div>
        <div class="item-price">₩${(item.price * item.quantity).toLocaleString()}</div>
      </div>
    `).join('');
  }

  function renderOrderTime() {
    const orderedAt = orderData.orderedAt;
    if (!orderedAt) {
      document.getElementById('order-time').innerText = '방금 전';
      return;
    }

    const date = new Date(orderedAt);
    const hours = String(date.getHours()).padStart(2, '0');
    const minutes = String(date.getMinutes()).padStart(2, '0');
    document.getElementById('order-time').innerText = `${hours}:${minutes}`;
  }

  function updateStatusDisplay() {
    const status = currentStatus;
    const statusIcon = document.getElementById('status-icon');
    const statusText = document.getElementById('status-text');
    const progressFill = document.getElementById('progress-fill');
    const statusChip = document.getElementById('status-chip');

    const statusConfig = {
      'ORDERED': {
        icon: 'clock',
        text: '주문 완료! 관리자 확인 중...',
        short: '주문 완료',
        progress: 20
      },
      'CONFIRMED': {
        icon: 'check-circle',
        text: '주문 확인! 조리 시작...',
        short: '주문 확인',
        progress: 40
      },
      'COOKING': {
        icon: 'flame',
        text: '조리 중입니다...',
        short: '조리 중',
        progress: 65
      },
      'DELIVERING': {
        icon: 'package-check',
        text: '배달 준비 중...',
        short: '서빙 준비',
        progress: 85
      },
      'COMPLETED': {
        icon: 'check-circle-2',
        text: '완료!',
        short: '완료',
        progress: 100
      },
      'CANCELLED': {
        icon: 'x-circle',
        text: '주문 취소됨',
        short: '취소',
        progress: 0
      }
    };

    const config = statusConfig[status] || statusConfig['ORDERED'];

    statusIcon.innerHTML = `<i data-lucide="${config.icon}"></i>`;
    statusText.innerText = config.text;
    statusChip.innerText = config.short;
    progressFill.style.width = config.progress + '%';

    lucide.createIcons();
  }

  function pollOrderStatus() {
    const pollInterval = setInterval(() => {
      fetch(`/kiosk/order/api/${orderId}`)
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            const newStatus = data.status;
            if (newStatus !== currentStatus) {
              currentStatus = newStatus;
              updateStatusDisplay();
              showToast(`✓ 상태 변경: ${getStatusText(newStatus)}`);

              if (newStatus === 'COMPLETED' || newStatus === 'CANCELLED') {
                clearInterval(pollInterval);
              }
            }
          }
        })
        .catch(error => {
          console.error('상태 조회 실패:', error);
        });
    }, 2000);

    window.addEventListener('beforeunload', () => {
      clearInterval(pollInterval);
    });
  }

  function getStatusText(status) {
    const texts = {
      'ORDERED': '주문 완료',
      'CONFIRMED': '주문 확인',
      'COOKING': '조리 중',
      'DELIVERING': '배달 준비',
      'COMPLETED': '완료',
      'CANCELLED': '취소'
    };
    return texts[status] || '상태 확인';
  }

  function goToMenu() {
    window.location.href = `/kiosk/drinks?tableNumber=${tableNumber}`;
  }

  function goToCart() {
    window.location.href = '/kiosk/cart';
  }

  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    document.body.appendChild(toast);

    setTimeout(() => toast.remove(), 2500);
  }

  function initAdminControls() {
    const isAdmin = new URLSearchParams(window.location.search).get('admin') === 'true';
    const adminControlsDiv = document.getElementById('admin-controls');

    if (!isAdmin) {
      return;
    }

    adminControlsDiv.style.display = 'block';

    const statuses = [
      { key: 'ORDERED', label: '주문 완료' },
      { key: 'CONFIRMED', label: '주문 확인' },
      { key: 'COOKING', label: '조리 중' },
      { key: 'DELIVERING', label: '배달 준비' },
      { key: 'COMPLETED', label: '완료' }
    ];

    const controlsContainer = document.getElementById('order-status-controls');
    controlsContainer.innerHTML = statuses.map(status => {
      const isActive = status.key === currentStatus;
      const buttons = statuses
        .filter(s => s.key !== status.key)
        .map(s => `
          <button class="status-btn status-btn-${s.key.toLowerCase()}" onclick="changeOrderStatus('${s.key}')">
            → ${s.label}
          </button>
        `).join('');

      return `
        <div class="status-control-item">
          <div class="status-control-label">
            <div class="status-control-name">${status.label}</div>
            <div class="status-control-current">${isActive ? '● 현재 상태' : ''}</div>
          </div>
          <div class="status-control-buttons">${buttons}</div>
        </div>
      `;
    }).join('');
  }

  async function changeOrderStatus(newStatus) {
    try {
      const response = await fetch(`/kiosk/order/${orderId}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: newStatus })
      });

      const data = await response.json();

      if (data.success) {
        currentStatus = newStatus;
        updateStatusDisplay();
        initAdminControls();
        showToast(`✓ 상태 변경: ${getStatusText(newStatus)}`);
      } else {
        showToast(`✗ 상태 변경 실패: ${data.message}`);
      }
    } catch (error) {
      console.error('상태 변경 오류:', error);
      showToast('상태 변경 중 오류가 발생했습니다.');
    }
  }
</script>

</body>
</html>
