<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>결제 실패 - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" th:href="@{/css/kiosk/toss_fail.css}">
</head>
<body>
<div class="container">
  <i data-lucide="circle-x" class="fail-icon"></i>
  <h1>결제 실패</h1>

  <div class="error-msg"
       th:text="${errorMessage} ?: '결제가 취소되거나 실패했습니다.'">
    결제가 취소되거나 실패했습니다.
  </div>

  <div class="button-group">
    <button class="retry-btn" onclick="retryPayment()">다시 시도</button>
    <button class="back-btn"  onclick="goMenu()">메뉴로 이동</button>
  </div>
</div>

<script>
  lucide.createIcons({ attrs: { 'stroke-width': 2.5 } });
  const tableNumber = /*[[${tableNumber}]]*/ '1';

</script>
<script th:src="@{/js/kiosk/toss_fail.js}"></script>
</body>
</html>
