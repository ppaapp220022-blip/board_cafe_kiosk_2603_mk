<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>결제 실패 - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f8;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: white;
      padding: 50px 40px;
      border-radius: 28px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      max-width: 460px;
      width: 100%;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .fail-icon { width: 90px; height: 90px; color: #f44336; margin-bottom: 8px; }

    h1 { font-size: 2rem; font-weight: 800; color: #333; }

    .error-msg {
      font-size: 1rem;
      color: #888;
      line-height: 1.6;
      background: #fff5f5;
      border: 1px solid #ffd0d0;
      padding: 14px 20px;
      border-radius: 12px;
      width: 100%;
    }

    .button-group {
      display: flex;
      gap: 12px;
      width: 100%;
      margin-top: 8px;
    }

    .retry-btn, .back-btn {
      flex: 1;
      padding: 16px;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .retry-btn {
      background: #007bff;
      color: white;
      box-shadow: 0 4px 12px rgba(0,123,255,0.3);
    }

    .retry-btn:hover { background: #0056b3; }

    .back-btn {
      background: #f0f2f5;
      color: #666;
    }

    .back-btn:hover { background: #e0e2e7; }
  </style>
</head>
<body>
<div class="container">
  <i data-lucide="circle-x" class="fail-icon"></i>
  <h1>결제 실패</h1>

  <div class="error-msg"
       th:text="${errorMessage} ?: '결제가 취소되거나 실패했습니다.'">
    결제가 취소되거나 실패했습니다.
  </div>

  <div class="button-group">
    <button class="retry-btn" onclick="retryPayment()">다시 시도</button>
    <button class="back-btn"  onclick="goMenu()">메뉴로 이동</button>
  </div>
</div>

<script>
  lucide.createIcons({ attrs: { 'stroke-width': 2.5 } });
  const tableNumber = /*[[${tableNumber}]]*/ '1';

  function retryPayment() {
    window.location.href = `/kiosk/checkout?tableNumber=${tableNumber}`;
  }

  function goMenu() {
    window.location.href = `/kiosk/games?tableNumber=${tableNumber}`;
  }
</script>
</body>
</html>
