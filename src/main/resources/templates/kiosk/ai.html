<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOARD WAVE - AI Guide Kiosk</title>
    <!-- 자판 한글관련 -->
    <script src="https://unpkg.com/hangul-js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --guide-blue: #4FC3F7;
            --guide-blue-dark: #0288D1;
            --paper-bg: #FFFFFF;
            --bg-color: #FFFFFF;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background: linear-gradient(120deg, #e0f2f1 0%, #f5f5f5 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .kiosk-frame {
            width: 1080px;
            height: 680px;
            background: var(--bg-color);
            display: flex;
            border: 5px solid #FFFFFF;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            position: relative;
        }

        /* ── 왼쪽 AI 구역 ── */
        .ai-guide-zone {
            flex: 1.2;
            background: #E1F5FE;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 30px;
            border-right: 2px solid #B3E5FC;
            position: relative;
        }

        .ai-character {
            width: 240px;
            height: 240px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4FC3F7 0%, #2196F3 100%);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            box-shadow: 0 0 50px rgba(79, 195, 247, 0.4), inset 0 0 20px rgba(255, 255, 255, 0.3);
            animation: waveMorph 8s linear infinite alternate;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .eyes {
            display: flex;
            gap: 40px;
            filter: drop-shadow(0 0 10px white);
        }

        .eye {
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }

        @keyframes waveMorph {
            0% {
                border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            }
            50% {
                border-radius: 45% 55% 50% 50% / 50% 50% 50% 50%;
            }
            100% {
                border-radius: 30% 70% 70% 30% / 40% 60% 30% 70%;
            }
        }

        .listening .ai-character {
            background: linear-gradient(135deg, #00B0FF 0%, #0081CB 100%);
            animation: waveMorph 3s linear infinite alternate, float 1.5s infinite ease-in-out;
            transform: scale(1.05);
        }

        .listening .eye {
            transform: scaleY(0.1);
            background: #E1F5FE;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(5deg);
            }
        }

        .ai-character::before {
            content: '';
            position: absolute;
            bottom: -50px;
            width: 150px;
            height: 20px;
            background: rgba(2, 136, 209, 0.1);
            border-radius: 50%;
            filter: blur(10px);
            animation: shadowScale 1.5s infinite ease-in-out;
        }

        @keyframes shadowScale {
            0%, 100% {
                transform: scale(1);
                opacity: 0.3;
            }
            50% {
                transform: scale(1.3);
                opacity: 0.1;
            }
        }

        .stt-bubble {
            margin-top: 24px;
            background: white;
            padding: 16px 22px;
            border-radius: 22px;
            font-size: 1.05rem;
            font-weight: 600;
            color: #333;
            text-align: center;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.06);
            max-width: 95%;
            min-height: 2.5em;
            line-height: 1.5;
            word-break: keep-all;
        }

        .countdown-bar-wrap {
            width: 90%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 14px;
            overflow: hidden;
            display: none;
        }

        .countdown-bar-wrap.active {
            display: block;
        }

        .countdown-bar {
            height: 100%;
            width: 100%;
            background: var(--guide-blue);
            border-radius: 3px;
            transition: width linear;
        }

        .mic-btn {
            margin-top: 28px;
            width: 76px;
            height: 76px;
            border-radius: 50%;
            background: #FF5252;
            border: 4px solid #fff;
            font-size: 1.9rem;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 0 #C62828;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        .mic-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #C62828;
        }

        .mic-btn:disabled {
            background: #aaa;
            box-shadow: 0 8px 0 #777;
            cursor: not-allowed;
        }

        /* ── 오른쪽 콘텐츠 구역 ── */
        .content-zone {
            flex: 1.5;
            background: white;
            padding: 32px 36px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .content-header {
            font-size: 1.45rem;
            font-weight: 900;
            color: var(--guide-blue-dark);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-card {
            background: #F9FAFB;
            border-left: 7px solid var(--guide-blue);
            padding: 22px;
            border-radius: 14px;
            line-height: 1.7;
            color: #333;
            font-size: 1rem;
            white-space: pre-wrap;
            word-break: keep-all;
        }

        .stt-result-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #E3F2FD;
            border: 1.5px solid #90CAF9;
            color: #1565C0;
            font-size: 0.88rem;
            font-weight: 700;
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .settings-panel {
            background: #F0F4F8;
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 16px;
        }

        .settings-panel summary {
            font-weight: 800;
            color: var(--guide-blue-dark);
            cursor: pointer;
            font-size: 0.95rem;
            user-select: none;
        }

        .settings-body {
            margin-top: 14px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .setting-row {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .setting-label {
            font-size: 0.88rem;
            font-weight: 700;
            color: #555;
            width: 52px;
            flex-shrink: 0;
        }

        .voice-btns {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .voice-btn {
            padding: 6px 14px;
            border-radius: 20px;
            border: 2px solid #ddd;
            background: white;
            font-size: 0.82rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            color: #555;
        }

        .voice-btn.selected {
            border-color: var(--guide-blue);
            background: var(--guide-blue);
            color: white;
        }

        .speed-slider {
            flex: 1;
            accent-color: var(--guide-blue);
        }

        .speed-value {
            font-size: 0.88rem;
            font-weight: 800;
            color: var(--guide-blue-dark);
            width: 36px;
            text-align: right;
        }

        #emptyMsg {
            text-align: center;
            color: #bbb;
            margin-top: 60px;
            font-size: 1rem;
            line-height: 1.8;
        }

        .feedback-box {
            margin-top: 16px;
            padding: 18px;
            background: #F5F5F5;
            border-radius: 16px;
            display: none;
        }

        .feedback-box.active {
            display: block;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .feedback-title {
            font-weight: 800;
            color: var(--guide-blue-dark);
            font-size: 0.95rem;
        }

        .feedback-hint {
            font-size: 0.82rem;
            color: #888;
            margin: 6px 0 0;
        }

        .virtual-input {
            width: 100%;
            border: 1.5px solid #ddd;
            border-radius: 10px;
            padding: 10px 12px;
            margin-top: 10px;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            background: white;
            min-height: 44px;
            cursor: pointer;
            word-break: break-all;
        }

        .virtual-input:focus, .virtual-input.focus {
            border-color: var(--guide-blue);
        }

        /* ── 가상 키보드 ── */
        .vk-wrap {
            margin-top: 10px;
            display: none;
            flex-direction: column;
            gap: 6px;
        }

        .vk-wrap.active {
            display: flex;
        }

        .vk-row {
            display: flex;
            gap: 5px;
            justify-content: center;
        }

        .vk-key {
            min-width: 38px;
            height: 40px;
            padding: 0 8px;
            border-radius: 8px;
            border: 1.5px solid #ddd;
            background: white;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.15s;
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }

        .vk-key:active {
            background: #E3F2FD;
            border-color: var(--guide-blue);
        }

        .vk-key.wide {
            min-width: 80px;
            background: #ECEFF1;
        }

        .vk-key.space {
            min-width: 160px;
            background: #ECEFF1;
        }

        .vk-key.del {
            min-width: 60px;
            background: #FFEBEE;
            color: #C62828;
            border-color: #FFCDD2;
        }

        .vk-key.confirm-key {
            min-width: 80px;
            background: var(--guide-blue);
            color: white;
            border-color: var(--guide-blue-dark);
        }

        .vk-lang-btn {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1.5px solid var(--guide-blue);
            background: white;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--guide-blue-dark);
            cursor: pointer;
            margin-bottom: 2px;
            align-self: flex-end;
        }

        .action-btns {
            display: flex;
            gap: 12px;
            margin-top: auto;
            padding-top: 18px;
        }

        .btn {
            flex: 1;
            padding: 18px;
            border-radius: 14px;
            border: none;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-retry {
            background: #E0E0E0;
            color: #666;
        }

        .btn-confirm {
            background: var(--guide-blue);
            color: white;
        }

        .btn:hover {
            filter: brightness(0.95);
        }

        .spinner {
            display: none;
            width: 22px;
            height: 22px;
            border: 3px solid #ccc;
            border-top-color: var(--guide-blue);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-left: 8px;
        }

        .spinner.active {
            display: inline-block;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>

<div class="kiosk-frame">

    <div class="ai-guide-zone" id="aiZone">
        <div class="ai-character" id="char">
            <div class="eyes">
                <div class="eye"></div>
                <div class="eye"></div>
            </div>
        </div>

        <div class="stt-bubble" id="sttDisplay">
            🎮 게임에 대해 궁금한 점을 물어보세요!<br>
            <small style="color:#999; font-weight:400;">"스플렌더 설명해줘" 처럼 말씀해 주세요</small>
        </div>

        <div class="countdown-bar-wrap" id="countdownWrap">
            <div class="countdown-bar" id="countdownBar"></div>
        </div>

        <button class="mic-btn" id="micBtn" onclick="startListening()" title="마이크 버튼">🎤</button>
        <audio id="audioPlayer"></audio>
    </div>

    <div class="content-zone">

        <div class="content-header">
            🔍 AI 가이드의 설명
            <div class="spinner" id="spinner"></div>
        </div>

        <details class="settings-panel" id="settingsPanel">
            <summary>⚙️ AI 목소리 / 속도 설정</summary>
            <div class="settings-body">
                <div class="setting-row">
                    <span class="setting-label">목소리</span>
                    <div class="voice-btns" id="voiceBtns">
                        <button class="voice-btn selected" data-voice="NOVA" onclick="selectVoice(this)">Nova (기본)
                        </button>
                        <button class="voice-btn" data-voice="ALLOY" onclick="selectVoice(this)">Alloy</button>
                        <button class="voice-btn" data-voice="SHIMMER" onclick="selectVoice(this)">Shimmer</button>
                        <button class="voice-btn" data-voice="ECHO" onclick="selectVoice(this)">Echo</button>
                        <button class="voice-btn" data-voice="FABLE" onclick="selectVoice(this)">Fable</button>
                        <button class="voice-btn" data-voice="ONYX" onclick="selectVoice(this)">Onyx</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">속도</span>
                    <input type="range" class="speed-slider" id="speedSlider"
                           min="0.5" max="2.0" step="0.1" value="1.0"
                           oninput="updateSpeedLabel(this.value)">
                    <span class="speed-value" id="speedValue">1.0x</span>
                </div>
            </div>
        </details>

        <div id="displayArea" style="flex:1;">
            <div id="emptyMsg">
                BOARD WAVE AI가 게임 사용법에 대한 <br>
                궁금한 점을 해결해 드립니다! <br><br>
                왼쪽 🎤 버튼을 눌러 질문해보세요.<br>
                메뉴로 돌아가고 싶으실 경우 '확인 완료' 버튼을 눌러주세요!
            </div>
        </div>

        <div class="feedback-box" id="feedbackBox">
            <div class="feedback-title">💡 제가 잘못 이해했나요?</div>
            <p class="feedback-hint">아래 키보드로 질문을 입력하면 다시 답변해드릴게요.</p>

            <div class="virtual-input" id="virtualInputDisplay" onclick="openVirtualKeyboard()">
                <span id="inputText" style="color:#999;">여기를 눌러 입력하세요...</span>
            </div>

            <div class="vk-wrap" id="vkWrap">
                <div id="vkRows"></div>
                <div class="vk-row">
                    <button class="vk-key wide" id="langBtn" onclick="toggleLang()">한/EN</button>
                    <button class="vk-key space" onclick="vkType(' ')">스페이스</button>
                    <button class="vk-key del" onclick="vkDel()">⌫ 삭제</button>
                    <button class="vk-key confirm-key" onclick="applyFeedback()">✓ 전송</button>
                </div>
            </div>

            <button class="btn btn-confirm"
                    style="width:100%; margin-top:10px; padding:12px;"
                    onclick="applyFeedback()">
                ✏️ 다시 질문하기
            </button>
        </div>

        <div class="action-btns">
            <button class="btn btn-retry" onclick="toggleFeedback()">설명 수정 요청</button>
            <button class="btn btn-confirm" onclick="resetAll()">확인 완료</button>
        </div>
    </div>
</div>

<script>

    // 상태 변수
    let isListening = false;  // 현재 사용자의 말을 듣고 있는 중인지
    let isSpeaking = false;  // AI가 답변을 말하고 있는 중인지
    let selectedVoice = 'NOVA';  // 선택된 TTS 목소리 (기본값)
    let selectedSpeed = 1.0;  // TTS 재생 속도 (기본값)

    // 한글 자모 조합을 위한 데이터 구조
    let vkInputArray = [];   // 클릭한 자모를 순서대로 담는 배열
    let vkInputValue = '';   // 조합이 완료된 최종 문장

    let isKorean = true; // 한/영 전환 상태

    // 무음 감지
    let silenceTimer = null;
    let countdownInterval = null;
    const SILENCE_TIMEOUT = 5000;

    // Web Audio API
    let audioContext = null;  // 오디오 처리 전체 컨텍스트
    let analyser = null;  // 음성 크기(진폭) 분석기(무음 감지용)
    let mediaStream = null;
    let mediaRecorder = null;  // 실제 음성을 녹음하여 데이터로 만드는 객체
    let recordedChunks = [];  // 녹음된 데이터 조각들을 모으는 배열

    // DOM
    const audioPlayer = document.getElementById('audioPlayer');
    const micBtn = document.getElementById('micBtn');
    const sttDisplay = document.getElementById('sttDisplay');
    const aiZone = document.getElementById('aiZone');
    const spinner = document.getElementById('spinner');
    const countdownWrap = document.getElementById('countdownWrap');
    const countdownBar = document.getElementById('countdownBar');

    document.addEventListener('DOMContentLoaded', () => {
        audioPlayer.addEventListener('ended', () => {
            isSpeaking = false;
            stopAnimation();
            sttDisplay.innerText = '🎤 마이크 버튼을 눌러 다시 질문해보세요.';
        });
        renderVirtualKeyboard();
    });

    /* 1. 음성 녹음 및 무음 감지 로직 */
    // 마이크 녹음
    async function startListening() {
        // 중복 실행 방지
        if (isListening || isSpeaking) return;

        try {
            // 1. 마이크 권한 획득 및 녹음 시작
            mediaStream = await navigator.mediaDevices.getUserMedia({audio: true});
            isListening = true;
            recordedChunks = [];  // 데이터 초기화

            micBtn.disabled = true;
            setListeningState(true);
            sttDisplay.innerText = '🎙️ 듣고 있어요... 말씀해주세요!';

            // 2. 실시간 음량 체크
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;
            audioContext.createMediaStreamSource(mediaStream).connect(analyser);

            // 3. 녹음기 설정 및 데이터 수집 시작
            mediaRecorder = new MediaRecorder(mediaStream, {mimeType: 'audio/webm'});
            mediaRecorder.ondataavailable = e => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = onRecordingStop;  // 녹음 중단 시 후처리 함수 지정
            mediaRecorder.start(100);  // 0.1초마다 데이터 수집

            startSilenceDetection();  // 무음 감지 타이머 작동
        } catch (err) {
            console.error('마이크 초기화 실패:', err);
            sttDisplay.innerText = '⚠️ 마이크를 사용할 수 없습니다.';
            isListening = false;
            micBtn.disabled = false;
        }
    }

    /* 무음 감지 로직 */
    // 사용자가 말을 멈추면 5초 뒤 자동 종료
    function startSilenceDetection() {
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        const VOLUME_THRESHOLD = 10;  // 소리로 간주할 최소 음량
        startCountdownBar();

        function checkSilence() {
            if (!isListening) return;
            analyser.getByteFrequencyData(dataArray);

            // 현재 평균 음량 계산
            const avg = dataArray.reduce((a, b) => a + b, 0) / dataArray.length;

            // 목소리가 감지되면 타이머를 계속 리셋(연장0
            if (avg > VOLUME_THRESHOLD) resetSilenceTimer();
            requestAnimationFrame(checkSilence);  // 다음 프레임에서 또 체크
        }

        resetSilenceTimer();
        requestAnimationFrame(checkSilence);
    }

    function resetSilenceTimer() {
        clearTimeout(silenceTimer);
        clearInterval(countdownInterval);
        startCountdownBar();
        silenceTimer = setTimeout(() => {
            if (isListening) stopRecording();
        }, SILENCE_TIMEOUT);
    }

    function startCountdownBar() {
        countdownWrap.classList.add('active');
        countdownBar.style.transition = 'none';
        countdownBar.style.width = '100%';
        requestAnimationFrame(() => requestAnimationFrame(() => {
            countdownBar.style.transition = `width ${SILENCE_TIMEOUT}ms linear`;
            countdownBar.style.width = '0%';
        }));
    }

    function stopRecording() {
        if (!isListening) return;
        isListening = false;
        clearTimeout(silenceTimer);
        clearInterval(countdownInterval);
        countdownWrap.classList.remove('active');
        if (mediaRecorder?.state !== 'inactive') mediaRecorder.stop();
        mediaStream?.getTracks().forEach(t => t.stop());
        audioContext?.close();
    }

    /* 서버 통신 (STT/TTS API 호출) */
    // 녹음 종료 → 백엔드 전송
    async function onRecordingStop() {
        setListeningState(false);
        sttDisplay.innerText = '🤔 분석 중입니다...';
        setSpinner(true);

        try {
            // 1. 모인 녹음 조각들을 하나의 파일(Blob)로 변합
            const audioBlob = new Blob(recordedChunks, {type: 'audio/webm'});
            const formData = new FormData();
            formData.append('question', audioBlob, 'speech.webm');
            formData.append('voice', selectedVoice);
            formData.append('speed', String(selectedSpeed));

            // 2. 서버 AI API 호출
            const response = await fetch('/api/ai/ai_guide', {
                method: 'POST',
                headers: {'Accept': 'application/octet-stream'},
                body: formData
            });

            if (!response.ok) throw new Error(`서버 오류: ${response.status}`);

            // 3. 헤더에 담긴 텍스트 정보 추출 (Base64 인코딩된 한글 데이터 디코딩)
            const sttEncoded = response.headers.get('X-STT-Text');
            const answerEncoded = response.headers.get('X-Answer-Text');

            const sttText = sttEncoded ? decodeBase64Utf8(sttEncoded) : '';  // 내가 한 말 표시
            const answerText = answerEncoded ? decodeBase64Utf8(answerEncoded) : '';  // AI 답변 카드 노출

            if (sttText) sttDisplay.innerText = `🗣️ "${sttText}"`;
            if (answerText) showAnswerCard(answerText);

            // 4. 응답 바디(Body)에 담긴 오디오 데이터 재생
            await playAudioResponse(response);

        } catch (err) {
            console.error('AI 응답 실패:', err);
            sttDisplay.innerText = '😢 죄송합니다. 다시 말씀해 주시겠어요?';
            showAnswerCard('오류가 발생했습니다. 마이크 버튼을 눌러 다시 시도해주세요.');
        } finally {
            setSpinner(false);
            micBtn.disabled = false;
        }
    }

    function decodeBase64Utf8(encoded) {
        try {
            const binary = atob(encoded);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            return new TextDecoder('utf-8').decode(bytes);
        } catch (e) {
            return '';
        }
    }

    async function playAudioResponse(response) {
        const arrayBuffer = await response.arrayBuffer();
        const blob = new Blob([arrayBuffer], {type: 'audio/mpeg'});
        const url = URL.createObjectURL(blob);

        audioPlayer.src = url;
        audioPlayer.onloadeddata = () => {
            isSpeaking = true;
            setSpeakingState(true);
            sttDisplay.innerText = '🔊 답변을 말씀드릴게요.';
            audioPlayer.play();
        };
        audioPlayer.onerror = () => {
            sttDisplay.innerText = '⚠️ 음성 재생에 실패했습니다.';
        };
        audioPlayer.onended = () => {
            URL.revokeObjectURL(url);
        };
    }

    /* 한글 자모 타이핑 (가상 키보드) */
    async function applyFeedback() {
        const revisedText = vkInputValue.trim();
        if (!revisedText) {
            alert('질문 내용을 입력해주세요.');
            return;
        }

        document.getElementById('feedbackBox').classList.remove('active');
        closeVirtualKeyboard();
        sttDisplay.innerText = `✏️ "${revisedText}"`;
        setSpinner(true);
        micBtn.disabled = true;

        try {
            const formData = new FormData();
            formData.append('question', revisedText);
            formData.append('voice', selectedVoice);
            formData.append('speed', String(selectedSpeed));

            const response = await fetch('/api/ai/ai_guide_text', {
                method: 'POST',
                headers: {'Accept': 'application/octet-stream'},
                body: formData
            });

            if (!response.ok) throw new Error(`서버 오류: ${response.status}`);

            const answerEncoded = response.headers.get('X-Answer-Text');
            const answerText = answerEncoded ? decodeBase64Utf8(answerEncoded) : '';
            if (answerText) showAnswerCard(answerText);

            await playAudioResponse(response);

        } catch (err) {
            console.error('텍스트 질문 실패:', err);
            sttDisplay.innerText = '😢 죄송합니다. 다시 시도해주세요.';
        } finally {
            setSpinner(false);
            micBtn.disabled = false;
            // 입력 데이터 초기화
            vkInputArray = [];
            vkInputValue = '';
            updateInputDisplay();  // 실시간 조합 후 화면 갱신
        }
    }

    /* 가상 키보드  */
    const KO_ROWS = [
        ['ㅂ', 'ㅈ', 'ㄷ', 'ㄱ', 'ㅅ', 'ㅛ', 'ㅕ', 'ㅑ', 'ㅐ', 'ㅔ'],
        ['ㅁ', 'ㄴ', 'ㅇ', 'ㄹ', 'ㅎ', 'ㅗ', 'ㅓ', 'ㅏ', 'ㅣ'],
        ['ㅋ', 'ㅌ', 'ㅊ', 'ㅍ', 'ㅠ', 'ㅜ', 'ㅡ']
    ];
    const EN_ROWS = [
        ['q', 'w', 'e', 'r', 't', 'y', 'u', 'i', 'o', 'p'],
        ['a', 's', 'd', 'f', 'g', 'h', 'j', 'k', 'l'],
        ['z', 'x', 'c', 'v', 'b', 'n', 'm']
    ];

    function renderVirtualKeyboard() {
        const rows = isKorean ? KO_ROWS : EN_ROWS;
        const vkRows = document.getElementById('vkRows');
        vkRows.innerHTML = rows.map(row =>
            `<div class="vk-row">` +
            row.map(k => `<button class="vk-key" onclick="vkType('${k}')">${k}</button>`).join('') +
            `</div>`
        ).join('');
    }

    function toggleLang() {
        isKorean = !isKorean;
        renderVirtualKeyboard();
    }

    // 자모를 배열에 쌓음
    function vkType(char) {
        vkInputArray.push(char);
        updateInputDisplay();
    }

    // 배열에서 마지막 자모 제거
    function vkDel() {
        vkInputArray.pop();
        updateInputDisplay();
    }

    // hangul-js를 이용해 실시간으로 조합된 한글 표시
    function updateInputDisplay() {
        const el = document.getElementById('inputText');

        // Hangul.assemble()이 배열에 담긴 'ㅎ','ㅏ','ㄹ'을 '할'로 합쳐줍니다.
        vkInputValue = Hangul.assemble(vkInputArray);

        if (vkInputValue) {
            el.style.color = '#333';
            el.textContent = vkInputValue;
        } else {
            el.style.color = '#999';
            el.textContent = '여기를 눌러 입력하세요...';
        }
    }

    function openVirtualKeyboard() {
        document.getElementById('vkWrap').classList.add('active');
        document.getElementById('virtualInputDisplay').classList.add('focus');
    }

    function closeVirtualKeyboard() {
        document.getElementById('vkWrap').classList.remove('active');
        document.getElementById('virtualInputDisplay').classList.remove('focus');
    }

    /* 설정 / 목소리 / 속도 */
    function selectVoice(btn) {
        document.querySelectorAll('.voice-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedVoice = btn.dataset.voice;
    }

    function updateSpeedLabel(val) {
        selectedSpeed = parseFloat(val);
        document.getElementById('speedValue').innerText = `${selectedSpeed.toFixed(1)}x`;
    }

    /* UI 헬퍼 */
    function setListeningState(active) {
        aiZone.classList.toggle('listening', active);
        if (active) aiZone.classList.remove('speaking');
    }

    function setSpeakingState(active) {
        aiZone.classList.toggle('speaking', active);
        if (active) aiZone.classList.remove('listening');
    }

    function stopAnimation() {
        aiZone.classList.remove('listening', 'speaking');
    }

    function setSpinner(active) {
        spinner.classList.toggle('active', active);
    }

    function showAnswerCard(text) {
        const displayArea = document.getElementById('displayArea');
        const emptyMsg = document.getElementById('emptyMsg');
        if (emptyMsg) emptyMsg.style.display = 'none';
        displayArea.innerHTML = `<div class="info-card">${text}</div>`;
    }

    function toggleFeedback() {
        const box = document.getElementById('feedbackBox');
        box.classList.toggle('active');
        if (box.classList.contains('active')) {
            setTimeout(() => openVirtualKeyboard(), 50);
        } else {
            closeVirtualKeyboard();
        }
    }

    function resetAll() {
        if (confirm('대화를 종료하고 이전 화면으로 돌아갈까요?')) {
            window.history.back();
        }
    }
</script>
</body>
</html>
