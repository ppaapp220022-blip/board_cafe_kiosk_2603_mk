<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>정산 - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      background-color: #f4f6f8;
    }

    .container {
      width: 100%;
      max-width: 700px;
      padding: 20px;
      box-sizing: border-box;
      max-height: 95vh;
      overflow-y: auto;
    }

    .container::-webkit-scrollbar { width: 8px; }
    .container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
    .container::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 10px; }
    .container::-webkit-scrollbar-thumb:hover { background: #888; }

    .page-title {
      font-size: 2rem;
      margin: 0 0 24px 0;
      color: #111;
      text-align: center;
      font-weight: 700;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 28px;
      margin-bottom: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 18px;
      color: #333;
    }

    .card-header i { width: 26px; height: 26px; color: #007bff; }

    /* 주문 내역 */
    .order-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 1.05rem;
      color: #333;
    }

    .order-item:last-child { border-bottom: none; }
    .order-qty { color: #888; font-size: 0.95rem; margin-left: 6px; }
    .price { color: #007bff; font-weight: bold; }

    .summary-divider {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eaeaea;
      display: flex;
      justify-content: space-between;
      color: #888;
      font-size: 1.1rem;
    }

    /* 세션 정보 */
    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-size: 1.05rem;
      color: #333;
    }

    .info-row:last-child { margin-bottom: 0; }

    .info-label {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #888;
    }

    .info-label i { width: 18px; height: 18px; }

    /* 포인트 카드 */
    .point-card {
      background: linear-gradient(135deg, #fff8e1 0%, #fff3cd 100%);
      border: 1px solid #ffe082;
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    .point-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .point-card-title {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      font-weight: bold;
      color: #e65100;
    }

    .point-card-title i { width: 22px; height: 22px; }

    .point-balance-badge {
      background: #ff9800;
      color: white;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.95rem;
      font-weight: 700;
    }

    .point-input-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .point-input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #ffe082;
      border-radius: 12px;
      font-size: 1rem;
      background: white;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    .point-input:focus { border-color: #ff9800; }

    .point-apply-btn {
      padding: 12px 20px;
      background: #ff9800;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .point-apply-btn:hover { background: #f57c00; }

    .point-reset-btn {
      padding: 12px 16px;
      background: #f0f2f5;
      color: #888;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .point-reset-btn:hover { background: #e0e2e7; }

    .point-applied-msg {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #e65100;
      font-weight: 600;
      display: none;
    }

    .no-point-msg {
      font-size: 0.95rem;
      color: #888;
      text-align: center;
      padding: 8px 0;
    }

    /* 최종 금액 */
    .amount-breakdown {
      margin-bottom: 16px;
    }

    .amount-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      font-size: 1.05rem;
      color: #555;
      border-bottom: 1px solid #f0f0f0;
    }

    .amount-row:last-child { border-bottom: none; }
    .amount-row.discount { color: #f44336; }
    .amount-row.discount span:last-child { font-weight: 700; }

    .final-box {
      background: #eef6ff;
      border: 2px solid #d0e4ff;
      border-radius: 20px;
      padding: 24px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .final-box-label { font-size: 1.3rem; font-weight: bold; color: #333; }

    .final-box-amount {
      font-size: 2.8rem;
      font-weight: 800;
      color: #007bff;
    }

    /* 현금 안내 */
    .cash-notice {
      background: #fff8e1;
      border: 1px solid #ffe082;
      color: #d84315;
      padding: 18px 20px;
      border-radius: 16px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .cash-notice i { width: 22px; height: 22px; flex-shrink: 0; margin-top: 2px; }
    .cash-notice h3 { margin: 0 0 4px 0; font-weight: 600; font-size: 0.95rem; }
    .cash-notice p { margin: 0; font-size: 0.85rem; color: #888; }

    /* 결제 수단 */
    .payment-methods {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .payment-method {
      padding: 20px;
      border: 2px solid #eaeaea;
      border-radius: 16px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .payment-method:hover { border-color: #007bff; background: #eef6ff; }
    .payment-method.active { border-color: #007bff; background: #eef6ff; }
    .payment-method i { width: 30px; height: 30px; color: #007bff; margin-bottom: 10px; }
    .payment-method-name { font-weight: 600; color: #333; font-size: 0.95rem; }

    /* 버튼 */
    .button-group { display: flex; gap: 14px; margin-top: 4px; }

    .pay-btn, .back-btn {
      flex: 1;
      padding: 22px;
      border: none;
      border-radius: 20px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.2s ease;
    }

    .pay-btn {
      background: #007bff;
      color: white;
      box-shadow: 0 8px 20px rgba(0, 123, 255, 0.3);
    }

    .pay-btn:hover { background: #0056b3; box-shadow: 0 10px 25px rgba(0, 123, 255, 0.4); }
    .pay-btn:active { transform: scale(0.98); }
    .pay-btn:disabled { background: #b0c9f0; box-shadow: none; cursor: not-allowed; }
    .pay-btn i, .back-btn i { width: 24px; height: 24px; }

    .back-btn { background: #f0f2f5; color: #888; }
    .back-btn:hover { background: #e0e2e7; color: #555; }

    /* 토스트 */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #333;
      color: white;
      padding: 14px 22px;
      border-radius: 12px;
      z-index: 2000;
      font-size: 0.95rem;
      animation: slideInUp 0.3s ease;
    }

    @keyframes slideInUp {
      from { transform: translateY(80px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
  </style>
</head>
<body>

<div class="container">
  <h1 class="page-title">🧾 정산하기</h1>

  <!-- 주문 내역 -->
  <div class="card" id="order-summary">
    <div class="card-header"><i data-lucide="shopping-bag"></i> 주문 내역</div>
  </div>

  <div class="card">
    <div class="card-header"><i data-lucide="clock"></i> 이용 정보</div>
    <div class="info-row">
      <span class="info-label"><i data-lucide="timer"></i> 이용 시간</span>
      <span id="elapsed-time">계산 중...</span>
    </div>
    <div class="info-row">
      <span class="info-label"><i data-lucide="users"></i> 인원</span>
      <span th:text="${partySize} + '명'">2명</span>
    </div>
    <!-- 패키지명 추가 -->
    <div class="info-row" th:if="${packageName != null and packageName != ''}">
      <span class="info-label"><i data-lucide="package"></i> 패키지</span>
      <span th:text="${packageName}">패키지명</span>
    </div>
    <!-- 패키지 금액 추가 -->
    <div class="info-row" th:if="${packageTotal > 0}">
      <span class="info-label"><i data-lucide="tag"></i> 패키지 금액</span>
      <span th:text="'₩' + ${#numbers.formatInteger(packageTotal, 0, 'COMMA')}">₩0</span>
    </div>
  </div>

  <!-- 포인트 사용 (전화번호 등록된 경우만 표시) -->
  <div class="point-card" id="point-section"
       th:if="${customerPhone != null and customerPhone != ''}">
    <div class="point-card-header">
      <div class="point-card-title">
        <i data-lucide="star"></i> 포인트 사용
      </div>
      <span class="point-balance-badge"
            th:text="'보유 ' + ${pointBalance} + 'P'">보유 0P</span>
    </div>
    <div class="point-input-row">
      <input type="number" class="point-input" id="point-input"
             th:placeholder="'최대 ' + ${pointBalance} + 'P 사용 가능'"
             min="0" th:max="${pointBalance}"/>
      <button class="point-apply-btn" onclick="applyPoint()">적용</button>
      <button class="point-reset-btn" onclick="resetPoint()">취소</button>
    </div>
    <div class="point-applied-msg" id="point-applied-msg">
      ✅ <span id="point-applied-amount">0</span>P 사용 적용됨
    </div>
  </div>

  <!-- 포인트 미등록 안내 -->
  <div class="point-card" th:if="${customerPhone == null or customerPhone == ''}">
    <div class="point-card-title" style="margin-bottom: 8px;">
      <i data-lucide="star"></i> 포인트
    </div>
    <p class="no-point-msg">전화번호를 등록하면 포인트를 적립하고 사용할 수 있어요.</p>
  </div>

  <!-- 금액 상세 -->
  <div class="card" id="amount-card">
    <div class="card-header"><i data-lucide="receipt"></i> 결제 금액</div>
    <div class="amount-breakdown">
      <div class="amount-row">
        <span>상품 합계</span>
        <span id="subtotal-amount">₩0</span>
      </div>
      <div class="amount-row discount" id="point-discount-row" style="display:none;">
        <span>포인트 할인</span>
        <span id="point-discount-amount">-₩0</span>
      </div>
    </div>
    <div class="final-box">
      <span class="final-box-label">최종 결제 금액</span>
      <span class="final-box-amount" id="final-total">₩0</span>
    </div>
  </div>

  <!-- 현금 안내 -->
  <div class="card">
    <div class="cash-notice">
      <i data-lucide="banknote"></i>
      <div>
        <h3>현금 결제 안내</h3>
        <p>현금 결제는 카운터 직원에게 직접 요청해 주세요.</p>
      </div>
    </div>
  </div>

  <!-- 토스페이먼츠 위젯 컨테이너 -->
  <div class="card" id="toss-widget-card">
    <div class="card-header"><i data-lucide="credit-card"></i> 결제 수단</div>
    <div id="payment-widget" style="margin-bottom: 20px;"></div>
    <div id="agreement" style="margin-top: 20px;"></div>
  </div>

  <!-- 버튼 -->
  <div class="button-group">
    <button class="pay-btn" id="pay-btn" onclick="processPayment()">
      <i data-lucide="credit-card"></i>
      <span id="pay-btn-label">결제하기</span>
    </button>
    <button class="back-btn" onclick="history.back()">
      <i data-lucide="arrow-left"></i> 돌아가기
    </button>
  </div>
</div>

<script>
  lucide.createIcons({ attrs: { 'stroke-width': 2.5 } });

  const packageName  = '[[${packageName}]]';
  const partySize    = [[${partySize}]];
  const pointBalance   = [[${pointBalance}]];
  const packageTotal  = [[${packageTotal}]];   // 서버에서 받은 패키지 금액
  const sessionStartTime = [[${sessionStartTime}]];
  const tossClientKey  = 'test_ck_YOUR_CLIENT_KEY_HERE'; // TODO: 실제 클라이언트 키로 교체

  let menuSubtotal      = 0;  // 메뉴 합계
  let subtotalPrice = packageTotal; // 패키지 + 메뉴 합계 (초기값 = 패키지)
  let appliedPoint     = 0;

  // ===== 이용 시간 계산 =====
  function updateElapsedTime() {
    if (!sessionStartTime) {
      document.getElementById('elapsed-time').innerText = '0시간 0분';
      return;
    }
    const elapsed = Math.floor((Date.now() - sessionStartTime) / 60000);
    const hours   = Math.floor(elapsed / 60);
    const minutes = elapsed % 60;
    document.getElementById('elapsed-time').innerText = `${hours}시간 ${minutes}분`;
  }
  updateElapsedTime();

  // ===== 페이지 로드 =====
  document.addEventListener('DOMContentLoaded', () => {
    loadCheckoutData();
  });
  // document.addEventListener('DOMContentLoaded', async () => {
  //     // REST API에서 장바구니 데이터 조회
  //     const response = await fetch(`/kiosk/cart/items`, {
  //         method: 'GET'
  //     });
  //     const data = await response.json();
  //     if (data.success) {
  //         cartItems = data.cartItems || [];
  //         totalPrice = data.totalPrice || 0;
  //     }
  //     renderCheckout(cartItems, totalPrice);
  //     await initializeTossWidget();
  // });

  // ===== 장바구니 데이터 로드 =====
  function loadCheckoutData() {
    fetch(`/kiosk/cart/items`)
            .then(r => r.json())
            .then(data => {
              if (data.success) renderCheckout(data.cartItems, data.totalPrice);
              else renderCheckout([], 0); // 장바구니 없음 → 패키지만 표시
            })
            .catch(() => showErrorPage()); // 실제 오류만 에러 페이지
  }

  // ===== 주문 내역 렌더링 =====
  function renderCheckout(cartItems, totalMenuPrice) {
    menuSubtotal  = totalMenuPrice;
    subtotalPrice = packageTotal + menuSubtotal;

    const rows = cartItems.map(item => `
      <div class="order-item">
        <div>
          <span>${item.menuName}</span>
          <span class="order-qty">x${item.quantity}</span>
        </div>
        <div class="price">₩${(item.menuPrice * item.quantity).toLocaleString()}</div>
      </div>`).join('');

    const emptyMsg = cartItems.length === 0
            ? `<p style="color:#aaa;text-align:center;padding:12px 0;">추가 주문 없음</p>` : '';

    document.getElementById('order-summary').innerHTML = `
  <div class="card-header"><i data-lucide="shopping-bag"></i> 주문 내역</div>
  ${rows}
  ${emptyMsg}
  <div class="summary-divider">
    <span>메뉴 소계</span>
    <span>₩${menuSubtotal.toLocaleString()}</span>
  </div>`;

    updateAmounts();
    lucide.createIcons();
  }

  // ===== 금액 업데이트 =====
  function updateAmounts() {
    const finalAmount = Math.max(subtotalPrice - appliedPoint, 0);

    document.getElementById('subtotal-amount').innerText = `₩${subtotalPrice.toLocaleString()}`;
    document.getElementById('final-total').innerText = `₩${finalAmount.toLocaleString()}`;

    const discountRow = document.getElementById('point-discount-row');
    if (appliedPoint > 0) {
      discountRow.style.display = 'flex';
      document.getElementById('point-discount-amount').innerText = `-₩${appliedPoint.toLocaleString()}`;
    } else {
      discountRow.style.display = 'none';
    }
  }

  // ===== 포인트 적용 =====
  function applyPoint() {
    const input = document.getElementById('point-input');
    const val   = parseInt(input.value) || 0;

    if (val <= 0) {
      showToast('1P 이상 입력해주세요.');
      return;
    }
    if (val > pointBalance) {
      showToast(`보유 포인트(${pointBalance}P)를 초과할 수 없습니다.`);
      input.value = pointBalance;
      return;
    }
    if (val > subtotalPrice) {
      showToast('결제 금액을 초과하여 사용할 수 없습니다.');
      input.value = subtotalPrice;
      return;
    }

    appliedPoint = val;
    document.getElementById('point-applied-amount').innerText = val.toLocaleString();
    document.getElementById('point-applied-msg').style.display = 'block';
    input.disabled = true;
    updateAmounts();
    updateWidgetAmount();
    showToast(`${val.toLocaleString()}P 적용되었습니다.`);
  }

  // ===== 포인트 취소 =====
  function resetPoint() {
    appliedPoint = 0;
    const input  = document.getElementById('point-input');
    input.value  = '';
    input.disabled = false;
    document.getElementById('point-applied-msg').style.display = 'none';
    updateAmounts();
    updateWidgetAmount();
  }

  // ===== 위젯 금액 업데이트 =====
  function updateWidgetAmount() {
    if (tossPaymentsWidget) {
      const newAmount = Math.max(subtotalPrice - appliedPoint, 0);
      tossPaymentsWidget.setAmount(newAmount);
      console.log('위젯 금액 업데이트:', newAmount);
    }
  }

  // ===== 결제 처리 =====
  function processPayment() {
    if (subtotalPrice === 0) { showToast('장바구니가 비어있습니다.'); return; }
    processTossPayment();
  }

  // ===== 토스페이먼츠 위젯 초기화 =====
  let tossPaymentsWidget;
  let orderId;
  let finalAmount;

  async function initializeTossWidget() {
    try {
      // 1. 백엔드에서 orderId / amount / clientKey 발급
      console.log('결제 준비 요청:', { tableNumber, appliedPoint });

      const prepRes  = await fetch(`/kiosk/toss/prepare`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ pointUsed: appliedPoint })
      });

      if (!prepRes.ok) {
        showToast(`결제 준비 요청 실패 (${prepRes.status})`);
        return;
      }

      const prepData = await prepRes.json();
      console.log('준비 응답:', prepData);

      if (!prepData.success) {
        showToast(prepData.message || '결제 준비에 실패했습니다.');
        return;
      }

      // 2. 위젯 초기화
      console.log('토스 클라이언트 키:', prepData.clientKey);
      orderId = prepData.orderIdToss;
      finalAmount = prepData.amount;

      tossPaymentsWidget = TossPaymentsWidget({ clientKey: prepData.clientKey });

      // 3. 위젯 설정 및 렌더링
      tossPaymentsWidget.setAmount(finalAmount);

      tossPaymentsWidget.render({
        selector: '#payment-widget',
        variantKey: 'DEFAULT'
      });

    } catch (err) {
      console.error('위젯 초기화 오류:', err);
      showToast('결제 준비 중 오류가 발생했습니다.');
    }
  }

  // ===== 토스페이먼츠 결제 요청 =====
  async function processTossPayment() {
    const payBtn = document.getElementById('pay-btn');
    payBtn.disabled = true;
    document.getElementById('pay-btn-label').innerText = '결제 처리 중...';

    try {
      // 위젯 결제 요청
      await tossPaymentsWidget.requestPayment({
        orderId: orderId,
        orderName: '주문',
        customerEmail: 'kiosk@example.com',
        customerName: '키오스크',
        successUrl: `${window.location.origin}/kiosk/toss/success`,
        failUrl: `${window.location.origin}/kiosk/toss/fail`
      });

    } catch (err) {
      // 사용자가 결제를 취소한 경우
      if (err.code === 'USER_CANCEL') {
        console.log('사용자가 결제를 취소했습니다.');
      } else {
        console.error('결제 오류:', err);
        showToast(err.message || '결제 처리 중 오류가 발생했습니다.');
      }
      payBtn.disabled = false;
      document.getElementById('pay-btn-label').innerText = '결제하기';
    }
  }

  // ===== 결제 완료 화면 =====
  function showSuccessPage(orderId, finalAmount, earnedPoints) {
    const pointMsg = earnedPoints > 0
            ? `<div style="background:rgba(255,255,255,0.2);padding:12px 24px;border-radius:14px;margin-bottom:20px;">
           🎁 <strong>${earnedPoints.toLocaleString()}P</strong> 적립 완료!
         </div>`
            : '';

    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;
                  flex-direction:column;background:linear-gradient(135deg,#007bff,#0056b3);
                  color:white;text-align:center;padding:20px;">
        <i data-lucide="circle-check-big" style="width:110px;height:110px;margin-bottom:28px;"></i>
        <h1 style="font-size:2.4rem;font-weight:800;margin:0 0 12px 0;">결제 완료!</h1>
        <p style="font-size:2rem;font-weight:700;margin:0 0 20px 0;">
          ₩${finalAmount.toLocaleString()}
        </p>
        ${pointMsg}
        <p style="font-size:0.9rem;opacity:0.7;margin:0 0 6px 0;">주문번호: #${orderId}</p>
        <p style="font-size:1rem;opacity:0.85;">이용해주셔서 감사합니다 😊</p>
        <p style="font-size:0.9rem;opacity:0.65;margin-top:24px;">3초 후 메인 화면으로 이동합니다...</p>
      </div>`;
    lucide.createIcons();
    localStorage.removeItem('returnUrl');
    setTimeout(() => { window.location.href = `/kiosk/screensaver`; }, 3000);
  }

  // ===== 오류 화면 =====
  function showErrorPage() {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;
                  flex-direction:column;background:#f4f6f8;text-align:center;">
        <i data-lucide="alert-circle" style="width:90px;height:90px;color:#f44336;margin-bottom:20px;"></i>
        <h1 style="font-size:1.8rem;color:#333;margin:0 0 10px 0;">오류가 발생했습니다</h1>
        <p style="color:#888;margin:0 0 28px 0;">장바구니 정보를 불러올 수 없습니다.</p>
        <button onclick="history.back()"
          style="padding:14px 28px;background:#007bff;color:white;border:none;
                 border-radius:12px;font-size:1rem;cursor:pointer;font-weight:600;">
          돌아가기
        </button>
      </div>`;
    lucide.createIcons();
  }

  // ===== 토스트 =====
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2500);
  }
</script>
</body>
</html>
