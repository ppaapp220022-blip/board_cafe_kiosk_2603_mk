<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>BoardWave - Tap to Start</title>
  <style>
    /* 폰트 및 기본 설정 */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap');

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; font-family: 'Pretendard', 'Poppins', sans-serif;
      background-color: #f0f7ff;
    }

    /* 전체 컨테이너: 클릭 영역 */
    .screensaver-container {
      position: relative;
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 10;
    }

    /* 중앙 로고 및 텍스트 */
    .brand-box {
      text-align: center;
      animation: float 3s ease-in-out infinite;
      z-index: 20;
    }

    .brand-name {
      font-family: 'Poppins', sans-serif;
      font-size: 5rem;
      font-weight: 800;
      letter-spacing: -2px;
      margin: 0;
      background: linear-gradient(135deg, #007bff, #00c6ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 10px 10px 20px rgba(0, 123, 255, 0.1);
    }

    .sub-title {
      font-size: 1.5rem;
      color: #555;
      margin-top: 10px;
      letter-spacing: 5px;
      font-weight: 500;
    }

    .touch-info {
      position: absolute;
      bottom: 15%;
      font-size: 1.2rem;
      color: #007bff;
      font-weight: 600;
      opacity: 0.8;
      animation: pulse 2s infinite;
      z-index: 20;
    }

    /* 파도 애니메이션 (CSS) */
    .waves {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 25vh;
      min-height: 150px;
      max-height: 250px;
      z-index: 5;
    }

    .parallax > use {
      animation: move-forever 25s cubic-bezier(.55,.5,.45,.5) infinite;
    }
    .parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 7s; fill: rgba(0,123,255,0.7); }
    .parallax > use:nth-child(2) { animation-delay: -3s; animation-duration: 10s; fill: rgba(0,123,255,0.5); }
    .parallax > use:nth-child(3) { animation-delay: -4s; animation-duration: 13s; fill: rgba(0,123,255,0.3); }
    .parallax > use:nth-child(4) { animation-delay: -5s; animation-duration: 20s; fill: #007bff; }

    /* 키프레임 애니메이션 */
    @keyframes move-forever {
      0% { transform: translate3d(-90px,0,0); }
      100% { transform: translate3d(85px,0,0); }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>

<div class="screensaver-container" id="tap-to-start">
  <div class="brand-box">
    <h1 class="brand-name">BoardWave</h1>
    <p class="sub-title">PREMIUM BOARD GAME CAFE</p>
  </div>

  <p class="touch-info">TOUCH TO START</p>

  <svg class="waves" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
       viewBox="0 24 150 28" preserveAspectRatio="none" shape-rendering="auto">
    <defs>
      <path id="gentle-wave" d="M-160 44c30 0 58-18 88-18s 58 18 88 18 58-18 88-18 58 18 88 18 v44h-352z" />
    </defs>
    <g class="parallax">
      <use xlink:href="#gentle-wave" x="48" y="0" />
      <use xlink:href="#gentle-wave" x="48" y="3" />
      <use xlink:href="#gentle-wave" x="48" y="5" />
      <use xlink:href="#gentle-wave" x="48" y="7" />
    </g>
  </svg>
</div>

<script>
  // 서버에서 주입된 tableNumber
  const TABLE_NUMBER = /*[[${tableNumber}]]*/ 1;

  const screen = document.getElementById('tap-to-start');

  screen.addEventListener('click', function() {
    const returnUrl = localStorage.getItem('returnUrl');

    if (returnUrl) {
      localStorage.removeItem('returnUrl');
      window.location.href = returnUrl;
    } else {
      // 결제 완료 후 or 첫 진입 → 메뉴 화면으로
      window.location.href = `/kiosk/games?tableNumber=${TABLE_NUMBER}`;
    }
  });
</script>
</body>
</html>
