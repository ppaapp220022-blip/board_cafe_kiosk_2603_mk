<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Member Login - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', sans-serif;
      background-color: #f0f2f5;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 500px;
    }

    .icon-header {
      width: 80px; height: 80px;
      background-color: #007bff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      color: white;
    }

    h1 { font-size: 2rem; margin: 10px 0; color: #111; }
    .subtitle { color: #888; margin-bottom: 30px; font-size: 1rem; line-height: 1.5; }

    .phone-display {
      background: white;
      border-radius: 20px;
      padding: 25px;
      font-size: 2.2rem;
      font-weight: bold;
      color: #007bff;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 2px;
    }
    .phone-display:empty::before {
      content: "010-0000-0000";
      color: #e2e4e7;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 30px;
    }

    .key {
      background: white;
      border: none;
      border-radius: 15px;
      padding: 20px;
      font-size: 1.5rem;
      font-weight: bold;
      color: #333;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      transition: all 0.1s ease;
    }

    .key:active {
      background: #eef6ff;
      transform: scale(0.95);
    }

    .key.special {
      background: #f8f9fa;
      color: #888;
      font-size: 1.1rem;
    }

    /* --- 하단 버튼 그룹 수정 --- */
    .button-group {
      display: flex;
      flex-direction: row; /* 가로 배치 */
      gap: 15px;
      padding: 0 5px;
    }

    .action-btn {
      flex: 1; /* 동일한 너비 할당 */
      padding: 22px;
      border: none;
      border-radius: 15px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s ease;
    }

    /* 확인 버튼 스타일 */
    .submit-btn {
      background-color: #e2e4e7;
      color: #a0a3a7;
      cursor: not-allowed;
      flex: 1.5; /* 확인 버튼을 조금 더 크게 강조 */
    }

    .submit-btn.active {
      background-color: #007bff;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
    }

    /* 스킵 버튼 스타일 */
    .skip-btn {
      background-color: #ffffff;
      color: #666;
      border: 1px solid #ddd;
    }

    .skip-btn:active {
      background-color: #f8f9fa;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="icon-header">
    <i data-lucide="smartphone" style="width: 40px; height: 40px;"></i>
  </div>
  <h1>Membership</h1>
  <p class="subtitle">휴대폰 번호를 입력하시면<br>포인트 적립 및 조회가 가능합니다.</p>

  <!-- 폼 추가: 전화번호를 서버로 POST 전송 -->
  <form id="phone-form" action="/kiosk/phone_login" method="post">
    <input type="hidden" id="phone-input" name="phone" value="">
  </form>

  <div id="phone-display" class="phone-display"></div>

  <div class="keypad">
    <button class="key" onclick="appendNumber('1')">1</button>
    <button class="key" onclick="appendNumber('2')">2</button>
    <button class="key" onclick="appendNumber('3')">3</button>
    <button class="key" onclick="appendNumber('4')">4</button>
    <button class="key" onclick="appendNumber('5')">5</button>
    <button class="key" onclick="appendNumber('6')">6</button>
    <button class="key" onclick="appendNumber('7')">7</button>
    <button class="key" onclick="appendNumber('8')">8</button>
    <button class="key" onclick="appendNumber('9')">9</button>
    <button class="key special" onclick="clearAll()">C</button>
    <button class="key" onclick="appendNumber('0')">0</button>
    <button class="key special" onclick="deleteLast()"><i data-lucide="delete"></i></button>
  </div>

  <div class="button-group">
    <button class="action-btn skip-btn" onclick="skipStep()">
      <i data-lucide="log-out" style="width: 20px;"></i>
      적립 없이 계속
    </button>
    <button id="next-button" class="action-btn submit-btn" onclick="identifyMember()">
      <i data-lucide="check-circle" style="width: 20px;"></i>
      확인 및 조회
    </button>
  </div>
</div>

<script>
  lucide.createIcons();

  let rawNumber = "";

  function appendNumber(num) {
    if (rawNumber.length < 11) {
      rawNumber += num;
      renderPhone();
    }
  }

  function deleteLast() {
    rawNumber = rawNumber.slice(0, -1);
    renderPhone();
  }

  function clearAll() {
    rawNumber = "";
    renderPhone();
  }

  function renderPhone() {
    const display = document.getElementById('phone-display');
    const nextBtn = document.getElementById('next-button');

    let formatted = rawNumber;
    if (rawNumber.length > 3 && rawNumber.length <= 7) {
      formatted = rawNumber.slice(0, 3) + "-" + rawNumber.slice(3);
    } else if (rawNumber.length > 7) {
      formatted = rawNumber.slice(0, 3) + "-" + rawNumber.slice(3, 7) + "-" + rawNumber.slice(7);
    }

    display.innerText = formatted;

    if (rawNumber.length >= 10) {
      nextBtn.classList.add('active');
    } else {
      nextBtn.classList.remove('active');
    }
  }

  // 확인 버튼 - 전화번호를 폼에 담아서 POST 전송
  function identifyMember() {
    if (rawNumber.length >= 10) {
      const formatted = rawNumber.slice(0, 3) + "-"
      + rawNumber.slice(3, 7) + "-" + rawNumber.slice(7);
      document.getElementById('phone-input').value = formatted;
      document.getElementById('phone-form').submit();
    }
  }

  // 적립없이 계속 버튼 - phone 빈값으로 POST 전송
  function skipStep() {
    if (confirm("포인트 적립을 포기하시겠습니까?")) {
      document.getElementById('phone-input').value = "";
      document.getElementById('phone-form').submit();
    }
  }
</script>
</body>
</html>
