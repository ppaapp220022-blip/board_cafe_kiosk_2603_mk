<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Party Size - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', sans-serif;
      background-color: #f0f2f5;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; overflow: hidden;
    }

    .container {
      text-align: center;
      width: 100%;
      max-width: 800px;
    }

    .icon-header {
      width: 80px; height: 80px;
      background-color: #007bff;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      color: white;
    }

    h1 { font-size: 2.5rem; margin: 10px 0; color: #111; }
    .subtitle { color: #888; margin-bottom: 40px; font-size: 1.1rem; }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      margin-bottom: 40px;
      padding: 0 20px;
    }

    .number-card {
      background: white;
      border-radius: 20px;
      padding: 30px 10px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 3px solid transparent;
    }

    .number-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .number-card.selected {
      border-color: #007bff;
      background-color: #f0f7ff;
    }

    .number-card i {
      color: #333;
      margin-bottom: 15px;
      width: 32px; height: 32px;
    }

    .number-card span {
      font-size: 1.8rem;
      font-weight: bold;
      color: #111;
    }

    .submit-btn {
      width: calc(100% - 40px);
      margin: 0 20px;
      padding: 20px;
      background-color: #e2e4e7;
      color: #a0a3a7;
      border: none;
      border-radius: 15px;
      font-size: 1.2rem;
      font-weight: bold;
      cursor: not-allowed;
      transition: all 0.3s ease;
    }

    .submit-btn.active {
      background-color: #007bff;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,123,255,0.2);
    }

    .help-btn {
      position: fixed; bottom: 20px; right: 20px;
      background: #333; color: white; width: 40px; height: 40px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="icon-header">
    <i data-lucide="users-round" style="width: 40px; height: 40px;"></i>
  </div>
  <h1>How many people in your party?</h1>
  <p class="subtitle">일행이 몇 명이신가요?</p>
  <!-- form 추가 -->
  <form id="headcount-form" action="/kiosk/headcount" method="POST" style="display:none;">
    <input type="hidden" name="partySize" id="partySize-input">
  </form>

  <div class="grid">
    <div class="number-card" onclick="selectPeople(1, this)">
      <i data-lucide="users"></i>
      <span>1</span>
    </div>
    <div class="number-card" onclick="selectPeople(2, this)">
      <i data-lucide="users"></i>
      <span>2</span>
    </div>
    <div class="number-card" onclick="selectPeople(3, this)">
      <i data-lucide="users"></i>
      <span>3</span>
    </div>
    <div class="number-card" onclick="selectPeople(4, this)">
      <i data-lucide="users"></i>
      <span>4</span>
    </div>
    <div class="number-card" onclick="selectPeople(5, this)">
      <i data-lucide="users"></i>
      <span>5</span>
    </div>
    <div class="number-card" onclick="selectPeople(6, this)">
      <i data-lucide="users"></i>
      <span>6</span>
    </div>
    <div class="number-card" onclick="selectPeople(7, this)">
      <i data-lucide="users"></i>
      <span>7</span>
    </div>
    <div class="number-card" onclick="selectPeople(8, this)">
      <i data-lucide="users"></i>
      <span>8</span>
    </div>
  </div>

  <button id="next-button" class="submit-btn" onclick="goToNext()">인원수를 선택해주세요</button>
</div>

<div class="help-btn">?</div>

<script>
  lucide.createIcons();

  let selectedCount = 0;

  function selectPeople(count, element) {
    const cards = document.querySelectorAll('.number-card');
    cards.forEach(card => card.classList.remove('selected'));

    element.classList.add('selected');
    selectedCount = count;

    const nextBtn = document.getElementById('next-button');
    nextBtn.classList.add('active');
    nextBtn.innerText = `${count}명 선택 완료 (다음으로)`;
    nextBtn.style.cursor = 'pointer';
  }

  function goToNext() {
    if (selectedCount > 0) {
      document.getElementById('partySize-input').value = selectedCount;
      document.getElementById('headcount-form').submit();
    }
  }
</script>
</body>
</html>
