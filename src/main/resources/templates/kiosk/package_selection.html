<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Package Selection - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      margin: 0; padding: 0;
      font-family: 'Pretendard', sans-serif;
      background-color: #f0f2f5;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; overflow-y: auto;
    }
    .container {
      text-align: center; width: 100%;
      max-width: 1000px; padding: 30px 20px;
    }
    .icon-header {
      width: 60px; height: 60px;
      background-color: #007bff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 15px; color: white;
    }
    h1 { font-size: 2rem; margin: 10px 0; color: #111; }
    .subtitle { color: #666; margin-bottom: 20px; font-size: 1rem; }

    .policy-wrapper {
      display: grid; grid-template-columns: 1.2fr 1fr;
      gap: 15px; margin-bottom: 25px;
    }
    .policy-card {
      background-color: #fff; border: 1px solid #e1e4e8;
      border-radius: 12px; padding: 15px; text-align: left; font-size: 0.85rem;
    }
    .policy-card.warning { background-color: #fff4f4; border-color: #ffcfcf; color: #d63031; }
    .policy-card.payment-info { background-color: #f8f9fa; border-left: 5px solid #333; }
    .policy-card strong { display: block; margin-bottom: 5px; font-size: 0.95rem; }
    .policy-card ul { margin: 0; padding-left: 18px; line-height: 1.6; }

    /* 페이징 래퍼 */
    .paging-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 30px;
    }

    .arrow-btn {
      width: 52px; height: 52px;
      border-radius: 50%;
      border: 2px solid #007bff;
      background: white;
      color: #007bff;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }
    .arrow-btn:hover { background: #007bff; color: white; }
    .arrow-btn:disabled { border-color: #ddd; color: #ddd; cursor: not-allowed; background: white; }
    .arrow-btn i { width: 24px; height: 24px; }

    .grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 15px; flex: 1;
    }

    .package-card {
      background: white; border-radius: 20px; padding: 20px 15px;
      cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      transition: all 0.2s ease; border: 3px solid transparent;
      display: flex; flex-direction: column;
    }
    .package-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .package-card.selected { border-color: #007bff; background-color: #f0f7ff; }
    .pkg-name { font-size: 1.1rem; font-weight: bold; color: #333; margin-bottom: 8px; }
    .pkg-time { font-size: 1.6rem; font-weight: 800; color: #007bff; margin-bottom: 5px; }
    .pkg-type { font-size: 0.75rem; color: #999; margin-bottom: 5px; letter-spacing: 0.5px; }
    .pkg-desc { font-size: 0.85rem; color: #888; min-height: 34px; line-height: 1.4; }
    .pkg-price {
      font-size: 1.2rem; font-weight: bold; color: #111;
      margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee;
    }
    .pkg-unit { font-size: 0.8rem; font-weight: normal; color: #888; margin-left: 4px; }

    .submit-btn {
      width: 100%; padding: 22px;
      background-color: #e2e4e7; color: #a0a3a7;
      border: none; border-radius: 15px;
      font-size: 1.2rem; font-weight: bold; cursor: not-allowed;
      transition: all 0.3s ease;
    }
    .submit-btn.active {
      background-color: #007bff; color: white; cursor: pointer;
      box-shadow: 0 10px 20px rgba(0,123,255,0.2);
    }
    .empty-msg { color: #aaa; padding: 40px; font-size: 1rem; }
  </style>
</head>
<body>

<div class="container">
  <div class="icon-header">
    <i data-lucide="layout-grid" style="width:30px;height:30px;"></i>
  </div>
  <h1>Package Selection</h1>
  <p class="subtitle">이용하실 요금제를 선택해 주세요.</p>

  <div class="policy-wrapper">
    <div class="policy-card warning">
      <strong><i data-lucide="alert-triangle" style="width:14px;vertical-align:middle;"></i> 이용 시간 및 환불 정책</strong>
      <ul>
        <li>초과 요금은 분당 추가 금액이 적용됩니다.</li>
        <li>모든 요금제는 <b>1인당 금액</b>이며, 입장 시 1회 선택 가능합니다.</li>
        <li>퇴실 시 남은 시간에 대한 부분 환불은 제공되지 않습니다.</li>
      </ul>
    </div>
    <div class="policy-card payment-info">
      <strong><i data-lucide="credit-card" style="width:14px;vertical-align:middle;"></i> 결제 안내 (후불제)</strong>
      <ul>
        <li>선택하신 패키지 및 추가 메뉴 비용은 <b>퇴실 시 일괄 결제</b>합니다.</li>
        <li>보드카페 규정상 1인 1음료 혹은 1음식 주문이 필수입니다.</li>
      </ul>
    </div>
  </div>

  <!-- 패키지 카드 + 화살표 -->
  <div class="paging-wrapper">
    <!-- 이전 버튼 -->
    <button class="arrow-btn" id="prev-btn" onclick="prevPage()" disabled>
      <i data-lucide="chevron-left"></i>
    </button>

    <!-- 패키지 그리드 -->
    <div class="grid" id="package-grid">
      <!-- JS로 렌더링 -->
    </div>

    <!-- 다음 버튼 -->
    <button class="arrow-btn" id="next-btn" onclick="nextPage()">
      <i data-lucide="chevron-right"></i>
    </button>
  </div>

  <button id="next-button" class="submit-btn" onclick="completeSelection()">
    패키지를 선택해 주세요
  </button>
</div>

<script th:inline="javascript">
  lucide.createIcons();

  const TABLE_NUMBER  = /*[[${tableNumber}]]*/ 1;
  const ALL_PACKAGES  = /*[[${packageList}]]*/ [];
  const PAGE_SIZE     = 6;

  let currentPage       = 0; // 0-based
  let selectedPackageId   = null;
  let selectedPackageName = "";
  let selectedPackagePrice = 0;

  // ===== 페이지 렌더링 =====
  function renderPage() {
    const start   = currentPage * PAGE_SIZE;
    const end     = start + PAGE_SIZE;
    const pageItems = ALL_PACKAGES.slice(start, end);
    const totalPages = Math.ceil(ALL_PACKAGES.length / PAGE_SIZE);

    const grid = document.getElementById('package-grid');

    if (ALL_PACKAGES.length === 0) {
      grid.innerHTML = `<div class="empty-msg" style="grid-column:1/-1;">등록된 패키지가 없습니다.</div>`;
    } else {
      grid.innerHTML = pageItems.map(pkg => `
        <div class="package-card ${selectedPackageId === pkg.id ? 'selected' : ''}"
             data-id="${pkg.id}"
             data-name="${pkg.name}"
             data-price="${pkg.basePrice}"
             onclick="selectPackage(this)">
          <div class="pkg-name">${pkg.name}</div>
          <div class="pkg-time">${pkg.displayTime ?? getDisplayTime(pkg.durationMinutes)}</div>
          <div class="pkg-type">${pkg.type}</div>
          <div class="pkg-desc">${pkg.extraPricePerMin > 0 ? '초과 시 분당 ' + pkg.extraPricePerMin + '원' : '초과 요금 없음'}</div>
          <div class="pkg-price">
            ${Number(pkg.basePrice).toLocaleString()}원
            <span class="pkg-unit">(1인)</span>
          </div>
        </div>`).join('');
    }

    // 화살표 버튼 상태 업데이트
    document.getElementById('prev-btn').disabled = (currentPage === 0);
    document.getElementById('next-btn').disabled = (currentPage >= totalPages - 1);

    lucide.createIcons();
  }

  function getDisplayTime(minutes) {
    if (!minutes) return 'Free';
    if (minutes < 60) return minutes + '분';
    return (minutes / 60) + '시간';
  }

  function prevPage() {
    if (currentPage > 0) {
      currentPage--;
      renderPage();
    }
  }

  function nextPage() {
    const totalPages = Math.ceil(ALL_PACKAGES.length / PAGE_SIZE);
    if (currentPage < totalPages - 1) {
      currentPage++;
      renderPage();
    }
  }

  // ===== 패키지 선택 =====
  function selectPackage(el) {
    document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
    el.classList.add('selected');

    selectedPackageId    = parseInt(el.dataset.id);
    selectedPackageName  = el.dataset.name;
    selectedPackagePrice = parseInt(el.dataset.price);

    const btn = document.getElementById('next-button');
    btn.classList.add('active');
    btn.innerText = `[${selectedPackageName}] 선택 완료 - 메뉴로 이동`;
  }

  function completeSelection() {
    if (!selectedPackageId) return;

    fetch('/kiosk/package/select', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ packageId: selectedPackageId })
    })
            .then(res => res.json())
            .then(data => {
              if (data.success) {
                location.href = `/kiosk/drinks?tableNumber=${TABLE_NUMBER}`;
              } else {
                alert('패키지 선택에 실패했습니다. 다시 시도해주세요.');
              }
            })
            .catch(() => {
              alert('오류가 발생했습니다. 다시 시도해주세요.');
            });
  }

  // 초기 렌더링
  renderPage();
</script>
</body>
</html>
