<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>결제 완료 - Board Game Cafe</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .check-icon { width: 110px; height: 110px; margin-bottom: 8px; }

    h1 { font-size: 2.6rem; font-weight: 800; margin: 0; }

    .amount {
      font-size: 2.2rem;
      font-weight: 700;
      background: rgba(255,255,255,0.15);
      padding: 14px 32px;
      border-radius: 20px;
      border: 2px solid rgba(255,255,255,0.3);
    }

    .point-badge {
      background: rgba(255,255,255,0.2);
      border: 2px solid rgba(255,255,255,0.35);
      padding: 10px 24px;
      border-radius: 14px;
      font-size: 1.15rem;
      font-weight: 700;
    }

    .order-no {
      font-size: 0.9rem;
      opacity: 0.65;
    }

    .thanks { font-size: 1.05rem; opacity: 0.85; }

    .redirect-msg {
      font-size: 0.88rem;
      opacity: 0.55;
      margin-top: 8px;
    }

    .progress-bar {
      width: 200px;
      height: 4px;
      background: rgba(255,255,255,0.25);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: white;
      border-radius: 4px;
      animation: progress 3s linear forwards;
    }

    @keyframes progress {
      from { width: 0; }
      to   { width: 100%; }
    }
  </style>
</head>
<body>
<div class="container">
  <i data-lucide="circle-check-big" class="check-icon"></i>
  <h1>결제 완료!</h1>

  <div class="amount"
       th:text="'₩' + ${#numbers.formatInteger(finalAmount, 1, 'COMMA')}">₩0</div>

  <div class="point-badge"
       th:if="${earnedPoints != null and earnedPoints > 0}"
       th:text="'🎁 ' + ${earnedPoints} + 'P 적립 완료!'">🎁 0P 적립 완료!</div>

  <p class="order-no" th:text="'주문번호: #' + ${orderId}">주문번호: #0</p>
  <p class="thanks">이용해주셔서 감사합니다 😊</p>

  <div class="progress-bar"><div class="progress-fill"></div></div>
  <p class="redirect-msg">3초 후 메인 화면으로 이동합니다...</p>
</div>

<script>
  lucide.createIcons({ attrs: { 'stroke-width': 2.5 } });
  const tableNumber = /*[[${tableNumber}]]*/ '1';
  localStorage.removeItem('returnUrl');
  setTimeout(() => {
    window.location.href = `/kiosk/menu?tableNumber=${tableNumber}`;
  }, 3000);
</script>
</body>
</html>
