<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 요청 상세</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" th:href="@{/css/kiosk/game_detail.css(v='20260529b')}" href="/css/kiosk/game_detail.css?v=20260529b">
  <style>
    @media (min-width: 641px) and (max-width: 1024px) {
      .layout {
        grid-template-columns: minmax(170px, 0.58fr) minmax(0, 1.42fr) !important;
      }

      .list-card,
      .detail-card {
        min-width: 0 !important;
      }

      .game-image-frame {
        width: min(100%, 260px) !important;
        max-width: 100% !important;
        aspect-ratio: 4 / 3 !important;
      }
    }

    @media (max-width: 640px) {
      .layout {
        display: flex !important;
        flex-direction: column !important;
      }

      .list-card,
      .detail-card {
        width: 100% !important;
        min-width: 0 !important;
      }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <button class="back-btn" onclick="goToMenu()"><i data-lucide="arrow-left"></i>메뉴로 돌아가기</button>
    <div class="badge-row">
      <span class="badge">주문번호 <strong th:text="${orderId}">0</strong></span>
      <span class="badge">테이블 <strong th:text="${tableNumber}">0</strong></span>
    </div>
  </div>

  <div class="layout">
    <div class="list-card">
      <div class="list-head">요청 게임 목록</div>
      <div class="game-list" id="game-list"></div>
    </div>

    <div class="detail-card">
      <div class="detail-head">게임 상세</div>
      <div class="detail-body">
        <div class="game-image-frame">
          <img class="game-image" id="game-image" alt="게임 이미지">
        </div>
        <div class="meta-grid">
          <div class="meta"><div class="k">가능 인원</div><div class="v" id="players-meta">-</div></div>
          <div class="meta"><div class="k">평균 이용 시간</div><div class="v" id="time-meta">-</div></div>
        </div>
        <div class="desc" id="desc-meta">설명이 등록되지 않았습니다.</div>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  window.gameDetailState = {
    tableNumber: /*[[${tableNumber}]]*/ 0,
    orderId: /*[[${orderId}]]*/ 0,
    order: /*[[${order}]]*/ {},
    requestedGames: /*[[${requestedGames}]]*/ []
  };
</script>
<script th:src="@{/js/kiosk/game_detail.js}"></script>
</body>
</html>
