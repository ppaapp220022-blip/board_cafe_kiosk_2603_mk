<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게임 요청 상세</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { margin: 0; font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3f6fb; color: #1f2937; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 22px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .back-btn { border: none; background: transparent; color: #1a73e8; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 6px; font-size: 16px; }
    .badge-row { display: flex; gap: 10px; }
    .badge { border: 1px solid #c9dbff; border-radius: 999px; padding: 8px 14px; font-size: 13px; font-weight: 700; color: #1a73e8; background: #edf4ff; }

    .status-card {
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 35%),
        linear-gradient(135deg, #eef6ff 0%, #dff0ff 50%, #eef6ff 100%);
      border: 1px solid #cfe0ff;
      border-radius: 18px;
      padding: 0;
      margin-bottom: 16px;
      min-height: 220px;
      height: 260px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    .status-brand-box {
      z-index: 2;
      text-align: center;
      color: #1a73e8;
      user-select: none;
      animation: status-brand-float 6s ease-in-out infinite;
      will-change: transform;
    }
    .status-brand-name {
      margin: 0;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }
    .status-sub-title {
      margin-top: 6px;
      font-size: 12px;
      letter-spacing: 2px;
      color: #4b83d6;
      font-weight: 700;
    }
    .status-waves {
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 95px;
      z-index: 1;
      transform: translateZ(0);
    }
    .status-parallax > use {
      animation: status-wave-move 20s linear infinite;
      will-change: transform;
    }
    .status-parallax > use:nth-child(1) { animation-delay: -2s; animation-duration: 18s; fill: rgba(0,123,255,0.42); }
    .status-parallax > use:nth-child(2) { animation-delay: -5s; animation-duration: 24s; fill: rgba(0,123,255,0.32); }
    .status-parallax > use:nth-child(3) { animation-delay: -9s; animation-duration: 30s; fill: rgba(0,123,255,0.24); }
    .status-parallax > use:nth-child(4) { animation-delay: -13s; animation-duration: 36s; fill: rgba(0,123,255,0.52); }
    @keyframes status-wave-move {
      0% { transform: translate3d(-120px,0,0); }
      100% { transform: translate3d(120px,0,0); }
    }
    @keyframes status-brand-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 14px; }
    .list-card, .detail-card { background: #fff; border-radius: 18px; border: 1px solid #e5e7eb; }
    .list-head, .detail-head { padding: 14px 16px; border-bottom: 1px solid #eef2f7; font-size: 15px; font-weight: 800; }
    .game-list { padding: 10px; display: flex; flex-direction: column; gap: 8px; max-height: 520px; overflow: auto; }
    .game-item { border: 1px solid #dde5ef; border-radius: 12px; padding: 12px; cursor: pointer; }
    .game-item.active { border-color: #1a73e8; background: #f1f7ff; }
    .game-name { font-weight: 800; margin-bottom: 4px; }
    .game-qty { font-size: 13px; color: #64748b; }

    .detail-body { padding: 16px; }
    .game-image { width: 100%; max-height: 300px; object-fit: cover; border-radius: 12px; background: #f1f5f9; margin-bottom: 14px; }
    .meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .meta { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 10px 12px; }
    .meta .k { font-size: 12px; color: #64748b; margin-bottom: 4px; }
    .meta .v { font-size: 14px; font-weight: 700; color: #111827; }
    .desc { border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px; background: #fbfdff; color: #334155; line-height: 1.45; min-height: 100px; white-space: pre-wrap; }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <button class="back-btn" onclick="goToMenu()"><i data-lucide="arrow-left"></i>메뉴로 돌아가기</button>
    <div class="badge-row">
      <span class="badge">주문번호 <strong th:text="${orderId}">0</strong></span>
      <span class="badge">테이블 <strong th:text="${tableNumber}">0</strong></span>
    </div>
  </div>

  <div class="layout">
    <div class="list-card">
      <div class="list-head">요청 게임 목록</div>
      <div class="game-list" id="game-list"></div>
    </div>

    <div class="detail-card">
      <div class="detail-head">게임 상세</div>
      <div class="detail-body">
        <img class="game-image" id="game-image" alt="게임 이미지">
        <div class="meta-grid">
          <div class="meta"><div class="k">가능 인원</div><div class="v" id="players-meta">-</div></div>
          <div class="meta"><div class="k">평균 이용 시간</div><div class="v" id="time-meta">-</div></div>
        </div>
        <div class="desc" id="desc-meta">설명이 등록되지 않았습니다.</div>
      </div>
    </div>
  </div>
</div>

<script th:inline="javascript">
  lucide.createIcons();

  const tableNumber = /*[[${tableNumber}]]*/ 0;
  const orderId = /*[[${orderId}]]*/ 0;
  const orderData = /*[[${order}]]*/ {};
  const requestedGames = /*[[${requestedGames}]]*/ [];

  function startTableStatusWatcher() {
    async function checkTableStatus() {
      try {
        const res = await fetch('/kiosk/table/status', {
          headers: { 'Accept': 'application/json' },
          credentials: 'same-origin'
        });
        if (!res.ok) return;

        const contentType = res.headers.get('content-type') || '';
        if (!contentType.includes('application/json')) {
          if (res.redirected && res.url) {
            window.location.href = res.url;
          }
          return;
        }

        const data = await res.json();
        if (data?.success && data.status === 'CLEANING') {
          window.location.href = '/kiosk/cleaning_wait';
        }
      } catch (error) {
        console.error('테이블 상태 확인 실패:', error);
      }
    }

    checkTableStatus();
    setInterval(checkTableStatus, 3000);
  }

  function renderDetail(game) {
    const image = document.getElementById('game-image');
    image.src = game.imageUrl || '';
    image.style.display = game.imageUrl ? 'block' : 'none';

    const minPlayers = game.minPlayers ?? '-';
    const maxPlayers = game.maxPlayers ?? '-';
    const playTime = game.playTime ?? '-';
    document.getElementById('players-meta').innerText = `${minPlayers} ~ ${maxPlayers}명`;
    document.getElementById('time-meta').innerText = `${playTime}분`;
    document.getElementById('desc-meta').innerText = game.description && String(game.description).trim()
      ? game.description
      : '설명이 등록되지 않았습니다.';
  }

  function renderList() {
    const listEl = document.getElementById('game-list');
    if (!Array.isArray(requestedGames) || requestedGames.length === 0) {
      listEl.innerHTML = '<div style="padding:10px; color:#64748b;">요청된 게임이 없습니다.</div>';
      return;
    }

    listEl.innerHTML = requestedGames.map((game, idx) => `
      <div class="game-item ${idx === 0 ? 'active' : ''}" data-idx="${idx}">
        <div class="game-name">${game.name || '게임'}</div>
        <div class="game-qty">수량: ${game.quantity || 1}개</div>
      </div>
    `).join('');

    document.querySelectorAll('.game-item').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.game-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
        const idx = Number(el.dataset.idx);
        renderDetail(requestedGames[idx]);
      });
    });

    renderDetail(requestedGames[0]);
  }

  function goToMenu() {
    window.location.href = `/kiosk/games?tableNumber=${tableNumber}`;
  }

  startTableStatusWatcher();
  renderList();
</script>
</body>
</html>
