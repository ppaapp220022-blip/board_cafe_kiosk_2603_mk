<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
    <title>BoardWave Dashboard</title>
    <th:block layout:fragment="head-extra">
        <!-- CSRF 토큰 (fetch PATCH/DELETE/POST 요청에 사용) -->
        <meta name="_csrf" th:content="${_csrf.token}"/>
        <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
        <style>
            /* --- 레이아웃 및 헤더 스타일 --- */
            .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
            .page-title { font-size: 28px; font-weight: 700; }
            .status-legend { display: flex; gap: 15px; font-size: 13px; font-weight: 500; }
            .legend-item { display: flex; align-items: center; gap: 6px; }
            .dot { width: 12px; height: 12px; border-radius: 4px; }
            .dot.in-use { background-color: #4285f4; }
            .dot.empty { background-color: #f1f3f4; border: 1px solid #ddd; }
            .dot.cleaning { background-color: #fbbc04; }
            .dot.request { background-color: #ea4335; }

            /* --- 테이블 그리드 및 카드 스타일 --- */
            .table-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .table-card {
                background: white; border-radius: 16px; height: auto; min-height: 180px; padding: 24px;
                display: flex; flex-direction: column; justify-content: space-between;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); border: 2px solid transparent;
                transition: all 0.2s ease; cursor: pointer; position: relative;
            }
            .table-card:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1); }
            .table-card.selected { border: 2px solid #4285f4; background-color: #f8faff; }

            /* 주문 상태 배지 */
            .order-status-badge {
                display: none;
                padding: 4px 12px;
                border-radius: 12px;
                font-size: 12px;
                font-weight: bold;
                margin-top: 8px;
                animation: pulse 1.5s infinite;
            }

            .order-status-badge.ordered { background: #fff3cd; color: #856404; }
            .order-status-badge.confirmed { background: #d1ecf1; color: #0c5460; }
            .order-status-badge.cooking { background: #fde8e8; color: #721c24; }
            .order-status-badge.delivering { background: #d4edda; color: #155724; }
            .order-status-badge.completed { background: #d4edda; color: #155724; }

            @keyframes pulse {
                0%, 100% { opacity: 1; }
                50% { opacity: 0.7; }
            }

            /* --- 알림 점(Alert Dot) 스타일 --- */
            .alert-dot {
                position: absolute; top: 18px; right: 18px;
                width: 12px; height: 12px; background-color: #ea4335;
                border-radius: 50%; border: 2px solid white;
                display: none;
                z-index: 10;
            }
            .has-msg .alert-dot { display: block; animation: pulse-red 1.5s infinite; }

            @keyframes pulse-red {
                0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.7); }
                70% { transform: scale(1.2); opacity: 0.8; box-shadow: 0 0 0 10px rgba(234, 67, 53, 0); }
                100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); }
            }

            /* 상태별 카드 디자인 */
            .table-card.status-occupied { border-left: 8px solid #4285f4; }
            .table-card.status-empty { border-left: 8px solid #f1f3f4; }
            .table-card.status-cleaning { border-left: 8px solid #fbbc04; }

            .table-number { font-size: 22px; font-weight: 700; color: #3c4043; }
            .status-text { font-size: 14px; font-weight: 600; }

            /* --- 모달 관련 스타일 --- */
            .modal-overlay {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.5); z-index: 9999; justify-content: center; align-items: center;
                backdrop-filter: blur(4px);
            }
            .modal-content {
                background: white; width: 550px; border-radius: 20px; padding: 30px;
                transform: translateY(-20px); transition: 0.3s; max-height: 90vh; overflow-y: auto;
            }
            .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; font-weight: bold; font-size: 20px;}
            .close-btn { cursor: pointer; font-size: 28px; border: none; background: none; line-height: 1; }

            .order-list {
                margin-top: 15px;
                max-height: 350px;
                overflow-y: auto;
                border: 1px solid #eee;
                border-radius: 12px;
                padding: 12px;
                background: #f9f9f9;
            }

            .order-item-wrapper {
                display: flex; flex-direction: column; gap: 12px; padding: 12px 0; border-bottom: 1px solid #eee;
            }
            .order-item-wrapper:last-child { border-bottom: none; }
            .order-item-header { display: flex; justify-content: space-between; font-weight: 500; align-items: center; }
            .order-item-name { flex: 1; }
            .order-item-price { font-weight: bold; color: #333; }
            .order-item-actions { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
            .order-status-label { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; white-space: nowrap; }
            .order-action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }

            .action-group {
                display: flex; flex-wrap: wrap; gap: 10px; margin-top: 25px; justify-content: space-between;
            }
            .action-group .btn {
                flex: 0 1 calc(50% - 5px); padding: 15px; border: none; border-radius: 10px; font-weight: bold;
                cursor: pointer; font-size: 14px; transition: all 0.2s; min-width: 0;
                display: flex; align-items: center; justify-content: center;
            }

            .btn-pay { background: #ea4335; color: white; }
            .btn-status { background: #28a745; color: white; }
            .btn-order-status { background: #9c27b0; color: white; }
            .btn-msg { background: #fbbc05; color: white; }
            .btn-close { background: #f1f3f4; color: #3c4043; flex-grow: 1; }
            .btn:hover { opacity: 0.9; transform: scale(0.98); }

            .unread-msg-box {
                background: #fff9c4; border-left: 5px solid #fbc02d;
                padding: 15px; margin-bottom: 20px; border-radius: 12px;
                font-size: 14px; color: #5d4037; display: none;
            }

            /* --- 신규 주문 알림 스타일 (CSS 문법 오류 수정됨) --- */
            @keyframes slideInDown {
                from { opacity: 0; transform: translateY(-50px); }
                to { opacity: 1; transform: translateY(0); }
            }
            @keyframes pulse-yellow {
                0%, 100% { box-shadow: 0 0 30px rgba(255, 204, 0, 0.5); }
                50% { box-shadow: 0 0 50px rgba(255, 204, 0, 0.8); }
            }

            #newOrderNotificationModal { animation: slideInDown 0.3s ease-out; }
            #newOrderNotificationModal .modal-content { animation: pulse-yellow 1s infinite; }

            #pending-orders-section {
                margin-bottom: 24px;
                background: #fff8e1;
                border: 2px solid #ffcc02;
                border-radius: 16px;
                padding: 20px 24px;
                display: none;
            }
            #pending-orders-section.has-orders { display: block; }

            .pending-section-header {
                display: flex; align-items: center; gap: 10px;
                font-size: 16px; font-weight: 700; color: #e65100; margin-bottom: 14px;
            }
            .pending-badge {
                background: #e65100; color: white; font-size: 12px; font-weight: 700;
                padding: 2px 8px; border-radius: 20px;
            }
            .pending-order-card {
                background: white; border-radius: 12px; padding: 16px;
                margin-bottom: 10px; border: 1px solid #ffe082;
                display: flex; justify-content: space-between; align-items: center; gap: 12px;
            }
            .pending-order-card:last-child { margin-bottom: 0; }
            .pending-order-info { flex: 1; }
            .pending-order-title { font-weight: 700; font-size: 14px; color: #3c4043; margin-bottom: 4px; }
            .pending-order-items { font-size: 12px; color: #5f6368; }
            .pending-order-actions { display: flex; gap: 8px; }
            .btn-pending-confirm {
                padding: 8px 16px; background: #4285f4; color: white;
                border: none; border-radius: 8px; font-size: 13px; font-weight: 700; cursor: pointer;
            }
            .btn-pending-cancel {
                padding: 8px 12px; background: #f1f3f4; color: #ea4335;
                border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer;
            }

            .btn-reset {
                background: #5f6368; color: white; display: flex; align-items: center;
                border-radius: 10px; cursor: pointer; gap: 8px; padding: 10px 18px;
                height: fit-content; border: none; font-weight: 600; transition: all 0.2s ease;
            }
            .btn-reset:focus { outline: none; box-shadow: none; }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="header-container">
        <h1 class="page-title">📊 테이블 현황</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button class="btn btn-msg" style="padding: 10px 18px; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px;" onclick="openMessageModal()">
                📨 메세지 전송
            </button>

            <button class="btn btn-reset" onclick="handleTotalReset()">
                🔄 전체 리셋 (마감)
            </button>

            <div class="status-legend">
                <div class="legend-item"><div class="dot empty"></div>빈 테이블</div>
                <div class="legend-item"><div class="dot in-use"></div>사용중</div>
                <div class="legend-item"><div class="dot cleaning"></div>청소 중</div>
                <div class="legend-item"><div class="dot request"></div>요청 있음</div>
            </div>
        </div>
    </div>

    <div id="pending-orders-section">
        <div class="pending-section-header">
            🔔 신규 주문 대기
            <span class="pending-badge" id="pending-count">0</span>
        </div>
        <div id="pending-orders-list"></div>
    </div>

    <div class="table-grid">
        <div th:each="table : ${tables}"
             class="table-card"
             th:classappend="${(table.hasUnreadMessage ? 'has-msg ' : '') + 'status-' + #strings.toLowerCase(table.status)}"
             th:data-id="${table.id}"
             th:data-num="${table.tableNumber}"
             th:data-status="${table.status}"
             th:data-token="${table.accessToken}"
             th:data-latestorder="pending"
             onclick="openTableModal(this)">

            <div class="alert-dot"></div>

            <div class="table-number" th:text="'Table ' + ${table.tableNumber}">Table 1</div>

            <div class="status-text">
                <span th:if="${table.status == 'EMPTY'}" style="color: #bdc1c6;">비어있음</span>
                <span th:if="${table.status == 'OCCUPIED'}" style="color: #4285f4;">이용 중</span>
                <span th:if="${table.status == 'CLEANING'}" style="color: #fbbc04;">청소 중</span>
            </div>

            <th:block th:if="${table.status == 'OCCUPIED'}">
                <div class="order-status-container" style="margin-top: 8px;">
                    <span class="order-status-badge" data-status="ORDERED">주문 완료</span>
                    <span class="order-status-badge" data-status="CONFIRMED">주문 확인</span>
                    <span class="order-status-badge" data-status="COOKING">조리 중</span>
                    <span class="order-status-badge" data-status="DELIVERING">배달 준비</span>
                    <span class="order-status-badge" data-status="COMPLETED">완료</span>
                </div>
            </th:block>

            <div class="time-info" style="font-size: 12px; color: #5f6368; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #eee;">
                <span th:if="${table.status == 'OCCUPIED' and table.guestCount != null}" style="display: flex; align-items: center; gap: 4px; font-weight: 500;">
                    👥 <span th:text="${table.guestCount} + '명'">2명</span>
                </span>
                <span th:unless="${table.status == 'OCCUPIED'}"></span>
                <span th:if="${table.status == 'OCCUPIED' and table.checkInTime != null}" style="display: flex; align-items: center; gap: 4px;">
                    🕒 <span th:text="${#temporals.format(table.checkInTime, 'HH:mm')}">14:30</span>
                </span>
            </div>
        </div>
    </div>

    <div id="tableModal" class="modal-overlay" onclick="closeTableModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="modalTitle">Table 0</span>
                <button class="close-btn" onclick="closeTableModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="unreadMsgBox" class="unread-msg-box">
                    <strong>⚠️ 확인이 필요한 손님 요청</strong>
                    <ul id="unreadMsgList"></ul>
                </div>

                <div style="font-weight: 600; color: #3c4043;">📋 실시간 주문 내역</div>
                <div id="orderList" class="order-list"></div>

                <div class="total-price-container" style="margin-top: 20px; padding-top: 15px; border-top: 2px dashed #eee;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 14px; color: #5f6368;">현재 이용 합계</span>
                        <span id="totalPrice" style="font-size: 24px; font-weight: 800; color: #ea4335;">0원</span>
                    </div>
                </div>

                <div class="action-group">
                    <button class="btn btn-pay" onclick="handlePayment()">💰 결제완료</button>
                    <button class="btn btn-status" onclick="handleStatusUpdate()">🔄 상태변경</button>
                    <button class="btn btn-order-status" id="orderStatusBtn" onclick="changeAllOrdersStatus()" style="display:none;">📋 주문상태변경</button>
                    <button class="btn btn-msg" id="readBtn" onclick="handleReadMessage()" style="display:none;">✉️ 요청확인</button>
                    <button class="btn btn-close" onclick="closeTableModal()">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <div id="messageModal" class="modal-overlay" onclick="closeMessageModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span>📨 테이블 메세지 전송</span>
                <button class="close-btn" onclick="closeMessageModal()">×</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 15px;">
                    <label style="font-weight: 600; display: block; margin-bottom: 8px; color: #3c4043;">대상 테이블</label>
                    <select id="targetTableSelect" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                        <option value="">테이블을 선택하세요</option>
                    </select>
                </div>

                <div style="margin-bottom: 25px;">
                    <label style="font-weight: 600; display: block; margin-bottom: 8px; color: #3c4043;">전송할 메세지 (매크로)</label>
                    <select id="macroMessageSelect" style="width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; outline: none;">
                        <option value="">메세지를 선택하세요</option>
                    </select>
                </div>

                <div class="action-group" style="margin-top: 0;">
                    <button class="btn btn-msg" style="flex: 1;" onclick="submitMessage()">전송하기</button>
                    <button class="btn btn-close" style="flex: 1;" onclick="closeMessageModal()">취소</button>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
        <script th:src="@{/js/websocket.js}"></script>
        <script th:inline="javascript">
            let currentTableId = null;
            let currentTableStatus = null;

            function hideMessageBox() {
                const box = document.getElementById('unreadMsgBox');
                const btn = document.getElementById('readBtn');
                if (box) box.style.display = 'none';
                if (btn) btn.style.display = 'none';
            }

            function renderOrders(orders) {
                const listDiv = document.getElementById('orderList');
                const priceSpan = document.getElementById('totalPrice');
                let sum = 0;
                let latestStatus = 'ORDERED';

                if (!listDiv || !priceSpan) return;

                let orderItems = orders;
                if (!Array.isArray(orders)) {
                    if (orders?.items) { orderItems = orders.items; }
                    else if (orders?.orderItems) { orderItems = orders.orderItems; }
                    else { orderItems = []; }
                }

                if (!orderItems || orderItems.length === 0) {
                    listDiv.innerHTML = '<div style="color:#999; display:flex; justify-content:center; padding: 20px; border:none;">진행 중인 주문이 없습니다.</div>';
                    priceSpan.innerText = '0원';
                    return;
                }

                let statuses = { 'ORDERED': 1, 'CONFIRMED': 2, 'COOKING': 3, 'DELIVERING': 4, 'COMPLETED': 5 };
                let maxLevel = 0;
                for (let order of orderItems) {
                    if (order.status && order.status !== 'CANCELLED') {
                        const level = statuses[order.status] || 0;
                        if (level > maxLevel) {
                            maxLevel = level;
                            latestStatus = order.status;
                        }
                    }
                }

                listDiv.innerHTML = orderItems.map(item => {
                    const menuName = item.menu_name || item.menuName || '상품명 없음';
                    const quantity = item.quantity || 0;
                    const price = item.price || 0;
                    const itemTotal = price * quantity;

                    if (item.status !== 'CANCELLED') { sum += itemTotal; }

                    let statusText = '';
                    let badgeBg = '#f1f3f4';
                    let badgeColor = '#5f6368';
                    let actionHtml = '';

                    const orderId = item.id || item.orderId;
                    const currentStatus = item.status || 'ORDERED';

                    const btnBase = "padding: 6px 12px; border-radius: 6px; border: none; font-size: 11px; cursor: pointer; font-weight: 600; transition: all 0.2s;";
                    const btnNext = btnBase + " background: #4285f4; color: white;";
                    const btnCancel = btnBase + " background: #f1f3f4; color: #ea4335;";

                    switch(currentStatus) {
                        case 'ORDERED':
                            statusText = '주문 완료'; badgeBg = '#fff3cd'; badgeColor = '#856404';
                            actionHtml = `
                                <button style="${btnNext}" onclick="updateOrderStatus(${orderId}, 'CONFIRMED')">확인</button>
                                <button style="${btnCancel}" onclick="updateOrderStatus(${orderId}, 'CANCELLED')">취소</button>`;
                            break;
                        case 'CONFIRMED':
                            statusText = '주문 확인'; badgeBg = '#d1ecf1'; badgeColor = '#0c5460';
                            actionHtml = `
                                <button style="${btnNext}" onclick="updateOrderStatus(${orderId}, 'COOKING')">조리</button>
                                <button style="${btnCancel}" onclick="updateOrderStatus(${orderId}, 'CANCELLED')">취소</button>`;
                            break;
                        case 'COOKING':
                            statusText = '조리 중'; badgeBg = '#fde8e8'; badgeColor = '#721c24';
                            actionHtml = `
                                <button style="${btnNext}" onclick="updateOrderStatus(${orderId}, 'DELIVERING')">배달</button>
                                <button style="${btnCancel}" onclick="updateOrderStatus(${orderId}, 'CANCELLED')">취소</button>`;
                            break;
                        case 'DELIVERING':
                            statusText = '배달 준비'; badgeBg = '#d4edda'; badgeColor = '#155724';
                            actionHtml = `<button style="${btnNext}" onclick="updateOrderStatus(${orderId}, 'COMPLETED')">완료</button>`;
                            break;
                        case 'COMPLETED':
                            statusText = '완료'; badgeBg = '#c8e6c9'; badgeColor = '#1b5e20';
                            break;
                        case 'CANCELLED':
                            statusText = '취소됨'; badgeBg = '#ffcdd2'; badgeColor = '#c62828';
                            break;
                        default: statusText = currentStatus;
                    }

                    const isCancelled = currentStatus === 'CANCELLED';
                    const textStyle = isCancelled ? 'text-decoration: line-through; color: #999;' : '';

                    return `
                    <div class="order-item-wrapper">
                        <div class="order-item-header">
                            <span class="order-item-name" style="${textStyle}">${menuName} x ${quantity}</span>
                            <span class="order-item-price" style="${textStyle}">${itemTotal.toLocaleString()}원</span>
                        </div>
                        <div class="order-item-actions">
                            <span class="order-status-label" style="background: ${badgeBg}; color: ${badgeColor}; ${isCancelled ? 'text-decoration: line-through;' : ''}">${statusText}</span>
                            <div class="order-action-buttons">${actionHtml}</div>
                        </div>
                    </div>`;
                }).join('');

                priceSpan.innerText = sum.toLocaleString() + '원';
                updateTableCardOrderStatus(latestStatus);
                updateOrderStatusButton();
            }

            function updateTableCardOrderStatus(status) {
                const selectedCard = document.querySelector(`.table-card[data-id="${currentTableId}"]`);
                if (!selectedCard) return;

                const container = selectedCard.querySelector('.order-status-container');
                if (!container) return;

                container.querySelectorAll('.order-status-badge').forEach(badge => {
                    badge.style.display = 'none';
                });

                const badge = container.querySelector(`.order-status-badge[data-status="${status}"]`);
                if (badge) badge.style.display = 'inline-block';
            }

            async function changeAllOrdersStatus() {
                const orders = document.querySelectorAll('.order-item-wrapper');
                let hasActiveOrder = false;

                for (let orderItem of orders) {
                    const statusLabel = orderItem.querySelector('.order-status-label');
                    if (!statusLabel) continue;

                    const currentStatus = statusLabel.textContent.trim();
                    if (currentStatus === '완료' || currentStatus === '취소됨') continue;

                    hasActiveOrder = true;
                    let nextStatus = '';
                    if (currentStatus === '주문 완료') nextStatus = 'CONFIRMED';
                    else if (currentStatus === '주문 확인') nextStatus = 'COOKING';
                    else if (currentStatus === '조리 중') nextStatus = 'DELIVERING';
                    else if (currentStatus === '배달 준비') nextStatus = 'COMPLETED';

                    if (nextStatus) {
                        const buttons = orderItem.querySelectorAll('.order-action-buttons button');
                        const firstButton = buttons[0];
                        if (firstButton) {
                            firstButton.click();
                            await new Promise(r => setTimeout(r, 300));
                        }
                    }
                }

                if (!hasActiveOrder) { alert('변경 가능한 주문이 없습니다.'); }
            }

            function updateOrderStatusButton() {
                const btn = document.getElementById('orderStatusBtn');
                const orders = document.querySelectorAll('.order-item-wrapper');
                let hasActiveOrder = false;

                for (let order of orders) {
                    const statusLabel = order.querySelector('.order-status-label');
                    if (statusLabel) {
                        const status = statusLabel.textContent.trim();
                        if (status !== '완료' && status !== '취소됨') {
                            hasActiveOrder = true;
                            break;
                        }
                    }
                }
                if (btn) btn.style.display = hasActiveOrder ? 'inline-flex' : 'none';
            }

            async function openTableModal(element) {
                document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
                element.classList.add('selected');
                currentTableId = element.getAttribute('data-id');
                currentTableStatus = element.getAttribute('data-status');
                const tableNum = element.getAttribute('data-num');
                const hasMsg = element.classList.contains('has-msg');

                const modalTitle = document.getElementById('modalTitle');
                if (modalTitle) modalTitle.innerText = 'Table ' + tableNum;
                hideMessageBox();

                const modal = document.getElementById('tableModal');
                if (modal) {
                    modal.style.display = 'flex';
                    setTimeout(() => {
                        const content = modal.querySelector('.modal-content');
                        if (content) content.style.transform = 'translateY(0)';
                    }, 10);
                }

                if (currentTableStatus === 'OCCUPIED') {
                    subscribeToTableOrders(parseInt(currentTableId));
                } else {
                    renderOrders([]);
                }

                if (hasMsg) { await fetchUnreadMessages(); }
            }

            function closeTableModal() {
                const modal = document.getElementById('tableModal');
                if (modal) {
                    modal.style.display = 'none';
                    const content = modal.querySelector('.modal-content');
                    if (content) content.style.transform = 'translateY(-20px)';
                }
                unsubscribeFromOrders();
                document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
                currentTableId = null;
                currentTableStatus = null;
            }

            async function fetchUnreadMessages() {
                try {
                    const response = await fetch(`/admin/dashboard/messages/${currentTableId}`);
                    if (response.ok) {
                        const messages = await response.json();
                        const listDiv = document.getElementById('unreadMsgList');
                        if (messages && messages.length > 0 && listDiv) {
                            listDiv.innerHTML = messages.map(msg => `<li>${msg}</li>`).join('');
                            document.getElementById('unreadMsgBox').style.display = 'block';
                            document.getElementById('readBtn').style.display = 'block';
                        }
                    }
                } catch (err) { console.error(err); }
            }

            async function handleReadMessage() {
                if (!currentTableId) return;
                if (!confirm("요청 내용을 모두 확인하셨습니까?")) return;
                try {
                    const response = await fetch(`/admin/dashboard/messages/${currentTableId}/read`, { method: 'PATCH' });
                    if (response.ok) { location.reload(); }
                } catch (err) { console.error(err); }
            }

            async function fetchActiveOrders() {
                try {
                    const response = await fetch(`/admin/dashboard/${currentTableId}/orders`);
                    if (response.ok) {
                        const orders = await response.json();
                        renderOrders(orders);
                    } else {
                        renderOrders([]);
                    }
                } catch (err) {
                    console.error('❌ fetchActiveOrders 에러:', err);
                    renderOrders([]);
                }
            }

            async function callUpdateStatus(status) {
                try {
                    const response = await fetch(`/admin/dashboard/${currentTableId}/status`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: status })
                    });
                    const result = await response.json();
                    if (response.ok) { location.reload(); }
                    else { alert("❌ " + (result.error || "상태 변경에 실패했습니다.")); }
                } catch (err) {
                    console.error(err);
                    alert("서버와 통신 중 오류가 발생했습니다.");
                }
            }

            function handlePayment() {
                if (currentTableStatus !== 'OCCUPIED') {
                    alert("이용 중인 테이블만 결제가 가능합니다.");
                    return;
                }
                if(confirm("결제를 완료하시겠습니까?\n확인 시 퇴실 처리와 함께 미확인 요청도 모두 읽음 처리됩니다.")) {
                    callUpdateStatus('CLEANING');
                }
            }

            async function handleStatusUpdate() {
                if (!currentTableId || !currentTableStatus) return;

                const selectedTable = document.querySelector(`.table-card[data-id="${currentTableId}"]`);
                const token = selectedTable ? selectedTable.getAttribute('data-token') : null;

                if (currentTableStatus === 'EMPTY') {
                    if (!token || token.trim() === "" || token === 'null') {
                        alert("⚠️ 인증 토큰이 없는 테이블입니다.\n토큰 발급 후에만 입실(OCCUPIED)이 가능합니다.");
                        return;
                    }
                }

                let nextStatus = '';
                let confirmMsg = '';
                if (currentTableStatus === 'EMPTY') { nextStatus = 'OCCUPIED'; confirmMsg = "손님 입실 처리를 하시겠습니까?"; }
                else if (currentTableStatus === 'OCCUPIED') { nextStatus = 'CLEANING'; confirmMsg = "퇴실 및 청소 중 상태로 변경하시겠습니까?"; }
                else if (currentTableStatus === 'CLEANING') { nextStatus = 'EMPTY'; confirmMsg = "청소가 완료되었습니까?"; }

                if (confirm(confirmMsg)) { await callUpdateStatus(nextStatus); }
            }

            async function handleTotalReset() {
                if (!confirm("⚠️ 주의: 모든 데이터가 초기화됩니다. 진행하시겠습니까?")) return;
                try {
                    const response = await fetch('/admin/dashboard/reset', { method: 'DELETE' });
                    if (response.ok) { location.reload(); }
                } catch (err) { console.error(err); }
            }

            function openMessageModal() {
                const targetSelect = document.getElementById('targetTableSelect');
                targetSelect.innerHTML = '<option value="">테이블을 선택하세요</option>';
                targetSelect.innerHTML += '<option value="ALL" style="font-weight:bold; color:#4285f4;">📢 이용 중인 전체 테이블</option>';

                document.querySelectorAll('.table-card.status-occupied').forEach(card => {
                    const tableId = card.getAttribute('data-id');
                    const tableNum = card.getAttribute('data-num');
                    targetSelect.innerHTML += `<option value="${tableId}">Table ${tableNum}</option>`;
                });

                fetchMacroMessagesForAdmin();

                const modal = document.getElementById('messageModal');
                if (modal) {
                    modal.style.display = 'flex';
                    setTimeout(() => {
                        const content = modal.querySelector('.modal-content');
                        if (content) content.style.transform = 'translateY(0)';
                    }, 10);
                }
            }

            function closeMessageModal() {
                const modal = document.getElementById('messageModal');
                if (modal) {
                    modal.style.display = 'none';
                    const content = modal.querySelector('.modal-content');
                    if (content) content.style.transform = 'translateY(-20px)';
                }
                document.getElementById('targetTableSelect').value = '';
                document.getElementById('macroMessageSelect').value = '';
            }

            async function fetchMacroMessagesForAdmin() {
                try {
                    const response = await fetch('/admin/macro/api?direction=STAFF_TO_TABLE');
                    if (!response.ok) throw new Error("HTTP error! status: " + response.status);

                    const dataList = await response.json();
                    const msgSelect = document.getElementById('macroMessageSelect');
                    if (!msgSelect) return;

                    msgSelect.innerHTML = '<option value="">전송할 메세지를 선택하세요</option>';

                    if (dataList && dataList.length > 0) {
                        dataList.forEach(msg => {
                            const realId = msg.id || msg.macroMessageId;
                            const text = msg.messageText || "내용 없음";
                            if (realId) {
                                msgSelect.innerHTML += `<option value="${realId}">${text}</option>`;
                            }
                        });
                    }
                } catch (err) { console.error("매크로 메세지 로딩 실패:", err); }
            }

            async function submitMessage() {
                const tableSelect = document.getElementById('targetTableSelect');
                const messageSelect = document.getElementById('macroMessageSelect');
                const tableId = tableSelect.value;
                const messageId = messageSelect.value;

                if (!tableId || !messageId) {
                    return alert('테이블과 메세지를 선택해주세요.');
                }

                const sendData = {
                    macroMessageId: Number(messageId),
                    tableId: (tableId === "ALL") ? "ALL" : Number(tableId)
                };

                try {
                    const response = await fetch('/admin/macro/api/send', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(sendData)
                    });

                    if (response.ok) {
                        alert(tableId === "ALL" ? '📢 전체 메세지가 전송되었습니다.' : '✅ 메세지가 전송되었습니다.');
                        closeMessageModal();
                        if(tableId === "ALL") location.reload();
                    } else {
                        const errorData = await response.text();
                        alert('❌ 전송 실패: ' + errorData);
                    }
                } catch (err) {
                    console.error(err);
                    alert('서버와 통신 중 오류가 발생했습니다.');
                }
            }

            async function fetchPendingOrders() {
                try {
                    // OrderController: GET /kiosk/order/pending
                    // 응답 구조: { success: true, orders: [...], count: N }
                    const response = await fetch('/kiosk/order/pending');
                    if (response.ok) {
                        const data = await response.json();
                        renderPendingOrders(data.orders || []);
                    } else {
                        console.error('❌ 신규 주문 API 응답 실패:', response.status);
                    }
                } catch (err) {
                    console.error('❌ fetchPendingOrders 에러:', err);
                }
            }

            function renderPendingOrders(orders) {
                const section = document.getElementById('pending-orders-section');
                const list = document.getElementById('pending-orders-list');
                const badge = document.getElementById('pending-count');

                if (!orders || orders.length === 0) {
                    section.classList.remove('has-orders');
                    return;
                }

                section.classList.add('has-orders');
                badge.innerText = orders.length;

                list.innerHTML = orders.map((order, idx) => {
                    const items = order.items || order.orderItems || [];
                    const itemSummary = items
                        .map(i => {
                            const menuName = i.menu_name || i.menuName || '상품';
                            const qty = i.quantity || i.qty || 0;
                            return `${menuName} x${qty}`;
                        })
                        .join(', ');

                    const tableId = order.tableId || order.table_id || '?';
                    const totalAmount = order.totalAmount || order.total_amount || 0;
                    const orderId = order.id;

                    return `
                    <div class="pending-order-card">
                        <div class="pending-order-info">
                            <div class="pending-order-title">
                                Table #${tableId} &nbsp;·&nbsp; ₩${totalAmount.toLocaleString()}
                            </div>
                            <div class="pending-order-items">${itemSummary || '항목 없음'}</div>
                        </div>
                        <div class="pending-order-actions">
                            <button class="btn-pending-confirm" onclick="confirmPendingOrder(${orderId})">주문 확인</button>
                            <button class="btn-pending-cancel" onclick="cancelPendingOrder(${orderId})">취소</button>
                        </div>
                    </div>`;
                }).join('');
            }

            async function confirmPendingOrder(orderId) {
                try {
                    const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
                    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
                    const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
                    if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

                    // OrderController: PATCH /kiosk/order/{orderId}/status
                    const response = await fetch(`/kiosk/order/${orderId}/status`, {
                        method: 'PATCH',
                        headers: headers,
                        body: JSON.stringify({ status: 'CONFIRMED' })
                    });

                    if (response.ok) {
                        await fetchPendingOrders();
                        alert('주문이 확인되었습니다.');
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        alert('주문 확인에 실패했습니다: ' + (errorData.message || response.statusText));
                    }
                } catch (err) {
                    console.error('❌ confirmPendingOrder 에러:', err);
                    alert('서버 통신 오류: ' + err.message);
                }
            }

            async function cancelPendingOrder(orderId) {
                if (!confirm('주문을 취소하시겠습니까?')) return;

                try {
                    const csrfToken = document.querySelector('meta[name="_csrf"]')?.getAttribute('content');
                    const csrfHeader = document.querySelector('meta[name="_csrf_header"]')?.getAttribute('content');
                    const headers = { 'Content-Type': 'application/json', 'Accept': 'application/json' };
                    if (csrfToken && csrfHeader) headers[csrfHeader] = csrfToken;

                    // OrderController: PATCH /kiosk/order/{orderId}/status
                    const response = await fetch(`/kiosk/order/${orderId}/status`, {
                        method: 'PATCH',
                        headers: headers,
                        body: JSON.stringify({ status: 'CANCELLED' })
                    });

                    if (response.ok) {
                        await fetchPendingOrders();
                        alert('주문이 취소되었습니다.');
                    } else {
                        const errorData = await response.json().catch(() => ({}));
                        alert('주문 취소에 실패했습니다: ' + (errorData.message || response.statusText));
                    }
                } catch (err) {
                    console.error('❌ cancelPendingOrder 에러:', err);
                    alert('서버 통신 오류: ' + err.message);
                }
            }

            document.addEventListener('DOMContentLoaded', () => {
                fetchPendingOrders();
                const pendingOrdersInterval = setInterval(() => {
                    fetchPendingOrders();
                }, 5000);

                window.addEventListener('beforeunload', () => {
                    clearInterval(pendingOrdersInterval);
                });
            });
        </script>
    </th:block>
</th:block>
</body>
</html>
