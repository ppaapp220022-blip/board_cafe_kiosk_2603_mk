<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
    <title>BoardWave Dashboard</title>
    <th:block layout:fragment="head-extra">
        <style>
            /* --- 기존 스타일 유지 --- */
            .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
            .page-title { font-size: 28px; font-weight: 700; }
            .status-legend { display: flex; gap: 15px; font-size: 13px; font-weight: 500; }
            .legend-item { display: flex; align-items: center; gap: 6px; }
            .dot { width: 12px; height: 12px; border-radius: 4px; }
            .dot.in-use { background-color: #4285f4; }
            .dot.empty { background-color: #f1f3f4; border: 1px solid #ddd; }
            .dot.cleaning { background-color: #fbbc04; }
            .dot.request { background-color: #ea4335; }
            .dot.completed { background-color: #34a853; }

            .table-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .table-card {
                background: white; border-radius: 16px; height: 180px; padding: 24px;
                display: flex; flex-direction: column; justify-content: space-between;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); border: 2px solid transparent;
                transition: all 0.2s ease; cursor: pointer;
            }
            .table-card:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1); }
            .table-card.selected { border: 2px solid #4285f4; background-color: #f8faff; transform: translateY(-4px); }
            .table-number { font-size: 22px; font-weight: 700; color: #3c4043; }
            .empty-text { color: #bdc1c6; font-size: 14px; }

            /* --- 모달 관련 필수 스타일 추가 --- */
            .modal-overlay {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.5); z-index: 9999; justify-content: center; align-items: center;
                backdrop-filter: blur(4px);
            }
            .modal-content {
                background: white; width: 400px; border-radius: 20px; padding: 30px;
                transform: translateY(-20px); transition: 0.3s;
            }
            .modal-header { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 20px;}
            .close-btn { cursor: pointer; font-size: 24px; border: none; background: none; }

            /* 주문 내역 리스트 스타일 */
            .order-list {
                margin-top: 15px;
                max-height: 150px;
                overflow-y: auto;
                border: 1px solid #eee;
                border-radius: 8px;
                padding: 10px;
                background: #f9f9f9;
            }
            .order-item {
                display: flex;
                justify-content: space-between;
                font-size: 14px;
                padding: 5px 0;
                border-bottom: 1px solid #eee;
            }
            .order-item:last-child { border-bottom: none; }

            /* 버튼 그룹 */
            .action-group {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
                margin-top: 20px;
            }
            .btn {
                padding: 12px;
                border-radius: 8px;
                border: none;
                font-weight: 600;
                cursor: pointer;
                font-size: 14px;
                transition: 0.2s;
            }
            .btn-pay { background: #34a853; color: white; } /* 결제: 초록 */
            .btn-status { background: #fbbc04; color: white; } /* 상태: 노랑 */
            .btn-msg { background: #ea4335; color: white; } /* 메시지: 빨강 */
            .btn-close { background: #f1f3f4; color: #3c4043; }
            .btn:hover { opacity: 0.9; }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="header-container">
        <h1 class="page-title">📊 테이블 현황</h1>
        <div class="status-legend">
            <div class="legend-item"><div class="dot in-use"></div>사용중</div>
            <div class="legend-item"><div class="dot empty"></div>빈 테이블</div>
            <div class="legend-item"><div class="dot cleaning"></div>청소 중</div>
            <div class="legend-item"><div class="dot request"></div>요청 있음</div>
            <div class="legend-item"><div class="dot completed"></div>결제 완료</div>
        </div>
    </div>

    <div class="table-grid">
        <div th:each="num : ${#numbers.sequence(1, 12)}"
             class="table-card status-empty"
             th:data-table-id="${num}"
             onclick="openTableModal(this)">
            <div class="table-number" th:text="'Table ' + ${num}">Table 1</div>
            <div class="empty-text">비어있음</div>
        </div>
    </div>

    <div id="tableModal" class="modal-overlay" onclick="closeTableModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="modalTitle">Table 0</span>
                <button class="close-btn" onclick="closeTableModal()">×</button>
            </div>

            <div class="modal-body">
                <div style="font-weight: 600; margin-bottom: 8px;">📋 주문 내역</div>
                <div id="orderList" class="order-list">
                    <div class="order-item">주문 내역이 없습니다.</div>
                </div>

                <div class="total-price-container" style="margin-top: 20px; padding-top: 15px; border-top: 2px dashed #eee;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <span style="font-size: 14px; color: #5f6368;">이용 및 주문 합계</span>
                        <span id="totalPrice" style="font-size: 22px; font-weight: 800; color: #ea4335;">0원</span>
                    </div>
                    <p style="font-size: 12px; color: #9aa0a6; text-align: right;">* 퇴실 시각 기준 최종 금액이 확정됩니다.</p>
                </div>

                <div class="action-group">
                    <button class="btn btn-pay" onclick="handlePayment()">💰 결제하기</button>
                    <button class="btn btn-status" onclick="changeStatus()">🔄 상태 변경</button>
                    <button class="btn btn-msg" onclick="checkMessages()">✉️ 메시지 확인</button>
                    <button class="btn btn-close" onclick="closeTableModal()">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script th:inline="javascript">
            /*
            테이블 상태 변경
            결제 -> 청소 중 -> 빈 테이블
             */

            // 현재 선택된 테이블 ID 저장용 변수
            let currentSelectedTableId = null;

            function openTableModal(element) {
                // 1. 모든 테이블 카드에서 선택 효과 제거 후 현재 클릭한 카드만 강조
                clearTableSelection();
                element.classList.add('selected');

                // 2. 테이블 ID 추출 및 저장
                currentSelectedTableId = element.getAttribute('data-table-id');

                // 3. 모달 타이틀 및 데이터 세팅
                document.getElementById('modalTitle').innerText = 'Table ' + currentSelectedTableId;

                // [임시 데이터] 나중에 Ajax 성공 콜백에서 호출하세요
                const mockOrders = [
                    { name: '아메리카노', qty: 2, price: '8,000' },
                    { name: '보드게임 2시간', qty: 1, price: '10,000' }
                ];
                renderOrders(mockOrders);

                // 4. 모달 표시 애니메이션
                const modal = document.getElementById('tableModal');
                modal.style.display = 'flex';
                setTimeout(() => {
                    modal.querySelector('.modal-content').style.transform = 'translateY(0)';
                }, 10);
            }

            // 선택 상태 해제 함수
            function clearTableSelection() {
                document.querySelectorAll('.table-card').forEach(card => {
                    card.classList.remove('selected');
                });
            }

            function closeTableModal(event) {
                // 배경 클릭 시 닫기 로직 처리를 위한 체크 (직접 닫기 버튼을 누른 경우 event가 없을 수 있음)
                const modal = document.getElementById('tableModal');

                modal.style.display = 'none';
                modal.querySelector('.modal-content').style.transform = 'translateY(-20px)';

                // 닫기 버튼 클릭 시 파란색 테두리(선택 상태) 해제
                clearTableSelection();
                currentSelectedTableId = null;
            }

            function renderOrders(orders) {
                const listDiv = document.getElementById('orderList');
                if (!orders || orders.length === 0) {
                    listDiv.innerHTML = '<div class="order-item">주문 내역이 없습니다.</div>';
                    return;
                }

                listDiv.innerHTML = orders.map(item => `
                <div class="order-item">
                    <span>${item.name} x ${item.qty}</span>
                    <span>${item.price}원</span>
                </div>
            `).join('');
            }

            function renderOrders(orders) {
                const listDiv = document.getElementById('orderList');
                const totalPriceElement = document.getElementById('totalPrice');
                let totalSum = 0;

                if (!orders || orders.length === 0) {
                    listDiv.innerHTML = '<div class="order-item">주문 내역이 없습니다.</div>';
                    totalPriceElement.innerText = '0원';
                    return;
                }

                // 주문 내역 렌더링 및 합계 계산
                listDiv.innerHTML = orders.map(item => {
                    // 숫자에서 콤마 제거 후 합산 (데이터가 문자열 '8,000'으로 올 경우 대비)
                    const price = parseInt(item.price.replace(/,/g, ''));
                    totalSum += price;

                    return `
            <div class="order-item">
                <span>${item.name} x ${item.qty}</span>
                <span>${item.price}원</span>
            </div>
        `;
                }).join('');

                // 합계 금액 포맷팅 (3자리 콤마 추가)
                totalPriceElement.innerText = totalSum.toLocaleString() + '원';
            }

            // 기능 버튼 함수들 (기존 유지)
            function handlePayment() {
                if(confirm(`Table ${currentSelectedTableId}번 결제를 진행하시겠습니까?`)) {
                    alert("결제 API 호출 (서버 연동 예정)");
                    closeTableModal(); // 결제 후 모달 닫기
                }
            }

            function changeStatus() {
                alert(`Table ${currentSelectedTableId}의 상태를 변경합니다.`);
            }

            function checkMessages() {
                alert("고객 요청 확인");
            }
        </script>
    </th:block>
</th:block>

</body>
</html>
