<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
    <title>BoardWave Dashboard</title>
    <th:block layout:fragment="head-extra">
        <style>
            /* --- 레이아웃 및 헤더 스타일 --- */
            .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
            .page-title { font-size: 28px; font-weight: 700; }
            .status-legend { display: flex; gap: 15px; font-size: 13px; font-weight: 500; }
            .legend-item { display: flex; align-items: center; gap: 6px; }
            .dot { width: 12px; height: 12px; border-radius: 4px; }
            .dot.in-use { background-color: #4285f4; }
            .dot.empty { background-color: #f1f3f4; border: 1px solid #ddd; }
            .dot.cleaning { background-color: #fbbc04; }
            .dot.request { background-color: #ea4335; }

            /* --- 테이블 그리드 및 카드 스타일 --- */
            .table-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
            .table-card {
                background: white; border-radius: 16px; height: 180px; padding: 24px;
                display: flex; flex-direction: column; justify-content: space-between;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05); border: 2px solid transparent;
                transition: all 0.2s ease; cursor: pointer; position: relative;
            }
            .table-card:hover { transform: translateY(-4px); box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1); }
            .table-card.selected { border: 2px solid #4285f4; background-color: #f8faff; }

            /* --- 알림 점(Alert Dot) 스타일 --- */
            .alert-dot {
                position: absolute; top: 18px; right: 18px;
                width: 12px; height: 12px; background-color: #ea4335;
                border-radius: 50%; border: 2px solid white;
                display: none;
                z-index: 10;
            }
            .has-msg .alert-dot { display: block; animation: pulse-red 1.5s infinite; }

            @keyframes pulse-red {
                0% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.7); }
                70% { transform: scale(1.2); opacity: 0.8; box-shadow: 0 0 0 10px rgba(234, 67, 53, 0); }
                100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); }
            }

            /* 상태별 카드 디자인 */
            .table-card.status-occupied { border-left: 8px solid #4285f4; }
            .table-card.status-empty { border-left: 8px solid #f1f3f4; }
            .table-card.status-cleaning { border-left: 8px solid #fbbc04; }

            .table-number { font-size: 22px; font-weight: 700; color: #3c4043; }
            .status-text { font-size: 14px; font-weight: 600; }

            /* --- 모달 관련 스타일 --- */
            .modal-overlay {
                display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
                background: rgba(0, 0, 0, 0.5); z-index: 9999; justify-content: center; align-items: center;
                backdrop-filter: blur(4px);
            }
            .modal-content {
                background: white; width: 420px; border-radius: 20px; padding: 30px;
                transform: translateY(-20px); transition: 0.3s;
            }
            .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-weight: bold; font-size: 20px;}
            .close-btn { cursor: pointer; font-size: 28px; border: none; background: none; line-height: 1; }

            .order-list { margin-top: 15px; max-height: 180px; overflow-y: auto; border: 1px solid #eee; border-radius: 12px; padding: 12px; background: #f9f9f9; }
            .order-item { display: flex; justify-content: space-between; font-size: 14px; padding: 8px 0; border-bottom: 1px solid #eee; }
            .order-item:last-child { border-bottom: none; }

            /* 버튼 레이아웃 - 2x2 가변형 */
            .action-group {
                display: flex;
                flex-wrap: wrap;
                gap: 10px;
                margin-top: 25px;
            }

            .action-group .btn {
                flex: 1 1 calc(50% - 10px);
                padding: 15px;
                border: none;
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                font-size: 14px;
                transition: all 0.2s;
            }

            .btn-pay { background: #ea4335; color: white; }    /* 결제완료: 빨강 */
            .btn-status { background: #28a745; color: white; } /* 상태변경: 초록 */
            .btn-msg { background: #fbbc05; color: white; }    /* 요청확인: 노랑 */
            .btn-close {
                background: #f1f3f4;
                color: #3c4043;
                flex-grow: 1; /* 요청확인 없을 때 꽉 차게 */
            }

            .btn:hover { opacity: 0.9; transform: scale(0.98); }

            /* 모달 내부 미확인 메시지 박스 스타일 */
            .unread-msg-box {
                background: #fff9c4; border-left: 5px solid #fbc02d;
                padding: 15px; margin-bottom: 20px; border-radius: 12px;
                font-size: 14px; color: #5d4037; display: none;
            }

            /* --- 전체 리셋 버튼 전용 디자인 (회색/다크 계열) --- */
            .btn-reset {
                background: #5f6368;
                color: white;
                display: flex;
                align-items: center;
                border-radius: 10px;
                cursor: pointer;
                gap: 8px;
                padding: 10px 18px;
                height: fit-content;

                /* --- [핵심] 브라우저 기본 테두리 제거 --- */
                border: none;

                /* 혹시 모를 폰트 두께 조절 */
                font-weight: 600;

                /* 부드러운 전환 효과 */
                transition: all 0.2s ease;
            }

            /* 포커스 시에도 아예 아무것도 안 보이게 하고 싶다면 */
            .btn-reset:focus {
                outline: none;
                box-shadow: none;
            }
        </style>
    </th:block>
</head>

<body>
<th:block layout:fragment="content">
    <div class="header-container">
        <h1 class="page-title">📊 테이블 현황</h1>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button class="btn btn-reset" onclick="handleTotalReset()">
                🔄 전체 리셋 (마감)
            </button>

            <div class="status-legend">
                <div class="legend-item"><div class="dot empty"></div>빈 테이블</div>
                <div class="legend-item"><div class="dot in-use"></div>사용중</div>
                <div class="legend-item"><div class="dot cleaning"></div>청소 중</div>
                <div class="legend-item"><div class="dot request"></div>요청 있음</div>
            </div>
        </div>
    </div>

    <div class="table-grid">
        <div th:each="table : ${tables}"
             class="table-card"
             th:classappend="${(table.hasUnreadMessage ? 'has-msg ' : '') + 'status-' + #strings.toLowerCase(table.status)}"
             th:data-id="${table.id}"
             th:data-num="${table.tableNumber}"
             th:data-status="${table.status}"
             th:data-token="${table.accessToken}"
             onclick="openTableModal(this)">

            <div class="alert-dot"></div>

            <div class="table-number" th:text="'Table ' + ${table.tableNumber}">Table 1</div>

            <div class="status-text">
                <span th:if="${table.status == 'EMPTY'}" style="color: #bdc1c6;">비어있음</span>
                <span th:if="${table.status == 'OCCUPIED'}" style="color: #4285f4;">이용 중</span>
                <span th:if="${table.status == 'CLEANING'}" style="color: #fbbc04;">청소 중</span>
            </div>

            <div class="time-info" style="font-size: 12px; color: #5f6368; display: flex; justify-content: space-between; align-items: center; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #eee;">
                <span th:if="${table.status == 'OCCUPIED' and table.guestCount != null}"
                      style="display: flex; align-items: center; gap: 4px; font-weight: 500;">
                    👥 <span th:text="${table.guestCount} + '명'">2명</span>
                </span>
                <span th:unless="${table.status == 'OCCUPIED'}"></span>
                <span th:if="${table.status == 'OCCUPIED' and table.checkInTime != null}"
                      style="display: flex; align-items: center; gap: 4px;">
                    🕒 <span th:text="${#temporals.format(table.checkInTime, 'HH:mm')}">14:30</span>
                </span>
            </div>
        </div>
    </div>

    <div id="tableModal" class="modal-overlay" onclick="closeTableModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">
                <span id="modalTitle">Table 0</span>
                <button class="close-btn" onclick="closeTableModal()">×</button>
            </div>
            <div class="modal-body">
                <div id="unreadMsgBox" class="unread-msg-box">
                    <strong>⚠️ 확인이 필요한 손님 요청</strong>
                    <ul id="unreadMsgList"></ul>
                </div>

                <div style="font-weight: 600; color: #3c4043;">📋 실시간 주문 내역</div>
                <div id="orderList" class="order-list"></div>

                <div class="total-price-container" style="margin-top: 20px; padding-top: 15px; border-top: 2px dashed #eee;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span style="font-size: 14px; color: #5f6368;">현재 이용 합계</span>
                        <span id="totalPrice" style="font-size: 24px; font-weight: 800; color: #ea4335;">0원</span>
                    </div>
                </div>

                <div class="action-group">
                    <button class="btn btn-pay" onclick="handlePayment()">💰 결제완료</button>
                    <button class="btn btn-status" onclick="handleStatusUpdate()">🔄 상태변경</button>
                    <button class="btn btn-msg" id="readBtn" onclick="handleReadMessage()" style="display:none;">✉️ 요청확인</button>
                    <button class="btn btn-close" onclick="closeTableModal()">닫기</button>
                </div>
            </div>
        </div>
    </div>

    <th:block layout:fragment="script">
        <script th:inline="javascript">
            let currentTableId = null;
            let currentTableStatus = null;

            function hideMessageBox() {
                const box = document.getElementById('unreadMsgBox');
                const btn = document.getElementById('readBtn');
                if (box) box.style.display = 'none';
                if (btn) btn.style.display = 'none';
            }

            // 기존 CSS를 건드리지 않기 위해 JS 내에서 인라인 스타일로 상태 버튼 렌더링
            function renderOrders(orders) {
                const listDiv = document.getElementById('orderList');
                const priceSpan = document.getElementById('totalPrice');
                let sum = 0;

                if (!listDiv || !priceSpan) return;

                if (!orders || orders.length === 0) {
                    listDiv.innerHTML = '<div class="order-item" style="color:#999; display:flex; justify-content:center; border:none;">진행 중인 주문이 없습니다.</div>';
                    priceSpan.innerText = '0원';
                    return;
                }

                listDiv.innerHTML = orders.map(item => {
                    const itemTotal = item.price * item.quantity;

                    if (item.status !== 'CANCELLED') {
                        sum += itemTotal;
                    }

                    let statusText = '';
                    let badgeBg = '#f1f3f4';
                    let badgeColor = '#5f6368';
                    let actionHtml = '';

                    const orderId = item.id || item.orderId;
                    const currentStatus = item.status || 'PAID';

                    // 인라인 스타일 정의
                    const btnBase = "padding: 5px 10px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer; font-weight: 600;";
                    const btnNext = btnBase + " background: #4285f4; color: white;";
                    const btnCancel = btnBase + " background: #f1f3f4; color: #ea4335;";

                    switch(currentStatus) {
                        case 'PENDING':
                            statusText = '결제대기'; badgeBg = '#f1f3f4'; badgeColor = '#5f6368';
                            actionHtml = `<button style="${btnCancel}" onclick="updateOrderStatus(${orderId}, 'CANCELLED')">취소</button>`;
                            break;
                        case 'PAID':
                            statusText = '결제완료'; badgeBg = '#e8f0fe'; badgeColor = '#1a73e8';
                            actionHtml = `
                                <button style="${btnNext}" onclick="updateOrderStatus(${orderId}, 'CONFIRMED')">주방확인</button>
                                <button style="${btnCancel}" onclick="updateOrderStatus(${orderId}, 'CANCELLED')">취소</button>`;
                            break;
                        case 'CONFIRMED':
                            statusText = '주방확인'; badgeBg = '#fef7e0'; badgeColor = '#b06000';
                            actionHtml = `
                                <button style="${btnNext}" onclick="updateOrderStatus(${orderId}, 'COOKING')">조리시작</button>
                                <button style="${btnCancel}" onclick="updateOrderStatus(${orderId}, 'CANCELLED')">취소</button>`;
                            break;
                        case 'COOKING':
                            statusText = '조리중'; badgeBg = '#fce8e6'; badgeColor = '#c5221f';
                            actionHtml = `<button style="${btnNext}" onclick="updateOrderStatus(${orderId}, 'DELIVERING')">서빙시작</button>`;
                            break;
                        case 'DELIVERING':
                            statusText = '서빙중'; badgeBg = '#e6f4ea'; badgeColor = '#137333';
                            actionHtml = `<button style="${btnNext}" onclick="updateOrderStatus(${orderId}, 'COMPLETED')">완료처리</button>`;
                            break;
                        case 'COMPLETED':
                            statusText = '서빙완료'; badgeBg = '#f1f3f4'; badgeColor = '#5f6368';
                            break;
                        case 'CANCELLED':
                            statusText = '주문취소'; badgeBg = '#f1f3f4'; badgeColor = '#ea4335';
                            break;
                        default:
                            statusText = currentStatus;
                    }

                    const isCancelled = currentStatus === 'CANCELLED';
                    const textStyle = isCancelled ? 'text-decoration: line-through; color: #999;' : '';

                    return `
                    <div class="order-item" style="display: flex; flex-direction: column; gap: 10px; padding: 12px 0;">
                        <div style="display: flex; justify-content: space-between; font-weight: 500;">
                            <span style="${textStyle}">${item.menuName} x ${item.quantity}</span>
                            <span style="${textStyle}">${itemTotal.toLocaleString()}원</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <span style="padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: ${badgeBg}; color: ${badgeColor}; ${isCancelled ? 'text-decoration: line-through;' : ''}">${statusText}</span>
                            <div style="display: flex; gap: 6px;">
                                ${actionHtml}
                            </div>
                        </div>
                    </div>`;
                }).join('');

                priceSpan.innerText = sum.toLocaleString() + '원';
            }

            // 주문 상태 변경 API 호출 함수 추가
            async function updateOrderStatus(orderId, nextStatus) {
                if (!orderId) {
                    alert('주문 번호를 찾을 수 없습니다.');
                    return;
                }

                let confirmMsg = '주문 상태를 변경하시겠습니까?';
                if (nextStatus === 'CANCELLED') confirmMsg = '정말 이 주문을 취소하시겠습니까? (복구 불가)';
                else if (nextStatus === 'CONFIRMED') confirmMsg = '주문 내역을 주방에서 확인하셨습니까?';
                else if (nextStatus === 'COOKING') confirmMsg = '조리를 시작하시겠습니까?';
                else if (nextStatus === 'DELIVERING') confirmMsg = '서빙을 시작하시겠습니까?';
                else if (nextStatus === 'COMPLETED') confirmMsg = '서빙 완료 처리하시겠습니까?';

                if (!confirm(confirmMsg)) return;

                try {
                    const response = await fetch(`/admin/orders/${orderId}/status`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: nextStatus })
                    });

                    if (response.ok) {
                        await fetchActiveOrders();
                    } else {
                        const res = await response.json();
                        alert("❌ " + (res.error || "주문 상태 변경에 실패했습니다."));
                    }
                } catch (err) {
                    console.error(err);
                    alert("서버와 통신 중 오류가 발생했습니다.");
                }
            }

            async function openTableModal(element) {
                document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
                element.classList.add('selected');
                currentTableId = element.getAttribute('data-id');
                currentTableStatus = element.getAttribute('data-status');
                const tableNum = element.getAttribute('data-num');
                const hasMsg = element.classList.contains('has-msg');

                const modalTitle = document.getElementById('modalTitle');
                if (modalTitle) modalTitle.innerText = 'Table ' + tableNum;
                hideMessageBox();

                if (currentTableStatus === 'OCCUPIED') { await fetchActiveOrders(); }
                else { renderOrders([]); }

                if (hasMsg) { await fetchUnreadMessages(); }

                const modal = document.getElementById('tableModal');
                if (modal) {
                    modal.style.display = 'flex';
                    setTimeout(() => {
                        const content = modal.querySelector('.modal-content');
                        if (content) content.style.transform = 'translateY(0)';
                    }, 10);
                }
            }

            function closeTableModal() {
                const modal = document.getElementById('tableModal');
                if (modal) {
                    modal.style.display = 'none';
                    const content = modal.querySelector('.modal-content');
                    if (content) content.style.transform = 'translateY(-20px)';
                }
                document.querySelectorAll('.table-card').forEach(c => c.classList.remove('selected'));
                currentTableId = null;
                currentTableStatus = null;
            }

            async function fetchUnreadMessages() {
                try {
                    const response = await fetch(`/admin/dashboard/messages/${currentTableId}`);
                    if (response.ok) {
                        const messages = await response.json();
                        const listDiv = document.getElementById('unreadMsgList');
                        if (messages && messages.length > 0 && listDiv) {
                            listDiv.innerHTML = messages.map(msg => `<li>${msg}</li>`).join('');
                            document.getElementById('unreadMsgBox').style.display = 'block';
                            document.getElementById('readBtn').style.display = 'block';
                        }
                    }
                } catch (err) { console.error(err); }
            }

            async function handleReadMessage() {
                if (!currentTableId) return;
                if (!confirm("요청 내용을 모두 확인하셨습니까?")) return;
                try {
                    const response = await fetch(`/admin/dashboard/messages/${currentTableId}/read`, { method: 'PATCH' });
                    if (response.ok) { location.reload(); }
                } catch (err) { console.error(err); }
            }

            async function fetchActiveOrders() {
                try {
                    const response = await fetch(`/admin/dashboard/${currentTableId}/orders`);
                    if (response.ok) {
                        const orders = await response.json();
                        renderOrders(orders);
                    } else { renderOrders([]); }
                } catch (err) { renderOrders([]); }
            }

            async function callUpdateStatus(status) {
                try {
                    const response = await fetch(`/admin/dashboard/${currentTableId}/status`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ status: status })
                    });

                    const result = await response.json();

                    if (response.ok) {
                        location.reload();
                    } else {
                        alert("❌ " + (result.error || "상태 변경에 실패했습니다."));
                    }
                } catch (err) {
                    console.error(err);
                    alert("서버와 통신 중 오류가 발생했습니다.");
                }
            }

            function handlePayment() {
                if (currentTableStatus !== 'OCCUPIED') {
                    alert("이용 중인 테이블만 결제가 가능합니다.");
                    return;
                }
                if(confirm("결제를 완료하시겠습니까?\n확인 시 퇴실 처리와 함께 미확인 요청도 모두 읽음 처리됩니다.")) {
                    callUpdateStatus('CLEANING');
                }
            }

            async function handleStatusUpdate() {
                if (!currentTableId || !currentTableStatus) return;

                const selectedTable = document.querySelector(`.table-card[data-id="${currentTableId}"]`);
                const token = selectedTable ? selectedTable.getAttribute('data-token') : null;

                if (currentTableStatus === 'EMPTY') {
                    if (!token || token.trim() === "" || token === 'null') {
                        alert("⚠️ 인증 토큰이 없는 테이블입니다.\n토큰 발급 후에만 입실(OCCUPIED)이 가능합니다.");
                        return;
                    }
                }

                let nextStatus = '';
                let confirmMsg = '';
                if (currentTableStatus === 'EMPTY') { nextStatus = 'OCCUPIED'; confirmMsg = "손님 입실 처리를 하시겠습니까?"; }
                else if (currentTableStatus === 'OCCUPIED') { nextStatus = 'CLEANING'; confirmMsg = "퇴실 및 청소 중 상태로 변경하시겠습니까?"; }
                else if (currentTableStatus === 'CLEANING') { nextStatus = 'EMPTY'; confirmMsg = "청소가 완료되었습니까?"; }

                if (confirm(confirmMsg)) { await callUpdateStatus(nextStatus); }
            }

            async function handleTotalReset() {
                if (!confirm("⚠️ 주의: 모든 데이터가 초기화됩니다. 진행하시겠습니까?")) return;
                try {
                    const response = await fetch('/admin/dashboard/reset', { method: 'DELETE' });
                    if (response.ok) { location.reload(); }
                } catch (err) { console.error(err); }
            }
        </script>
    </th:block>
</th:block>
</body>
</html>
