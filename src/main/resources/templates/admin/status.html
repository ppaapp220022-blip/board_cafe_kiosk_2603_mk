<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
  <title>Sales Statistics</title>
  <th:block layout:fragment="head-extra">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      .page-title { font-size: 28px; font-weight: 700; margin-bottom: 30px; }

      /* 요약 카드 */
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
        margin-bottom: 25px;
      }
      .summary-card {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: var(--card-shadow);
        border: 1px solid #f0f0f0;
      }
      .summary-label { font-size: 12px; color: #888; margin-bottom: 8px; font-weight: 500; }
      .summary-value { font-size: 20px; font-weight: 700; }
      .val-blue   { color: var(--primary-blue); }
      .val-green  { color: #28a745; }
      .val-orange { color: #fd7e14; }
      .val-purple { color: #6f42c1; }

      /* 차트 영역 */
      .chart-row {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 20px;
        margin-bottom: 20px;
      }
      .chart-card {
        background: white;
        padding: 25px;
        border-radius: 16px;
        box-shadow: var(--card-shadow);
        border: 1px solid #f0f0f0;
      }
      .chart-title { font-size: 16px; font-weight: 700; margin-bottom: 20px; }
      .chart-row.full-row { grid-template-columns: 1fr; }

      /* 베스트 셀러 */
      .best-seller-card {
        background: white;
        padding: 25px;
        border-radius: 16px;
        box-shadow: var(--card-shadow);
        border: 1px solid #f0f0f0;
        margin-top: 20px;
      }
      .seller-item {
        display: flex;
        align-items: center;
        padding: 15px 0;
        border-bottom: 1px solid #f8f8f8;
      }
      .seller-item:last-child { border-bottom: none; }
      .rank-badge {
        width: 24px; height: 24px;
        background: var(--primary-blue);
        color: white;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 12px; font-weight: 700;
        margin-right: 15px;
        flex-shrink: 0;
      }
      .item-name  { flex: 1; font-weight: 500; font-size: 14px; }
      .item-count { color: #888; font-size: 13px; margin-right: 20px; }
      .item-price { font-weight: 700; color: var(--primary-blue); font-size: 14px; }

      /* 동기화 버튼 스타일 (추가) */
      .sync-btn {
        padding: 8px 15px; border-radius: 8px; border: 1px solid #007bff;
        background: white; color: #007bff; cursor: pointer; font-weight: 600; font-size: 13px;
      }
      .sync-btn:hover { background: #f0f7ff; }
    </style>
  </th:block>
</head>

<body>
<th:block layout:fragment="content">
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
    <h1 class="page-title" style="margin-bottom: 0;">📈 매출 통계</h1>
    <div style="display: flex; align-items: center; gap: 15px;">
      <button onclick="loadStatData(document.getElementById('targetDate').value)" class="sync-btn">
        🔄 실시간 동기화
      </button>
      <div class="date-picker-wrapper">
        <label for="targetDate" style="font-weight: 600; margin-right: 10px;">기준 날짜:</label>
        <input type="date" id="targetDate"
               th:value="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
               th:max="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd')}"
               onchange="loadStatData(this.value)"
               style="padding: 8px 12px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit;">
      </div>
    </div>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="summary-label">💰 선택일 매출</div>
      <div class="summary-value val-blue" id="stat-total-revenue">₩0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">📈 주간 일평균(추정)</div>
      <div class="summary-value val-green" id="stat-daily-avg">₩0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">📋 총 주문</div>
      <div class="summary-value val-orange" id="stat-total-orders">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">👥 총 방문자</div>
      <div class="summary-value val-purple" id="stat-total-visitors">0</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">🕒 평균 이용시간</div>
      <div class="summary-value val-blue" id="stat-avg-time">0m</div>
    </div>
  </div>

  <div class="chart-row">
    <div class="chart-card">
      <div class="chart-title">최근 7일 매출 추이</div>
      <canvas id="dailySalesChart" height="200"></canvas>
    </div>
    <div class="chart-card">
      <div class="chart-title">카테고리별 매출</div>
      <canvas id="categorySalesChart" height="200"></canvas>
    </div>
  </div>

  <div class="chart-row" style="margin-top: 20px;">
    <div class="best-seller-card" id="best-seller-container" style="margin-top: 0;">
      <div class="chart-title">메뉴 베스트 셀러 (TOP 5)</div>
      <div class="text-center py-4">데이터를 불러오는 중...</div>
    </div>

    <div class="best-seller-card" id="top-games-container" style="margin-top: 0;">
      <div class="chart-title" id="top-games-title">월간 인기 보드게임 (TOP 5)</div>
      <div class="text-center py-4">데이터를 불러오는 중...</div>
    </div>
  </div>
</th:block>

<th:block layout:fragment="scripts">
  <script th:inline="javascript">
    let dailySalesChart, categorySalesChart;

    document.addEventListener('DOMContentLoaded', function() {
      initCharts();
      const initialDate = document.getElementById('targetDate').value;
      loadStatData(initialDate);
    });

    async function loadStatData(date) {
      try {
        console.log("요청 날짜:", date);
        const response = await fetch(`/admin/api/statistics?targetDate=${date}`);
        const data = await response.json();
        console.log("받은 데이터:", data);

        // 1. 요약 카드 업데이트 (안전하게 처리)
        const summary = data.summary || { totalRevenue: 0, orderCount: 0, visitCount: 0 };
        document.getElementById('stat-total-revenue').innerText = '₩' + (summary.totalRevenue || 0).toLocaleString();
        document.getElementById('stat-total-orders').innerText = (summary.orderCount || 0) + '건';
        document.getElementById('stat-total-visitors').innerText = (summary.visitCount || 0) + '명';

        // 2. 주간 매출 차트 업데이트
        if (data.weeklySales && data.weeklySales.length > 0) {
          dailySalesChart.data.labels = data.weeklySales.map(d => d.statDate);
          dailySalesChart.data.datasets[0].data = data.weeklySales.map(d => d.totalRevenue);
          dailySalesChart.update();
        }

        // 3. 카테고리 차트 업데이트
        if (data.categoryStats && data.categoryStats.labels.length > 0) {
          categorySalesChart.data.labels = data.categoryStats.labels;
          categorySalesChart.data.datasets[0].data = data.categoryStats.values;
          categorySalesChart.update();
        } else {
          // 데이터 없을 때 차트 비우기
          categorySalesChart.data.labels = [];
          categorySalesChart.data.datasets[0].data = [];
          categorySalesChart.update();
        }

        // 4. 베스트 셀러 업데이트
        updateBestSellers(data.topMenus, date);

        // 5. 월간 인기 게임 업데이트
        updateTopGames(data.topGames, date);

        // 1. 주간 일평균 (서버에서 계산한 값)
        document.getElementById('stat-daily-avg').innerText = '₩' + (data.weeklyAvgRevenue || 0).toLocaleString();

        // 2. 평균 이용시간 (DTO에 추가한 필드)
        document.getElementById('stat-avg-time').innerText = (summary.avgUsageTime || 0) + 'm';

      } catch (e) {
        console.error("데이터 로드 중 에러 발생:", e);
      }
    }

    // 일간 메뉴 베스트 셀러 리스트 렌더링 함수
    function updateBestSellers(menus, targetDateStr) {
      const container = document.getElementById('best-seller-container');

      // 날짜 파싱 (예: 4월 7일)
      const dateObj = new Date(targetDateStr);
      const monthStr = dateObj.getMonth() + 1;
      const dayStr = dateObj.getDate();

      // 차트 타이틀에 날짜 동적 적용
      let html = `<div class="chart-title">${monthStr}월 ${dayStr}일 메뉴 베스트 셀러 (TOP 5)</div>`;

      if (!menus || menus.length === 0) {
        html += '<div style="text-align:center; padding:30px; color:#999;">판매 데이터가 없습니다.</div>';
      } else {
        menus.forEach((item, index) => {
          html += `
              <div class="seller-item">
                  <div class="rank-badge">${index + 1}</div>
                  <div class="item-name">${item.menuName}</div>
                  <div class="item-count">${item.salesQty}개 판매</div>
                  <div class="item-price">₩${item.salesAmount.toLocaleString()}</div>
              </div>`;
        });
      }
      container.innerHTML = html;
    }

    function initCharts() {
      // 매출 차트 초기화
      dailySalesChart = new Chart(document.getElementById('dailySalesChart'), {
        type: 'line',
        data: { labels: [], datasets: [{ label: '매출액', data: [], borderColor: '#007bff', fill: true, tension: 0.4 }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });

      // 카테고리 차트 초기화
      categorySalesChart = new Chart(document.getElementById('categorySalesChart'), {
        type: 'bar',
        data: { labels: [], datasets: [{ data: [], backgroundColor: ['#007bff', '#28a745', '#fd7e14', '#ffc107', '#6f42c1'] }] },
        options: { responsive: true, plugins: { legend: { display: false } } }
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      // 오늘 날짜 구하기 (YYYY-MM-DD 형식)
      const today = new Date().toISOString().split('T')[0];

      // input 요소 찾아서 max 속성 부여
      const dateInput = document.getElementById('targetDate');
      if (dateInput) {
        dateInput.setAttribute('max', today);
      }

      initCharts();
      loadStatData(dateInput.value);
    });

    // 월간 인기 게임 리스트 렌더링 함수
    function updateTopGames(games, targetDateStr) {
      const container = document.getElementById('top-games-container');
      const dateObj = new Date(targetDateStr);
      const monthStr = dateObj.getMonth() + 1; // 월 추출

      let html = `<div class="chart-title">${monthStr}월 인기 보드게임 (TOP 5)</div>`;

      if (!games || games.length === 0) {
        html += '<div style="text-align:center; padding:30px; color:#999;">대여 데이터가 없습니다.</div>';
      } else {
        games.forEach((item, index) => {
          html += `
                  <div class="seller-item">
                      <div class="rank-badge">${index + 1}</div>
                      <div class="item-name">${item.gameName}</div>
                      <div class="item-price">${item.rentCount}회 대여</div>
                  </div>`;
        });
      }
      container.innerHTML = html;
    }
  </script>
</th:block>
</body>
</html>
