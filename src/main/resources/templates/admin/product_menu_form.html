<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
    <title>메뉴 등록/수정 - BOARD WAVE</title>
    <th:block layout:fragment="head-extra">
        <link rel="stylesheet" th:href="@{/css/admin/product_menu_form.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <div class="header-flex">
        <h1 class="page-title"
            th:text="${menu != null and menu.id != 0} ? '메뉴 수정' : '새 메뉴 등록'"></h1>
    </div>

    <div class="form-card">
        <!--
            등록: POST /admin/product/menu/add
            수정: POST /admin/product/menu/edit/{id}
            tab 파라미터로 완료 후 돌아갈 탭 결정
        -->
        <form th:action="${menu != null and menu.id != 0}
                          ? @{/admin/product/menu/edit/{id}(id=${menu.id})}
                          : @{/admin/product/menu/add}"
              method="post"
              enctype="multipart/form-data">

            <!-- 돌아갈 탭 유지 -->
            <input type="hidden" name="tab" th:value="${activeTab}">

            <!-- 카테고리 -->
            <div class="form-group">
                <label class="form-label" for="categoryId">카테고리 <span>*</span></label>
                <select id="categoryId" name="categoryId" class="form-control">
                    <option value="">카테고리 선택</option>
                    <option th:each="cat : ${categoryList}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${menu != null and menu.categoryId == cat.id}">
                    </option>
                </select>
            </div>

            <!-- 메뉴명 -->
            <div class="form-group">
                <label class="form-label" for="name">메뉴명 <span>*</span></label>
                <input type="text" id="name" name="name" class="form-control"
                       placeholder="메뉴명을 입력하세요"
                       th:value="${menu != null} ? ${menu.name} : ''" required>
            </div>

            <!-- 가격 -->
            <div class="form-group">
                <label class="form-label" for="price">가격 (원) <span>*</span></label>
                <input type="number" id="price" name="price" class="form-control"
                       placeholder="예: 3000" min="0"
                       th:value="${menu != null} ? ${menu.price} : ''" required>
            </div>

            <!-- 설명 -->
            <div class="form-group">
                <label class="form-label" for="description">설명</label>
                <textarea id="description" name="description" class="form-control"
                          placeholder="메뉴 설명을 입력하세요"
                          th:text="${menu != null} ? ${menu.description} : ''"></textarea>
            </div>

            <!-- 이미지 업로드 -->
            <div class="form-group">
                <label class="form-label">이미지</label>
                <div class="image-preview-box">
                    <!-- 기존 이미지 (수정 시) -->
                    <img id="previewImg"
                         th:src="${menu != null and menu.imageUrl != null} ? ${menu.imageUrl} : ''"
                         th:style="${menu != null and menu.imageUrl != null} ? 'display:block' : 'display:none'"
                         alt="미리보기">
                    <div class="image-placeholder" id="imgPlaceholder"
                         th:style="${menu != null and menu.imageUrl != null} ? 'display:none' : ''">
                        📷<br>이미지를 선택하면 미리보기가 표시됩니다
                    </div>
                </div>
                <input type="file" id="imageFile" name="imageFile" class="form-control"
                       accept="image/*" onchange="previewImage(event)">
                <!-- 수정 시 기존 이미지 URL 유지 -->
                <input type="hidden" name="imageUrl"
                       th:value="${menu != null} ? ${menu.imageUrl} : ''">
            </div>

            <!-- 판매 가능 여부 -->
            <div class="form-group">
                <label class="form-label">판매 상태</label>
                <div class="form-check-group">
                    <!--
                        Lombok boolean 필드 'isAvailable'의 setter는 setAvailable()로 생성되므로
                        Spring MVC가 바인딩하는 파라미터명은 "available" 입니다.
                        체크박스(name=isAvailable) 대신 hidden input(name=available)을
                        JS로 직접 제어하여 정확한 파라미터명으로 전송합니다.
                    -->
                    <input type="hidden" id="availableValue" name="available"
                           th:value="${menu == null or menu.available} ? 'true' : 'false'">
                    <input type="checkbox" id="isAvailableCheck"
                           th:checked="${menu == null or menu.available}"
                           onchange="document.getElementById('availableValue').value = this.checked ? 'true' : 'false'">
                    <label for="isAvailableCheck">판매 가능 상태로 설정</label>
                </div>
            </div>

            <div class="btn-group">
                <button type="submit" class="btn-submit"
                        th:text="${menu != null and menu.id != 0} ? '수정 완료' : '등록하기'"></button>
                <a th:href="@{/admin/product/menu(tab=${activeTab})}" class="btn-cancel">취소</a>
            </div>
        </form>
    </div>

</th:block>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/admin/product_menu_form.js}"></script>
</th:block>
</body>
</html>
