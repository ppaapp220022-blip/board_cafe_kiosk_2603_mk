<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/admin_layout}">

<head>
    <title>게임 등록/수정 - BOARD WAVE</title>
    <th:block layout:fragment="head-extra">
        <link rel="stylesheet" th:href="@{/css/admin/product_game_form.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <div class="header-flex">
        <h1 class="page-title"
            th:text="${game != null and game.id != 0} ? '게임 수정' : '새 게임 등록'"></h1>
    </div>

    <div class="form-card">
        <form th:action="${game != null and game.id != 0}
                          ? @{/admin/product/game/edit/{id}(id=${game.id})}
                          : @{/admin/product/game/add}"
              method="post"
              enctype="multipart/form-data">

            <div class="form-group">
                <label class="form-label" for="categoryId">카테고리 <span>*</span></label>
                <select id="categoryId" name="categoryId" class="form-control">
                    <option value="">카테고리 선택</option>
                    <option th:each="cat : ${categoryList}"
                            th:value="${cat.id}"
                            th:text="${cat.name}"
                            th:selected="${game != null and game.categoryId == cat.id}">
                    </option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label" for="name">게임명 <span>*</span></label>
                <input type="text" id="name" name="name" class="form-control"
                       placeholder="게임명을 입력하세요"
                       th:value="${game != null} ? ${game.name} : ''" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" for="minPlayers">최소 인원</label>
                    <input type="number" id="minPlayers" name="minPlayers" class="form-control"
                           placeholder="최소 인원" min="1"
                           th:value="${game != null} ? ${game.minPlayers} : ''">
                </div>
                <div class="form-group">
                    <label class="form-label" for="maxPlayers">최대 인원</label>
                    <input type="number" id="maxPlayers" name="maxPlayers" class="form-control"
                           placeholder="최대 인원" min="1"
                           th:value="${game != null} ? ${game.maxPlayers} : ''">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="playTime">평균 플레이 시간 (분)</label>
                <input type="number" id="playTime" name="playTime" class="form-control"
                       placeholder="예: 60" min="1"
                       th:value="${game != null} ? ${game.playTime} : ''">
            </div>

            <div class="form-group">
                <label class="form-label" for="description">게임 설명</label>
                <textarea id="description" name="description" class="form-control"
                          rows="4" placeholder="게임 설명을 입력하세요"
                          th:text="${game != null} ? ${game.description} : ''"></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">게임 이미지</label>
                <div class="image-preview-box">
                    <img id="previewImg"
                         th:src="${game != null and game.imageUrl != null} ? ${game.imageUrl} : ''"
                         th:style="${game != null and game.imageUrl != null} ? 'display:block' : 'display:none'"
                         alt="미리보기">
                    <div class="image-placeholder" id="imgPlaceholder"
                         th:style="${game != null and game.imageUrl != null} ? 'display:none' : ''">
                        📷<br>이미지를 선택하면 미리보기가 표시됩니다
                    </div>
                </div>
                <input type="file" id="imageFile" name="imageFile" class="form-control"
                       accept="image/*" onchange="previewImage(event)">
                <input type="hidden" name="imageUrl"
                       th:value="${game != null} ? ${game.imageUrl} : ''">
            </div>

            <div class="form-group">
                <label class="form-label">활성 상태</label>
                <div class="form-check-group">
                    <input type="hidden" id="activeValue" name="active"
                           th:value="${game == null or game.active} ? 'true' : 'false'">
                    <input type="checkbox" id="isActiveCheck"
                           th:checked="${game == null or game.active}"
                           onchange="document.getElementById('activeValue').value = this.checked ? 'true' : 'false'">
                    <label for="isActiveCheck">대여 가능 상태로 설정</label>
                </div>
            </div>

            <hr class="section-divider">

            <input type="hidden" id="deletedItemIds" name="deletedItemIds" value="">

            <!-- ── 수정 모드: 기존 재고 목록 ── -->
            <th:block th:if="${game != null and game.id != 0}">
                <div class="section-title">🎯 보유 재고 관리</div>
                <div class="item-list" id="existingItemList">

                    <p class="empty-items-msg"
                       th:if="${gameItemList == null or #lists.isEmpty(gameItemList)}">
                        등록된 재고가 없습니다.
                    </p>

                    <div th:each="item, stat : ${gameItemList}"
                         th:id="'existingRow-' + ${item.id}"
                         class="item-row"
                         th:classappend="'status-' + ${item.status}">

                        <!-- 식별용 hidden -->
                        <input type="hidden"
                               th:name="'items[' + ${stat.index} + '].id'"
                               th:value="${item.id}">
                        <input type="hidden"
                               th:name="'items[' + ${stat.index} + '].gameId'"
                               th:value="${item.gameId}">

                        <!-- 시리얼 번호 -->
                        <span class="item-label">시리얼 번호</span>
                        <input type="text" class="form-control"
                               th:name="'items[' + ${stat.index} + '].serialNumber'"
                               th:value="${item.serialNumber}"
                               placeholder="시리얼 번호">

                        <!--
                            상태 select
                            name="items[i].status" 로 서버에 전달됨.
                            NORMAL / RENTED 상태에서는 삭제 버튼 비활성화.
                            DAMAGED / LOST 상태에서만 삭제 가능.
                        -->
                        <select class="status-select"
                                th:name="'items[' + ${stat.index} + '].status'"
                                th:onchange="'onStatusChange(this, ' + ${item.id} + ')'">
                            <option value="NORMAL"
                                    th:selected="${item.status.name() == 'NORMAL'}">✅ 대여 가능</option>
                            <option value="RENTED"
                                    th:selected="${item.status.name() == 'RENTED'}">📦 대여 중</option>
                            <option value="DAMAGED"
                                    th:selected="${item.status.name() == 'DAMAGED'}">⚠️ 손상</option>
                            <option value="LOST"
                                    th:selected="${item.status.name() == 'LOST'}">❌ 분실</option>
                        </select>

                        <!--
                            삭제 버튼
                            NORMAL / RENTED → disabled (대여 가능·대여 중은 삭제 불가)
                            DAMAGED / LOST  → 삭제 가능 (이력 관리 목적)
                        -->
                        <button type="button" class="btn-remove-item"
                                th:disabled="${item.status.name() == 'NORMAL' or item.status.name() == 'RENTED'}"
                                th:title="${item.status.name() == 'NORMAL'} ? '대여 가능 항목은 삭제할 수 없습니다'
                                         : (${item.status.name() == 'RENTED'} ? '대여 중인 항목은 삭제할 수 없습니다' : '아이템을 삭제합니다')"
                                th:onclick="${item.status.name() == 'DAMAGED' or item.status.name() == 'LOST'}
                                            ? 'markDeleted(' + ${item.id} + ', this)' : ''">
                            🗑 삭제
                        </button>
                    </div>
                </div>
            </th:block>

            <!-- ── 신규 재고 추가 ── -->
            <div class="section-title"
                 th:text="${game != null and game.id != 0} ? '➕ 신규 재고 추가' : '🎯 초기 재고 등록 (선택)'">
            </div>
            <div class="item-list" id="newItemList"></div>
            <button type="button" class="btn-add-item" onclick="addNewItem()">
                + 재고 행 추가
            </button>

            <div class="btn-group">
                <button type="submit" class="btn-submit"
                        th:text="${game != null and game.id != 0} ? '수정 완료' : '등록하기'"></button>
                <a href="/admin/product/game" class="btn-cancel">취소</a>
            </div>

        </form>
    </div>

</th:block>

<th:block layout:fragment="scripts">
    <script th:src="@{/js/admin/product_game_form.js}"></script>
</th:block>
</body>
</html>
