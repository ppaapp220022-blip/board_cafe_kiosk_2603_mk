<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout/admin_layout}">

<head>
    <title>카테고리 관리 - BOARD WAVE</title>
    <th:block layout:fragment="head-extra">
        <link rel="stylesheet" th:href="@{/css/admin/category_list.css}">
    </th:block>
</head>

<body>
<th:block layout:fragment="content">

    <!-- ── 헤더 ── -->
    <div class="header-flex">
        <h1 class="page-title">분류(카테고리) 관리</h1>

        <!-- ADMIN, SUPER 전용 추가 버튼 -->
        <button sec:authorize="hasAnyRole('ADMIN', 'SUPER')"
                class="btn-add-product"
                onclick="openAddModal()">+ 새 카테고리 추가
        </button>

        <!-- STAFF 비활성 버튼 -->
        <button sec:authorize="hasRole('STAFF')"
                class="btn-add-product"
                style="opacity: 0.4; cursor: not-allowed;"
                onclick="alert('관리자 권한이 필요합니다.'); return false;">+ 새 카테고리 추가
        </button>
    </div>

    <!-- ── 상단 탭 네비게이션 ── -->
    <div class="tab-container">
        <a href="/admin/product/game"            class="tab-btn">🎲 게임 관리</a>
        <a href="/admin/product/menu?tab=food"   class="tab-btn">🍔 음식 관리</a>
        <a href="/admin/product/menu?tab=drink"  class="tab-btn">☕ 음료 관리</a>
        <a href="/admin/product/menu?tab=guest"  class="tab-btn">👥 인원 추가</a>
        <a href="/admin/product/game?tab=hidden" class="tab-btn">🎲 게임 숨김 목록</a>
        <a href="/admin/product/menu?tab=hidden" class="tab-btn">👁️ 메뉴 숨김 목록</a>
        <a href="/admin/category" class="tab-btn"
           th:classappend="${activePage == 'category'} ? ' active'">🏷️ 카테고리 관리</a>
    </div>

    <!-- ── 성공/에러 플래시 메시지 → 토스트로 표시 ── -->
    <div th:if="${successMsg}" class="toast success" id="successToast"
         th:text="${successMsg}"></div>
    <div th:if="${errorMsg}" class="toast error" id="errorToast"
         th:text="${errorMsg}"></div>

    <!-- ── 카테고리 목록 테이블 ── -->
    <div class="list-card">
        <table class="cat-table">
            <thead>
            <tr>
                <th style="width: 100px;">구분</th>
                <th>카테고리명</th>
                <th style="width: 160px;">연결 상품</th>
                <th style="text-align: right; width: 180px;">관리</th>
            </tr>
            </thead>
            <tbody>

            <!-- 빈 목록 -->
<!--            <tr th:if="${#lists.isEmpty(categoryList)}" class="empty-row">-->
            <tr th:if="${#lists.isEmpty(pageResponse.dtoList)}" class="empty-row">
                <td colspan="4">등록된 카테고리가 없습니다.</td>
            </tr>

            <!-- 카테고리 행 반복 -->
<!--            <tr th:each="cat : ${categoryList}">-->
            <tr th:each="cat : ${pageResponse.dtoList}">
                <td>
                    <span class="status-badge"
                          th:classappend="'type-' + ${cat.type}"
                          th:text="${cat.type}">구분</span>
                </td>
                <td>
                    <span class="cat-name" th:text="${cat.name}">카테고리명</span>
                </td>
                <td>
                    <span class="count-badge"
                          th:text="|연결 상품: ${cat.productCount}개|">연결 상품: 0개</span>
                </td>
                <td>
                    <div class="action-group">

                        <!-- 수정 버튼: ADMIN, SUPER -->
                        <!--
                            th:onclick 안에서 리터럴 치환(|...|)과 작은따옴표를 함께 쓰면
                            Thymeleaf 파서가 속성 구분자로 오해 → TemplateInputException 발생.
                            data-* 속성으로 값을 전달하고 JS에서 읽는 방식으로 수정.
                        -->
                        <button sec:authorize="hasAnyRole('ADMIN', 'SUPER')"
                                type="button" class="btn-table btn-edit"
                                th:attr="data-id=${cat.id}, data-name=${cat.name}, data-type=${cat.type}"
                                onclick="openEditModal(this)">
                            📝 수정
                        </button>

                        <!-- 수정 버튼: STAFF 비활성 -->
                        <button sec:authorize="hasRole('STAFF')"
                                class="btn-table btn-edit"
                                style="opacity: 0.4; cursor: not-allowed;"
                                onclick="alert('관리자 권한이 필요합니다.'); return false;">📝 수정
                        </button>

                        <!-- 삭제 버튼: ADMIN, SUPER -->
                        <!--
                            productCount > 0 이면 form submit 막고 삭제불가 모달 표시
                            productCount == 0 이면 confirm 후 form submit
                        -->
                        <button sec:authorize="hasAnyRole('ADMIN', 'SUPER')"
                                type="button" class="btn-table btn-delete"
                                th:attr="data-id=${cat.id}, data-count=${cat.productCount}, data-name=${cat.name}"
                                onclick="handleDelete(this)">
                            🗑️ 삭제
                        </button>

                        <!-- 삭제용 숨김 form (JS에서 submit)                  -->
                        <!-- th:action 사용 시 Thymeleaf가 CSRF hidden input을 자동 삽입 -->
                        <form th:id="|deleteForm_${cat.id}|"
                              th:action="@{/admin/category/delete/{id}(id=${cat.id})}"
                              method="post" style="display: none;"></form>

                        <!-- 삭제 버튼: STAFF 비활성 -->
                        <button sec:authorize="hasRole('STAFF')"
                                class="btn-table btn-delete"
                                style="opacity: 0.4; cursor: not-allowed;"
                                onclick="alert('관리자 권한이 필요합니다.'); return false;">🗑️ 삭제
                        </button>

                    </div>
                </td>
            </tr>

            </tbody>
        </table>

        <!-- 페이징 -->
        <div class="pagination">
            <a th:if="${pageResponse.prev}"
               th:href="@{/admin/category(page=${pageResponse.start - 1}, size=${pageResponse.size})}"
               class="page-link">◀</a>

            <a th:each="i : ${#numbers.sequence(pageResponse.start, pageResponse.end)}"
               th:href="@{/admin/category(page=${i}, size=${pageResponse.size})}"
               th:text="${i}"
               th:classappend="${pageResponse.page == i} ? ' active'"
               class="page-link"></a>

            <a th:if="${pageResponse.next}"
               th:href="@{/admin/category(page=${pageResponse.end + 1}, size=${pageResponse.size})}"
               class="page-link">▶</a>
        </div>

    </div>


    <!-- ════════════════════════════════════════════════
         ■ 모달 1: 카테고리 등록
         th:action 사용 → Thymeleaf가 CSRF hidden input 자동 삽입
         ════════════════════════════════════════════════ -->
    <div class="modal-overlay" id="addModal">
        <div class="modal-box">
            <div class="modal-title">🏷️ 새 카테고리 추가</div>
            <form th:action="@{/admin/category/add}" method="post">
                <div class="form-group">
                    <label for="addName">카테고리 명칭 <span style="color:var(--danger-red)">*</span></label>
                    <input type="text" id="addName" name="name" class="input-field"
                           placeholder="예: 사이드 메뉴, 라떼 시리즈..." required maxlength="50">
                </div>
                <div class="form-group">
                    <label for="addType">구분 <span style="color:var(--danger-red)">*</span></label>
                    <select id="addType" name="type" class="input-field">
                        <option value="FOOD">🍔 음식 (FOOD)</option>
                        <option value="DRINK">☕ 음료 (DRINK)</option>
                        <option value="GAME">🎲 게임 (GAME)</option>
                        <option value="GUEST">👥 인원 추가 (GUEST)</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal('addModal')">취소</button>
                    <button type="submit" class="btn-submit">카테고리 추가</button>
                </div>
            </form>
        </div>
    </div>


    <!-- ════════════════════════════════════════════════
         ■ 모달 2: 카테고리 수정
         th:action에 임시 경로 지정 → JS openEditModal()에서 실제 id로 덮어씀
         th:action 사용 → Thymeleaf가 CSRF hidden input 자동 삽입
         ════════════════════════════════════════════════ -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-box">
            <div class="modal-title">✏️ 카테고리 수정</div>
            <form id="editForm" th:action="@{/admin/category/edit}" method="post">
                <div class="form-group">
                    <label for="editName">카테고리 명칭 <span style="color:var(--danger-red)">*</span></label>
                    <input type="text" id="editName" name="name" class="input-field"
                           required maxlength="50">
                </div>
                <div class="form-group">
                    <label for="editType">구분 <span style="color:var(--danger-red)">*</span></label>
                    <select id="editType" name="type" class="input-field">
                        <option value="FOOD">🍔 음식 (FOOD)</option>
                        <option value="DRINK">☕ 음료 (DRINK)</option>
                        <option value="GAME">🎲 게임 (GAME)</option>
                        <option value="GUEST">👥 인원 추가 (GUEST)</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="closeModal('editModal')">취소</button>
                    <button type="submit" class="btn-submit">수정 완료</button>
                </div>
            </form>
        </div>
    </div>


    <!-- ════════════════════════════════════════════════
         ■ 모달 3: 삭제 불가 알림 (연결 상품 존재)
         ════════════════════════════════════════════════ -->
    <div class="modal-overlay" id="deleteBlockModal">
        <div class="modal-box alert-modal-box">
            <div class="alert-icon">🚫</div>
            <div class="alert-title">카테고리를 삭제할 수 없습니다</div>
            <div class="alert-desc" id="deleteBlockMsg">
                연결된 상품이 존재하여 삭제할 수 없습니다.<br>
                먼저 해당 카테고리의 상품을 다른 카테고리로 이동하거나 삭제해 주세요.
            </div>
            <button class="btn-alert-ok" onclick="closeModal('deleteBlockModal')">확인</button>
        </div>
    </div>


    <!-- ════════════════════════════════════════════════
         ■ 모달 4: 서버 에러 알림 (FlashAttribute errorMsg)
         ════════════════════════════════════════════════ -->
    <div class="modal-overlay" id="serverErrorModal"
         th:if="${errorMsg}">
        <div class="modal-box alert-modal-box">
            <div class="alert-icon">⚠️</div>
            <div class="alert-title">오류 발생</div>
            <div class="alert-desc" th:text="${errorMsg}">오류 메시지</div>
            <button class="btn-alert-ok" onclick="closeModal('serverErrorModal')">확인</button>
        </div>
    </div>

</th:block>

<th:block layout:fragment="scripts">
    <script th:inline="javascript">

        /* ── 서버에서 errorMsg가 내려오면 에러 모달 자동 오픈 ── */
        const serverErrorMsg = /*[[${errorMsg}]]*/ null;
        if (serverErrorMsg) {
            document.getElementById('serverErrorModal').classList.add('show');
        }

    </script>
    <script th:src="@{/js/admin/category_list.js}"></script>
</th:block>
</body>
</html>
