<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Game Cafe - Role Selection</title>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" th:href="@{/css/common/login.css}">

</head>
<body>

<div class="header">
  <h1>Board Game Cafe</h1>
  <p>시작하려면 역할을 선택하세요</p>
</div>

<div class="container">
  <a href="/kiosk/login" class="card">
    <div class="icon-wrapper">
      <i data-lucide="gamepad-2" style="width: 40px; height: 40px;"></i>
    </div>
    <h2>고객 키오스크</h2>
    <p>테이블에서 주문하고<br>게임을 선택하세요</p>
  </a>

  <a href="/admin/login" class="card">
    <div class="icon-wrapper">
      <i data-lucide="users" style="width: 40px; height: 40px;"></i>
    </div>
    <h2>직원/관리자</h2>
    <p>테이블 상태 및<br>매장 관리</p>
  </a>
</div>

<div class="help-btn">?</div>

<script>
  // 아이콘 렌더링 스크립트
  lucide.createIcons();
</script>
</body>
</html>
