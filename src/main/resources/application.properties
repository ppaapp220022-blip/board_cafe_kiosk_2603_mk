# ----- Project Name -----
spring.application.name=board_cafe_kiosk_2603_mk
spring.config.import=optional:file:.env[.properties]
# ----- database Connection (MariaDB) -----
spring.datasource.mariadb.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.mariadb.url=${MARIADB_URL:jdbc:mariadb://localhost:3306/board_cafe_kiosk_2603}
spring.datasource.mariadb.username=${MARIADB_USERNAME:}
spring.datasource.mariadb.password=${MARIADB_PASSWORD:}
# ----- database Connection (PgVector) -----
spring.datasource.pgvector.url=${PGVECTOR_URL:jdbc:postgresql://localhost:5432/board_cafe_kiosk_2603}
spring.datasource.pgvector.username=${PGVECTOR_USERNAME:}
spring.datasource.pgvector.password=${PGVECTOR_PASSWORD:}
spring.datasource.pgvector.driver-class-name=org.postgresql.Driver
# ----- Log4j2 logging Levels -----
logging.level.org.springframework=info
logging.level.org.example.board_cafe_kiosk_2603=debug
# ----- Console log pattern -----
logging.level.org.mybatis=debug
logging.level.java.sql=debug
# logging pattern
logging.pattern.console=%clr(%-5level){green} %clr(%logger{36}.%M\\(\\)){cyan}: %msg%n
# ----- MyBatis Configuration -----
# ----- MyBatis: Location of Mapper XML files -----
# mybatis
mybatis.mapper-locations=classpath:mapper/**/*.xml
# ----- Convert snake_case (DB) to camelCase (Java) -----
mybatis.configuration.map-underscore-to-camel-case=true
# ----- [Windows] File Upload Settings -----
#spring.servlet.multipart.enabled=true
#spring.servlet.multipart.location=c:\\upload
#spring.servlet.multipart.max-request-size=30MB
#spring.servlet.multipart.max-file-size=10MB
#my.upload.path=c:\\upload
# ----- File Upload Settings -----
spring.servlet.multipart.enabled=true
spring.servlet.multipart.location=${SPRING_SERVLET_MULTIPART_LOCATION:C:/dev/board_cafe_kiosk_2603_mk/upload}
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.max-file-size=10MB
my.upload.path=${MY_UPLOAD_PATH:C:/dev/board_cafe_kiosk_2603_mk/upload}
# ----- spring security logging config -----
logging.level.org.springframework.security=info
# error detail
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
# ----- spring Batch -----
# spring Batch Table Auto Create
spring.batch.jdbc.initialize-schema=${SPRING_BATCH_JDBC_INITIALIZE_SCHEMA:never}
# Prevent Spring Batch from executing jobs automatically on startup
spring.batch.job.enabled=false
# ----- toss payments -----
toss.payments.secret-key=${TOSS_PAYMENTS_SECRET_KEY:}
toss.payments.client-key=${TOSS_PAYMENTS_CLIENT_KEY:}
toss.payments.confirm-url=https://api.tosspayments.com/v1/payments/confirm
# ----- Spring Boot Standard Mail Settings -----
spring.mail.host=smtp.naver.com
spring.mail.port=465
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
# ----- SMTP Additional Properties -----
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
myapp.custom.mail.sender.mailFrom=${MYAPP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
myapp.custom.mail.sender.mailFromName=${MYAPP_MAIL_FROM_NAME:BOARD_WAVE_SYSTEM}
# ----- OpenAI -----
spring.ai.openai.api-key=${OPENAI_API_KEY:}
# ----- Portfolio (free pass key) -----
portfolio.super-key.id=${PORTFOLIO_SUPER_KEY_ID:}
portfolio.super-key.otp=${PORTFOLIO_SUPER_KEY_OTP:}
portfolio.super-key.temp-passwd=${PORTFOLIO_SUPER_KEY_TEMP_PASSWD:}
